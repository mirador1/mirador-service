# Maven Wrapper configuration — pins the exact Maven version used by this project.
# The wrapper downloads Maven automatically on first use, so no local installation
# is required. This guarantees that all developers and CI runners use the same version.
#
# To switch Maven version: uncomment the desired distributionUrl below, then run:
#   ./mvnw --version   (triggers the download)
#
# Both Maven 3.9.x and 4.x are supported. Plugin versions are resolved via the
# spring-boot-starter-parent <pluginManagement>, which is valid in both versions.
wrapperVersion=3.3.4
distributionType=only-script

# Maven 3.9.x (default — stable, production-proven)
distributionUrl=https://repo.maven.apache.org/maven2/org/apache/maven/apache-maven/3.9.14/apache-maven-3.9.14-bin.zip

# Maven 4.0.x (uncomment to use — tested and working, stricter validation)
#distributionUrl=https://repo.maven.apache.org/maven2/org/apache/maven/apache-maven/4.0.0-rc-3/apache-maven-4.0.0-rc-3-bin.zip
