# =============================================================================
# Spectral ruleset — OpenAPI lint
#
# Runs in CI (openapi-lint job) against the OpenAPI document generated by
# springdoc at build time. Catches inconsistencies that SonarCloud / PMD
# can't see:
#   - missing operationId  (breaks client codegen)
#   - missing descriptions
#   - undocumented error responses
#   - duplicated tags
#   - unused / unreferenced schemas
#
# Uses the built-in spectral:oas preset (OpenAPI 3.x best practices) plus
# our own overrides.
#
# Run locally:
#   mvn compile -DskipTests
#   mvn spring-boot:run -Dspring-boot.run.profiles=openapi-export  &
#   sleep 30
#   curl http://localhost:8080/v3/api-docs > /tmp/openapi.json
#   npx @stoplight/spectral-cli lint /tmp/openapi.json --ruleset .spectral.yaml
# =============================================================================
extends:
  - spectral:oas

rules:
  # Every operation must have a unique operationId (needed for client codegen
  # and for break-detection between releases).
  operation-operationId: error
  operation-operationId-unique: error

  # Operations must document the main error codes, not just happy path.
  operation-4xx-response: warn

  # Tags must be defined at the top level (not invented inline per op).
  operation-tag-defined: warn

  # Paths should be kebab-case (e.g. /customer-events, not /customerEvents).
  # path-keys-no-trailing-slash catches /foo/ which behaves differently from /foo.
  path-keys-no-trailing-slash: error

  # Info block must be complete — shown in Swagger UI landing page.
  info-contact: warn
  info-description: warn
  info-license: off          # we don't publish a license via OpenAPI
  license-url: off

  # Avoid exposing internal error stack structure in schemas.
  no-$ref-siblings: error

  # Schemas in components/schemas must be referenced by at least one operation.
  # (Unused schemas suggest stale code — flag but don't block.)
  no-unused-components: warn
