# =============================================================================
# Spectral ruleset — OpenAPI lint
#
# Runs in CI (openapi-lint job) against the OpenAPI document generated by
# springdoc at build time. Catches inconsistencies that SonarCloud / PMD
# can't see:
#   - missing operationId  (breaks client codegen)
#   - missing descriptions
#   - undocumented error responses
#   - duplicated tags
#   - unused / unreferenced schemas
#
# Uses the built-in spectral:oas preset (OpenAPI 3.x best practices) plus
# our own overrides.
#
# Run locally:
#   mvn compile -DskipTests
#   mvn spring-boot:run -Dspring-boot.run.profiles=openapi-export  &
#   sleep 30
#   curl http://localhost:8080/v3/api-docs > /tmp/openapi.json
#   npx @stoplight/spectral-cli lint /tmp/openapi.json --ruleset .spectral.yaml
# =============================================================================
extends:
  - spectral:oas

rules:
  # Every operation must have a unique operationId (needed for client codegen
  # and for break-detection between releases).
  operation-operationId: error
  operation-operationId-unique: error

  # Operations must document the main error codes, not just happy path.
  # Spectral 6.15 removed the built-in `operation-4xx-response` rule (it now
  # lives in the community `@stoplight/spectral-rulesets` package). We rely
  # on the tighter `operation-success-response` from spectral:oas instead,
  # which already flags missing response documentation on 2xx/4xx/5xx. If
  # we need 4xx-specific enforcement later, install the community ruleset
  # and re-add under `extends:`. See the Spectral 6→7 upgrade notes.

  # Tags must be defined at the top level (not invented inline per op).
  operation-tag-defined: warn

  # Paths should be kebab-case (e.g. /customer-events, not /customerEvents).
  # path-keys-no-trailing-slash catches /foo/ which behaves differently from /foo.
  path-keys-no-trailing-slash: error

  # Info block must be complete — shown in Swagger UI landing page.
  info-contact: warn
  info-description: warn
  info-license: off          # we don't publish a license via OpenAPI
  license-url: off

  # Avoid exposing internal error stack structure in schemas.
  no-$ref-siblings: error

  # Note: `no-unused-components` was removed from the built-in
  # spectral:oas preset in 6.15 (same upgrade that retired
  # `operation-4xx-response`). If we want that check back, install
  # `@stoplight/spectral-rulesets` and add it under `extends:`.

  # springdoc-openapi auto-generates `default: {}` for every DTO and bogus
  # type-mismatched defaults for primitives (id: 0, createdAt: "string",
  # etc.) — none of which are runtime issues but Spectral's
  # `oas3-valid-schema-example` flags 24 of them per pipeline. Turning the
  # rule OFF until we either:
  #   1. Add explicit `@Schema(defaultValue = "...")` to every DTO field, or
  #   2. Filter the springdoc output through a post-processor that strips
  #      type-mismatched defaults.
  # Follow-up: revisit on next springdoc bump (issue tracked in
  # docs/adr/0035-defer-pact-and-biome.md as a related infrastructure
  # debt — pipeline must stay green per ~/.claude/CLAUDE.md).
  oas3-valid-schema-example: off
