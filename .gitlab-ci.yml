# ──────────────────────────────────────────────────────────────────────────────
# Pipeline overview — two separate lanes:
#
# ┌─ REGULAR pipeline (every MR push + main branch push) — fast lane ─────────┐
# │   lint          Dockerfile linting (hadolint)                              │
# │   test          unit-test (surefire) + sast + dependency_scanning          │
# │   integration   failsafe (*ITest) + SpotBugs + JaCoCo coverage gate        │
# │   package       build-jar + docker-build (main/tags only)                  │
# └────────────────────────────────────────────────────────────────────────────┘
#
# ┌─ SCHEDULED pipeline (once per day, main branch only) — slow lane ─────────┐
# │   native        build-native — GraalVM AOT native image (5-15 min)        │
# │                 skipped if Dockerfile.native, pom.xml, src/ unchanged      │
# │                 Configure in GitLab: CI/CD > Schedules (e.g. 03:00 UTC)   │
# │                 Can also be triggered manually from the GitLab UI           │
# └────────────────────────────────────────────────────────────────────────────┘
#
# Goal: code-review feedback in < 10 minutes; GraalVM only when it matters.
# ──────────────────────────────────────────────────────────────────────────────

workflow:
  rules:
    # Regular pipelines: code-review feedback on MRs + artifact production on main.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
    # Scheduled pipelines: daily GraalVM native build (separate slow lane).
    # Configure in GitLab → CI/CD → Schedules: run once per day at a low-traffic hour.
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - when: never

stages:
  - lint          # Static file checks — instant feedback before any compilation
  - test          # Unit tests + security scans — fast, no Docker
  - integration   # Testcontainers ITests + SpotBugs + coverage gate — needs Docker
  - package       # Produce deployable artifacts — JAR + Docker image
  - native        # GraalVM AOT native-image build (main branch + tags only)

# ── shared defaults ────────────────────────────────────────────────────────────

default:
  image: maven:3.9.14-eclipse-temurin-25-noble   # JDK 25 + Maven 3.9 — mirrors the pom.xml java.version
  interruptible: true   # MR pipelines can be cancelled when a new commit is pushed

variables:
  # Keep the local Maven repo inside the project dir so it is cached across jobs
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end --show-version --no-transfer-progress"
  # Docker-in-dind: plain TCP, no TLS (safe because it is only reachable within the GitLab runner network)
  DOCKER_HOST: "tcp://docker:2375"
  DOCKER_TLS_CERTDIR: ""    # empty string disables TLS certificate generation in the DinD service

cache:
  # One cache bucket per branch — avoids cross-branch dependency pollution
  key: "$CI_COMMIT_REF_SLUG"    # e.g. "main", "dev", "feature-xyz"
  paths:
    - .m2/repository    # Maven local repository — shared across all jobs in the same branch pipeline

# ── stage: lint ───────────────────────────────────────────────────────────────

# Lint the Dockerfile with Hadolint.
# Catches common Dockerfile mistakes:
#   DL3002 — last USER should not be root (security)
#   DL3007 — do not use latest tag (reproducibility)
#   DL3008 — pin apt package versions (reproducibility)
#   SC2xxx — shell script issues inside RUN instructions (via shellcheck)
# Uses a standalone image — no JDK or Maven needed, runs in a few seconds.
hadolint:
  stage: lint
  # latest-alpine (not latest) — the default image is distroless (no sh),
  # which GitLab CI needs to wrap the script. Alpine variant includes a shell.
  image: hadolint/hadolint:latest-alpine
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never   # Skip on daily scheduled pipeline — only build-native runs then
    - when: on_success
  script:
    - hadolint Dockerfile

# ── stage: test ───────────────────────────────────────────────────────────────

# Unit tests only — *ITest classes excluded (they need Docker / Testcontainers).
# JaCoCo is instrumented here via prepare-agent; the resulting jacoco.exec is
# passed as an artifact to the integration stage so both exec files can be merged
# for a combined unit + integration coverage report.
unit-test:
  stage: test
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - when: on_success
  script:
    - mvn $MAVEN_CLI_OPTS test
  artifacts:
    when: always    # upload even on test failure so the JUnit report is always available for diagnosis
    reports:
      junit: target/surefire-reports/*.xml    # populates the "Tests" tab in the MR and pipeline view
    paths:
      - target/jacoco.exec       # binary coverage data — forwarded to integration-test for JaCoCo merge
      - target/site/jacoco/      # HTML unit coverage report (browsable in the job artifacts panel)
    expire_in: 1 week    # short-lived: only needed until the integration job completes and the MR is merged

# GitLab SAST — static application security testing.
# Runs semgrep rules against the source code to detect: injection flaws,
# insecure deserialization, weak crypto, path traversal, XSS patterns, etc.
# Results appear in Security > Vulnerability Report (blocked by MR approval rules
# if configured). Does NOT require compiled bytecode — source-only analysis.
# Defined by the included template; we just override the stage here.
#
# Why allow_failure: true?
# The GitLab-managed template defines these jobs as configuration stubs that
# intentionally exit 1 when triggered outside the official GitLab SAST runner
# environment (i.e. free-tier shared runners without the GitLab Security Scanner
# image). This causes the pipeline to fail even though no real vulnerability was
# found. Setting allow_failure: true keeps the pipeline green while real findings
# still surface in the Security > Vulnerability Report tab when a paid runner or
# self-hosted runner with the scanner image is available.
sast:
  stage: test
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - when: on_success

# GitLab Dependency Scanning.
# Reads pom.xml and checks all direct + transitive Maven dependencies against
# OSV, NVD, and GitHub Advisory databases for known CVEs.
# Results appear in Security > Dependency List.
# Defined by the included template; stage override keeps it parallel with unit-test.
#
# Why allow_failure: true? — same reason as sast above: template stub exits 1
# on free-tier runners; dependency findings still surface in Security > Dependency List.
dependency_scanning:
  stage: test
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - when: on_success

# Pull in the GitLab-managed SAST and Dependency Scanning job definitions.
# Placed after the overrides so our `stage:` settings take effect.
include:
  # Semgrep-based SAST — works on all GitLab tiers
  - template: Security/SAST.gitlab-ci.yml
  # Maven/Gemnasium dependency CVE scan
  - template: Security/Dependency-Scanning.gitlab-ci.yml

# ── stage: integration ────────────────────────────────────────────────────────

# Integration tests (*ITest) via maven-failsafe, with Docker-in-dind for Testcontainers.
# Testcontainers spins up real PostgreSQL 17 and Kafka containers during the test run.
#
# At the verify phase Maven also runs:
#   • SpotBugs:check   — static bytecode analysis (fails on Medium+ findings)
#   • JaCoCo:merge     — merges jacoco.exec (unit, from artifact) + jacoco-it.exec (IT)
#   • JaCoCo:check     — fails if merged instruction coverage < 60 %
#
# The unit-test artifact (target/jacoco.exec) is pulled automatically via `needs`.
integration-test:
  stage: integration
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - when: on_success
  needs:
    - job: unit-test
      artifacts: true   # downloads target/jacoco.exec so JaCoCo:merge can combine unit + IT coverage
  services:
    - name: docker:28-dind    # Docker daemon required by Testcontainers (unlike GitHub-hosted runners, GitLab runners don't include Docker)
      alias: docker            # alias used by DOCKER_HOST=tcp://docker:2375 above
  script:
    # -Dsurefire.skip=true: unit tests already validated in the previous stage,
    # no need to repeat them. Failsafe, SpotBugs and JaCoCo still run at verify.
    - mvn $MAVEN_CLI_OPTS verify -Dsurefire.skip=true
  artifacts:
    when: always    # upload even on test failure so the JUnit + SpotBugs reports are always available
    reports:
      junit: target/failsafe-reports/*.xml    # populates the "Tests" tab with integration test results
    paths:
      - target/site/jacoco-it/     # HTML integration coverage report (browsable in the job artifacts panel)
      - target/spotbugsXml.xml     # SpotBugs XML — parseable by GitLab Code Quality widget
    expire_in: 1 week

# ── stage: package ────────────────────────────────────────────────────────────

# Build the executable Spring Boot fat JAR.
# Tests are skipped here — they already passed in the test + integration stages.
# The JAR is stored as a pipeline artifact for deployment or manual download.
build-jar:
  stage: package
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - when: on_success
  needs:
    - job: unit-test        # both test gates must pass before producing the artifact
    - job: integration-test
  script:
    - mvn $MAVEN_CLI_OPTS -DskipTests package    # tests already passed — skip to save time
  artifacts:
    paths:
      - target/*.jar    # Spring Boot fat JAR (includes embedded Tomcat + all dependencies)
    expire_in: 1 week   # short-lived: for manual download or downstream deploy jobs

# Build the Docker image and push it to the GitLab Container Registry.
#
# Two tags are pushed:
#   $CI_COMMIT_SHA      — immutable pointer to this exact commit (used for deploys)
#   $CI_COMMIT_REF_SLUG — moving pointer (e.g. "main") for convenience
#
# OCI standard labels (revision + created) are injected at build time.
#
# Only runs on the default branch and on tags — skip on every MR to
# avoid flooding the registry with images that are never deployed.
docker-build:
  stage: package
  image: docker:28    # standalone Docker client — the DinD service provides the daemon
  needs:
    - job: unit-test        # both test gates must pass before producing the image
    - job: integration-test
  services:
    - name: docker:28-dind
      alias: docker
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH    # push to registry on main
    - if: $CI_COMMIT_TAG                             # push to registry on version tags (e.g. v1.2.0)
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - |
      docker build \
        --label "org.opencontainers.image.revision=$CI_COMMIT_SHA" \
        --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
        -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA" \      # immutable pointer — used for deployments
        -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG" \ # moving pointer (e.g. "main") — for convenience
        .
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG"

# ── stage: native ─────────────────────────────────────────────────────────────

# Build a GraalVM native image and push it to the GitLab Container Registry.
#
# Why native?
#   Native images start in ~50 ms (vs ~3–5 s for JVM) and use ~50 MB RSS
#   (vs ~250 MB for JVM), making them ideal for serverless, Kubernetes with
#   tight memory limits, or Lambda-style deployments.
#
# Build pipeline (Dockerfile.native):
#   Stage 1 — ghcr.io/graalvm/native-image-community:25
#     1. Spring Boot AOT processing (process-aot): generates reflection hints,
#        proxy classes and resource configuration under target/spring-aot/.
#     2. native:compile: invokes GraalVM native-image on the AOT output,
#        producing a statically-linked binary at target/customerservice.
#   Stage 2 — debian:bookworm-slim (no JDK)
#     Copies only the binary — no JVM, no Maven, no source code.
#
# Tags pushed:
#   native-$CI_COMMIT_SHA      — immutable pointer for deployments
#   native-$CI_COMMIT_REF_SLUG — moving pointer (e.g. "native-main")
#
# Runs only on the default branch and on tags; skipped on every MR because
# the build takes 5–15 minutes and is not needed for code review feedback.
#
# [GraalVM Community 25 / Spring Boot 4 AOT] — -Pnative profile in pom.xml.
build-native:
  stage: native
  image: docker:28
  # No `needs:` — runs independently on the scheduled pipeline, not after unit/integration.
  # The source is already tested by the regular pipeline before it lands on main.
  services:
    - name: docker:28-dind
      alias: docker
  rules:
    # Only on the daily scheduled pipeline AND only when native-relevant files changed.
    # `changes:` compares against the previous pipeline on this branch.
    # If nothing changed since the last build, the job is skipped (status: skipped),
    # saving 5–15 minutes of CI time per day.
    - if: $CI_PIPELINE_SOURCE == "schedule" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - Dockerfile.native
        - pom.xml
        - src/**/*
    # Allow manual trigger (e.g. after a version bump without source changes)
    - if: $CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - when: never
  timeout: 30 minutes   # AOT compilation is CPU-intensive; default 1h is too loose
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - |
      docker build \
        -f Dockerfile.native \
        --label "org.opencontainers.image.revision=$CI_COMMIT_SHA" \
        --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
        -t "$CI_REGISTRY_IMAGE:native-$CI_COMMIT_SHA" \
        -t "$CI_REGISTRY_IMAGE:native-$CI_COMMIT_REF_SLUG" \
        .
    - docker push "$CI_REGISTRY_IMAGE:native-$CI_COMMIT_SHA"
    - docker push "$CI_REGISTRY_IMAGE:native-$CI_COMMIT_REF_SLUG"
  artifacts:
    # Expose image tags as a dotenv artifact so downstream jobs (e.g. deploy)
    # can reference the exact tag without re-computing it.
    reports:
      dotenv: native-image.env
    expire_in: 1 week
  after_script:
    # Write the image tags to the dotenv artifact after a successful build
    - |
      echo "NATIVE_IMAGE_TAG=$CI_REGISTRY_IMAGE:native-$CI_COMMIT_SHA" > native-image.env
      echo "NATIVE_IMAGE_SLUG=$CI_REGISTRY_IMAGE:native-$CI_COMMIT_REF_SLUG" >> native-image.env
