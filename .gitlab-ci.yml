# ──────────────────────────────────────────────────────────────────────────────
# Pipeline overview — four separate lanes:
#
# ┌─ REGULAR pipeline (every MR push + main branch push) — fast lane ─────────┐
# │   lint          Dockerfile linting (hadolint)                              │
# │   test          unit-test (surefire) + sast + dependency_scanning          │
# │   integration   failsafe (*ITest) + SpotBugs + JaCoCo coverage gate        │
# │   package       build-jar + docker-build (main/tags only)                  │
# └────────────────────────────────────────────────────────────────────────────┘
#
# ┌─ NATIVE schedule (once per day) — slow lane ───────────────────────────────┐
# │   native        build-native — GraalVM AOT native image (5-15 min)        │
# │                 Configure in GitLab: CI/CD > Schedules (e.g. 03:00 UTC)   │
# │                 Also available as ▶ manual button in every pipeline        │
# └────────────────────────────────────────────────────────────────────────────┘
#
# ┌─ REPORTS schedule (once per day, set REPORT_PIPELINE=true) ────────────────┐
# │   reports       generate-reports — Maven site + push to reports/ branch    │
# │                 Configure in GitLab: CI/CD > Schedules (e.g. 02:00 UTC),  │
# │                 add variable REPORT_PIPELINE=true                          │
# │                 Requires: GITLAB_REPORTS_TOKEN CI variable (project access │
# │                 token — Reporter role, write_repository scope, 90-day exp) │
# └────────────────────────────────────────────────────────────────────────────┘
#
# ┌─ MANUAL / ON-DEMAND compatibility matrix ──────────────────────────────────┐
# │   compat        4 manual jobs, each testing a different SB/Java combo:     │
# │                   sb4-java21   Spring Boot 4 + Java 21  (-Dcompat)         │
# │                   sb4-java17   Spring Boot 4 + Java 17  (-Dcompat -Djava17)│
# │                   sb3-java21   Spring Boot 3 + Java 21  (-Dsb3)            │
# │                   sb3-java17   Spring Boot 3 + Java 17  (-Dsb3 -Djava17)   │
# │                 Trigger: click ▶ on the job in any pipeline,               │
# │                 OR run via "Run pipeline" with variable RUN_COMPAT=true.   │
# │                 SB4+Java25 (the default) is already covered by unit-test.  │
# └────────────────────────────────────────────────────────────────────────────┘
#
# Goal: code-review feedback in < 10 minutes; heavy generation only on schedule.
# ──────────────────────────────────────────────────────────────────────────────

workflow:
  # IMPORTANT: `changes:` matches if at LEAST one listed file changed. The
  # allowlist triggers a pipeline when real code/build/infra or docs changed.
  # Docs-only changes produce a mostly-skipped pipeline that still satisfies
  # the "main requires passing pipeline" branch protection rule — so MRs
  # touching only docs/ can auto-merge without a bypass push.
  rules:
    # MR events — run when code, build, infra, CI, scripts, hygiene/audit
    # tooling, or docs changes. The allowlist must enumerate every path
    # whose change a reviewer would want CI to validate; missing paths
    # (e.g. `bin/**/*` until 2026-04-21) silently bypass the pipeline
    # gate and the MR is BLOCKED by the branch-protection "ci_must_pass"
    # rule with no pipeline ever running — opposite of "fail open".
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "src/**/*"
        - "pom.xml"
        - "mvnw"
        - "mvnw.cmd"
        - ".mvn/**/*"
        - "Dockerfile*"
        - ".dockerignore"
        - "docker-compose*.yml"
        - ".gitlab-ci.yml"
        - ".gitlab-ci/**/*" # Local include files under .gitlab-ci/ (Phase B-2)
        - ".gitlab/**/*"    # GitLab Agent config, MR templates, etc.
        - ".github/**/*"    # Scorecard / GitHub Actions changes — Sonar may flag perms
        - ".spectral.yaml"  # OpenAPI lint ruleset
        - "deploy/**/*"
        - "scripts/**/*"
        - "bin/**/*"        # Stability check + cluster lifecycle scripts
        - "docs/**/*"
        - "matrix-results/**/*"  # Compat matrix doc — added 2026-04-24 so doc-only MRs trigger a (mostly-skipped) pipeline that satisfies branch protection
        - "README.md"
        - "README.fr.md"
        - "CLAUDE.md"
        - "TASKS.md"
    # Main branch pushes — same allowlist, compared against HEAD~1 (last commit).
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      changes:
        - "src/**/*"
        - "pom.xml"
        - "mvnw"
        - "mvnw.cmd"
        - ".mvn/**/*"
        - "Dockerfile*"
        - ".dockerignore"
        - "docs/**/*"
        - "matrix-results/**/*"  # Compat matrix doc — added 2026-04-24 so post-merge main pipelines fire on doc-only changes
        - "README.md"
        - "README.fr.md"
        - "CLAUDE.md"
        - "TASKS.md"
        - "docker-compose*.yml"
        - ".gitlab-ci.yml"
        - ".gitlab-ci/**/*"
        - ".gitlab/**/*"
        - ".github/**/*"
        - ".spectral.yaml"
        - "deploy/**/*"
        - "scripts/**/*"
        - "bin/**/*"
    # Scheduled pipelines: two named schedules (native build + report generation).
    # Configure each in GitLab → CI/CD → Schedules. The REPORT_PIPELINE variable
    # distinguishes the report schedule from the native-build schedule.
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - when: never

stages:
  - pages         # GitLab Pages static site — published from public/ (ADR-0022 landing page)
  - lint          # Static file checks — instant feedback before any compilation
  - test          # Unit tests + security scans — fast, no Docker
  - integration   # Testcontainers ITests + SpotBugs + coverage gate — needs Docker
  - k8s           # kind-in-docker manifest apply + probe (ADR-0028)
  - package       # Produce deployable artifacts — JAR + Docker image
  - compat        # On-demand compatibility matrix: SB3/SB4 × Java17/21/25
  - native        # GraalVM AOT native-image build (native-build schedule only)
  - sonar         # SonarQube static analysis — runs after integration to read coverage data
  - reports       # Maven site + docs generation (report schedule only — REPORT_PIPELINE=true)
  - infra         # Terraform plan/apply for GCP infrastructure (manual)
  - deploy        # Deploy to Kubernetes / PaaS (6 targets — see below)

# ── shared defaults ────────────────────────────────────────────────────────────

default:
  image: maven:3.9.14-eclipse-temurin-25-noble   # JDK 25 + Maven 3.9 — mirrors the pom.xml java.version
  interruptible: true   # Most jobs can be cancelled when a new commit is pushed.
  # Exception: docker-build, terraform-apply, deploy:* override this to false
  # so expensive or side-effect-producing jobs survive a new push mid-run.
  # All jobs route to macbook-local (= the group-level runner serving
  # mirador1 — java, ui, python, shared). Updated 2026-04-25 after main
  # pipelines started failing with `ci_quota_exceeded` on SaaS shared
  # runners. Per global CLAUDE.md "Use local runners, never rely on
  # GitLab SaaS quota". Same fix applied to UI on the same day.
  tags:
    - macbook-local

variables:
  # Keep the local Maven repo inside the project dir so it is cached across jobs.
  # -Xmx1800m: tuned for the runner memory budget. Raising to 3g still
  # SIGKILL'd integration-test on pipeline #485 because Testcontainers
  # spawns Postgres + Kafka + Redis + Keycloak (Quarkus) OUTSIDE the
  # Maven JVM, each reserving 400-800 MB of HOST memory. Leaving Maven
  # at 3g starves containers and triggers the OOM-killer on Quarkus
  # startup. 1.8 GB is the tuned balance. Paired with `allow_failure:
  # true` on the integration-test job (temporary — tracked as follow-up
  # CI memory budget ADR).
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository -Xmx1800m"
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end --show-version --no-transfer-progress"
  # Testcontainers default: Ryuk disabled so cleanup doesn't bind 172.17.0.1.
  # TESTCONTAINERS_HOST_OVERRIDE is overridden per-job (integration-test uses host.docker.internal).
  TESTCONTAINERS_RYUK_DISABLED: "true"

cache:
  # One cache bucket per branch — avoids cross-branch dependency pollution
  key: "$CI_COMMIT_REF_SLUG"    # e.g. "main", "dev", "feature-xyz"
  paths:
    - .m2/repository    # Maven local repository — shared across all jobs in the same branch pipeline

# ── Includes ──────────────────────────────────────────────────────────────────
#
# Upstream templates (security) first, then the 9 local files that hold
# this project's jobs per ADR-0050 Phase B-2 modularisation.
#
# `!reference [.anchor, …]` works across local includes; YAML `&` / `*`
# anchors are file-scoped and must stay inside a single include file.
# See docs/adr/0050-ci-yaml-modularisation-plan.md for the split rationale and
# the owner-map (which include holds which job family).
include:
  # Semgrep-based SAST — works on all GitLab tiers
  - template: Security/SAST.gitlab-ci.yml
  # Maven/Gemnasium dependency CVE scan
  - template: Security/Dependency-Scanning.gitlab-ci.yml
  # Built-in GitLab Secret Detection (gitleaks) — scans for leaked tokens
  - template: Security/Secret-Detection.gitlab-ci.yml
  # Local includes (Phase B-2)
  - local: .gitlab-ci/lint.yml       # hadolint, promtool, openapi-lint, renovate-lint
  - local: .gitlab-ci/test.yml       # unit-test, integration-test, compat matrix, mutation-test
  - local: .gitlab-ci/security.yml   # trivy, sbom, grype, dockle, cosign, semgrep, + local gitleaks
  - local: .gitlab-ci/quality.yml    # sonar-analysis, code-quality, generate-reports
  - local: .gitlab-ci/package.yml    # build-jar, docker-build
  - local: .gitlab-ci/native.yml     # build-native (GraalVM AOT)
  - local: .gitlab-ci/k8s.yml        # kind-in-docker apply + smoke + load-test
  - local: .gitlab-ci/deploy.yml     # terraform + 5 deploy targets (eks/aks/cloud-run/fly/k3s)
  - local: .gitlab-ci/release.yml    # pages, release-please (disabled)
