# .gitlab-ci/k8s.yml — extracted 2026-04-22 from .gitlab-ci.yml
# Phase B-2 CI modularisation (ADR-0050). Contains: test, test, smoke-test, load-test.
# The parent `.gitlab-ci.yml` keeps only workflow/stages/default/
# variables/cache/include. See docs/adr/0050-ci-yaml-modularisation-plan.md.

test:k8s-apply:
  stage: k8s
  interruptible: true   # OK to cancel if a new push supersedes this one
  image: docker:28
  tags:
    - macbook-local   # needs host Docker socket for kind-in-docker
  needs: []           # no upstream dependency — parallel to unit-test
  # Serialise with test:k8s-apply-prom so two kind control-planes don't boot
  # concurrently on the same macbook-local runner. Pipeline #609 failed both
  # k8s jobs when they tried to init kubeadm at the same time — the Docker
  # Desktop VM cap (7.6 GB default) starved one control plane's API server
  # → "connection refused" at 18:54. Same Monitor-heartbeat pattern as the
  # integration-test job which already carries the `integration-k8s` group.
  resource_group: k8s-kind-cluster
  # 2026-04-22: shield retired — user raised Docker Desktop VM to 16 GB
  # (above the 12 GB threshold identified in pipeline #612 post-mortem).
  # resource_group + retry-on-runner-failure kept as belt-and-suspenders.
  retry:
    max: 1
    when: runner_system_failure
  # Shield removed 2026-04-21 — the SIGPIPE/exit-141 pattern at
  # "mid rollout-check" was caused by `kubectl version ... | head -3`,
  # `grep ... | head -3` (PodSecurity warning block) and
  # `kubectl get pods -A | grep -v Running` (cleanup block) — all
  # classic producer-closes-first SIGPIPE traps under pipefail.
  # scripts/ci-k8s-test.sh rewrite of those blocks to capture-then-
  # filter + migration of the main wait loop from `kubectl rollout
  # status` to `kubectl wait --for=condition=Available` (or rollout
  # status for DaemonSets) removes the flake source entirely. If a
  # different flake class surfaces post-flip, re-shield with a dated
  # TODO rather than silently tolerate it.
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    # MRs: only when manifests OR the apply script change — most MRs
    # skip entirely. Script is included so the kubectl-wait / SIGPIPE
    # fix (2026-04-21) gets validated by the same job it targets.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - deploy/kubernetes/**/*
        - scripts/ci-k8s-test.sh
    # main: same filter. Catches a drift merged via an unrelated MR.
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - deploy/kubernetes/**/*
        - scripts/ci-k8s-test.sh
  variables:
    KIND_VERSION: "v0.24.0"
    # Unique cluster name per job so parallel runs don't collide on the
    # runner's shared Docker daemon.
    KIND_CLUSTER: "ci-k8s-${CI_JOB_ID}"
    # 10 min per pod — keycloak on the arm64 macbook-local runner is
    # slow to become Available (9m+ observed in pipeline #602 on a
    # busy runner). 5 min default was too tight. test:k8s-apply-prom
    # uses 8m for a similar reason (Prometheus Operator boot). Keep
    # the two values close so behaviour is predictable across jobs.
    TIMEOUT: "10m"
  before_script:
    - apk add --no-cache bash curl
    - |
      # arch detection — runner is arm64 (Apple Silicon) by policy, but we
      # stay honest in case someone ever flips the runner tag to amd64.
      ARCH=$(uname -m)
      case "$ARCH" in
        aarch64) KARCH=arm64 ;;
        x86_64)  KARCH=amd64 ;;
        *) echo "unsupported arch: $ARCH"; exit 1 ;;
      esac
      # Install kind binary
      curl -sSL "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-${KARCH}" \
        -o /usr/local/bin/kind
      chmod +x /usr/local/bin/kind
      # Install kubectl matching the latest stable release
      KUBECTL_VERSION=$(curl -sL https://dl.k8s.io/release/stable.txt)
      curl -sSL "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/${KARCH}/kubectl" \
        -o /usr/local/bin/kubectl
      chmod +x /usr/local/bin/kubectl
      kubectl version --client --output=yaml | head -3
  script:
    - scripts/ci-k8s-test.sh
  after_script:
    # Always tear down — leaked kind containers eat runner disk fast.
    - kind delete cluster --name "$KIND_CLUSTER" 2>/dev/null || true

# ── test:k8s-apply-prom — same as test:k8s-apply but for the local-prom overlay ──
#
# Validates that the kube-prometheus-stack components added by the
# `local-prom/` overlay (Prometheus Operator + Prometheus + node-exporter
# + ksm + 6 ServiceMonitors + Mirador ServiceMonitor) apply cleanly in
# kind AND the operator-managed Prometheus StatefulSet rolls out
# successfully — catching CRD drift, manifest typos, label-selector
# mismatches BEFORE they hit GKE via the gke-prom overlay.
#
# Path-filtered: only fires when `local-prom/` (or `gke-prom/` since
# the manifests share ~90% of the rendered chart) actually changes.
# Adds ~3 min to the pipeline; most MRs skip it entirely.
#
# Why kind and not GKE: the kube-prometheus-stack rendered file has
# the same shape across overlays — the only deltas are Prometheus
# memory limit + retention + storage (4 lines diff). If those values
# break the CRDs in kind, they'll break in GKE too. Kind validation
# costs nothing and runs every MR; GKE smoke costs €/min and runs on
# `bin/cluster/demo/up.sh` cycles.
test:k8s-apply-prom:
  stage: k8s
  interruptible: true
  image: docker:28
  tags:
    - macbook-local
  needs: []
  # Serialise with test:k8s-apply — see rationale on that job.
  resource_group: k8s-kind-cluster
  retry:
    max: 1
    when: runner_system_failure
  # 2026-04-22: shield retired — user raised Docker Desktop VM to 16 GB
  # (well above the 12 GB threshold identified in pipeline #610 post-
  # mortem). kube-prom-stack + chaos-mesh CRDs now fit the VM budget.
  # If a future regression re-introduces OOM, re-shield with a fresh
  # dated exit ticket per ADR-0049 rather than silently tolerating it.
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - deploy/kubernetes/overlays/local-prom/**/*
        - deploy/kubernetes/overlays/gke-prom/**/*
        # Also fire when the base or scripts that affect the apply behaviour change
        - deploy/kubernetes/base/**/*
        - scripts/ci-k8s-test.sh
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - deploy/kubernetes/overlays/local-prom/**/*
        - deploy/kubernetes/overlays/gke-prom/**/*
        - deploy/kubernetes/base/**/*
        - scripts/ci-k8s-test.sh
  variables:
    KIND_VERSION: "v0.24.0"
    KIND_CLUSTER: "ci-k8s-prom-${CI_JOB_ID}"
    OVERLAY: "deploy/kubernetes/overlays/local-prom"
    # Operator-managed Prometheus + chart-deployed node-exporter + ksm +
    # operator itself. Keep in sync with the rendered chart in
    # `deploy/kubernetes/overlays/local-prom/kube-prom-stack-rendered.yaml`
    # — if a future chart bump renames any of these, update here too.
    EXTRA_PODS: |-
      monitoring/statefulset/prometheus-prometheus-stack-kube-prom-prometheus
      monitoring/daemonset/prometheus-stack-prometheus-node-exporter
      monitoring/deployment/prometheus-stack-kube-state-metrics
      monitoring/deployment/prometheus-stack-kube-prom-operator
    # Prometheus Operator's StatefulSet takes longer than the base infra
    # to roll out (waits for CRD readiness + admission webhook + config
    # reload). Bump the per-pod wait timeout from the default 5m to 8m.
    TIMEOUT: "8m"
  before_script:
    - apk add --no-cache bash curl
    - |
      # arch detection (same as test:k8s-apply)
      ARCH=$(uname -m)
      case "$ARCH" in
        aarch64) KARCH=arm64 ;;
        x86_64)  KARCH=amd64 ;;
        *) echo "unsupported arch: $ARCH"; exit 1 ;;
      esac
      curl -sSL "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-${KARCH}" \
        -o /usr/local/bin/kind
      chmod +x /usr/local/bin/kind
      KUBECTL_VERSION=$(curl -sL https://dl.k8s.io/release/stable.txt)
      curl -sSL "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/${KARCH}/kubectl" \
        -o /usr/local/bin/kubectl
      chmod +x /usr/local/bin/kubectl
      kubectl version --client --output=yaml | head -3
  script:
    - scripts/ci-k8s-test.sh
  after_script:
    - kind delete cluster --name "$KIND_CLUSTER" 2>/dev/null || true

# Build the Docker image and push it to the GitLab Container Registry.
#
# Two tags are pushed:
#   $CI_COMMIT_SHA      — immutable pointer to this exact commit (used for deploys)
#   $CI_COMMIT_REF_SLUG — moving pointer (e.g. "main") for convenience
#
# OCI standard labels (revision + created) are injected at build time.
#
# Only runs on the default branch and on tags — skip on every MR to
# avoid flooding the registry with images that are never deployed.
smoke-test:
  stage: deploy
  # Run in a Maven + JDK 21 image (not grafana/k6 directly): the job needs
  # `mvn spring-boot:run` to start the app, `docker compose` to bring up
  # db + kafka + redis, and `curl` + `k6` to probe. grafana/k6 is Alpine
  # with no package manager surface for Maven/Java, so we flip the image
  # and install k6 as a binary in before_script (single 70 MB download).
  # JDK 21 chosen to match the `-Dcompat` Maven profile — JDK 25 would
  # cost an extra ~150 MB image pull for no gain here.
  image: maven:3.9.14-eclipse-temurin-21-noble
  # macbook-local: shares /var/run/docker.sock with the host so docker
  # compose works (shared GitLab SaaS runners don't expose the socket).
  # Matches every other docker-heavy job in this pipeline.
  tags:
    - macbook-local
  # interruptible:true — new MRs should cancel an in-flight smoke-test
  # rather than let it finish against a stale code base. The maven repo
  # + compose stack are both recreated per-job, so cancelling mid-run
  # leaks nothing beyond what after_script already cleans up.
  interruptible: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: true
  variables:
    # K6_VERSION pinned (no floating tags per CLAUDE.md). Bump deliberately.
    K6_VERSION: "v1.4.0"
    # Compose project namespace — scoped to this job ID so parallel CI
    # runs (or the developer's local dev stack) don't share containers.
    COMPOSE_PROJECT: "ci-smoke-${CI_JOB_ID}"
    # Target inside the job container: the Spring app runs as a child
    # process on localhost:8080 (same as `mvn spring-boot:run` locally).
    # Plain HTTP — no TLS inside the job container, so K8S_SCHEME=http
    # tells smoke.js to skip https (see the K8S_SCHEME branch in smoke.js).
    K8S_HOST: "localhost:8080"
    K8S_SCHEME: "http"
  before_script:
    # Install docker CLI + compose plugin (image ships neither, but the
    # runner mounts /var/run/docker.sock). Official Docker apt repo for
    # compose v2 — the Ubuntu/Debian `docker.io` package ships EOL v1.
    - apt-get update -qq && apt-get install -y -qq curl gnupg ca-certificates
    - install -m 0755 -d /etc/apt/keyrings
    - curl -fsSL https://download.docker.com/linux/debian/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    - |
      echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
      https://download.docker.com/linux/debian $(. /etc/os-release && echo $VERSION_CODENAME) stable" \
      > /etc/apt/sources.list.d/docker.list
    - apt-get update -qq && apt-get install -y -qq docker-ce-cli docker-compose-plugin
    # Install k6 binary (much smaller than swapping to grafana/k6 image
    # which drops Maven/Java). Arch-aware: the macbook-local runner is
    # arm64, but this block works for both arms and intel.
    - |
      ARCH=$(dpkg --print-architecture)
      case "$ARCH" in
        arm64) K6_ARCH=linux-arm64 ;;
        amd64) K6_ARCH=linux-amd64 ;;
        *) echo "unsupported arch $ARCH" && exit 1 ;;
      esac
      curl -fsSLo /tmp/k6.tgz \
        "https://github.com/grafana/k6/releases/download/${K6_VERSION}/k6-${K6_VERSION}-${K6_ARCH}.tar.gz"
      tar -xzf /tmp/k6.tgz -C /tmp
      install -m 0755 "/tmp/k6-${K6_VERSION}-${K6_ARCH}/k6" /usr/local/bin/k6
      k6 version
  script:
    - |
      set -euxo pipefail

      # 1. Strip host-mode bits from compose: `container_name:` (would
      #    collide with the developer's local dev stack on the same
      #    socket) and `ports:` (host port publish — same collision
      #    risk on 5432/9092/6379). Combined with `-p $COMPOSE_PROJECT`,
      #    this gives a private bridge network with no host footprint.
      #    Python for indented-YAML reliability (sed is brittle on
      #    multi-line block scalars).
      cp docker-compose.yml /tmp/docker-compose.ci.yml
      sed -i '/^[[:space:]]*container_name:/d' /tmp/docker-compose.ci.yml
      python3 -c "
      import re
      p = '/tmp/docker-compose.ci.yml'
      with open(p) as f: txt = f.read()
      txt = re.sub(r'^( +)ports:\s*\n(\1 +- .*\n)+', '', txt, flags=re.MULTILINE)
      with open(p, 'w') as f: f.write(txt)
      "

      # 2. Bring up minimal infra only: db + kafka + redis. The `app`
      #    compose service would trigger a full Docker build of the
      #    current repo (~4 min cold) and pull Ollama/Keycloak via
      #    depends_on — we avoid that by running `mvn spring-boot:run`
      #    directly below instead.
      DB_PORT=5432 DB_USER=mirador DB_PASSWORD=mirador DB_NAME=mirador \
      SERVER_PORT=8080 \
        docker compose -p "$COMPOSE_PROJECT" -f /tmp/docker-compose.ci.yml \
          up -d db kafka redis

      # 3. Connect THIS job container to the compose bridge network so
      #    Maven can reach `db`, `kafka`, `redis` by docker DNS. Matches
      #    the e2e:kind pattern — no host port publish needed.
      JOB_CTR=$(hostname)
      NET="${COMPOSE_PROJECT}_default"
      docker network connect "$NET" "$JOB_CTR" 2>/dev/null || true

      # 4. Start Spring Boot in the background via `mvn spring-boot:run`.
      #    -Dcompat targets Java 21 (matches this job's image; the
      #    default pom profile needs JDK 25). -DskipTests skips the
      #    test phase — smoke.js is the test here.
      #    SPRING_* env vars point at compose service names instead of
      #    the default localhost addresses (which only work in the
      #    developer's host-mode dev stack).
      SPRING_DATASOURCE_URL="jdbc:postgresql://db:5432/mirador" \
      SPRING_DATASOURCE_USERNAME=mirador \
      SPRING_DATASOURCE_PASSWORD=mirador \
      SPRING_DATA_REDIS_HOST=redis \
      SPRING_DATA_REDIS_PORT=6379 \
      SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092 \
        nohup mvn $MAVEN_CLI_OPTS -Dcompat -DskipTests spring-boot:run \
          > app.log 2>&1 &
      echo $! > app.pid

      # 5. Wait up to ~4 min for /actuator/health. Cold JVM + Flyway V1-V7
      #    typically needs 60-90 s; we budget 240 s to absorb a Maven
      #    dependency re-resolve on a cold cache.
      for i in $(seq 1 120); do
        curl -sSf http://localhost:8080/actuator/health >/dev/null 2>&1 && break
        sleep 2
      done
      curl -sSf http://localhost:8080/actuator/health || { tail -120 app.log; exit 1; }

      # 6. Run the k6 smoke test. K8S_HOST + K8S_SCHEME set via the
      #    job `variables:` above propagate into k6 as __ENV.*.
      k6 run scripts/load-test/smoke.js
  after_script:
    # Always stop compose + kill the Maven child process, even on
    # failure or cancellation. `|| true` everywhere — after_script must
    # not itself fail the job (hides the real error from the user).
    - |
      [ -f app.pid ] && kill "$(cat app.pid)" 2>/dev/null || true
    - |
      docker compose -p "$COMPOSE_PROJECT" -f /tmp/docker-compose.ci.yml down -v || true
  artifacts:
    when: always
    paths:
      - smoke-summary.json
      # App log is useful when the startup wait fails — without it the
      # user sees only "exit 1" and has to re-run to diagnose. Path is
      # relative to $CI_PROJECT_DIR so GitLab can archive it.
      - app.log
    expire_in: 30 days

# ── load-test:nightly — sustained k6 run against the GKE endpoint ─────────────
#
# Phase 3 T2. Where smoke-test answers "does it respond at all?" in 30 s,
# load-test:nightly answers "does it hold up under demo-realistic sustained
# traffic for 5 minutes?". Runs against the live GKE endpoint (no compose
# setup), so the stack it exercises includes the real ingress + cloud SQL
# backend. Results are kept as artefacts (30-day retention) so trend
# regression is spotted by diffing consecutive nightly summaries.
#
# Only fires on the nightly scheduled pipeline with $LOAD_TEST=true (set on
# the dedicated schedule in GitLab → CI/CD → Schedules). Not gated on MRs —
# a 5-minute perf job would slow review latency without adding value the
# smoke-test doesn't already provide.
#
# If thresholds fail, the job goes red and the next day's scheduled run
# will notice (no separate Slack alert — see ADR-0048 for the no-routing
# decision).
load-test:nightly:
  stage: deploy
  # Alpine + curl + k6 is enough; no Java/Maven needed since the target is
  # already deployed. Keeps image pull under 20 MB.
  image: alpine:3.19
  tags:
    - macbook-local
  rules:
    # Scheduled with $LOAD_TEST=true — decouples from other scheduled
    # pipelines (native-build, report generation) that run on their own
    # separate schedules.
    - if: $CI_PIPELINE_SOURCE == "schedule" && $LOAD_TEST == "true"
    # Also runnable manually from main for on-demand capacity checks.
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: true
    - when: never
  interruptible: false   # A new schedule should NOT cancel an in-flight load test
  variables:
    K6_VERSION: "v1.4.0"
    # GKE endpoint — the same K8S_HOST protected variable used by smoke-test.
    # Default here keeps the manual-run mode self-documenting.
    K8S_HOST: "$K8S_HOST"
    K8S_SCHEME: "https"
  before_script:
    # Alpine dependency: curl + tar + ca-certificates.
    - apk add --no-cache curl tar ca-certificates
    # k6 binary, same pin as smoke-test for cross-job consistency.
    - |
      ARCH=$(uname -m)
      case "$ARCH" in
        aarch64|arm64) K6_ARCH=linux-arm64 ;;
        x86_64|amd64)  K6_ARCH=linux-amd64 ;;
        *) echo "unsupported arch $ARCH" && exit 1 ;;
      esac
      curl -fsSLo /tmp/k6.tgz \
        "https://github.com/grafana/k6/releases/download/${K6_VERSION}/k6-${K6_VERSION}-${K6_ARCH}.tar.gz"
      tar -xzf /tmp/k6.tgz -C /tmp
      install -m 0755 "/tmp/k6-${K6_VERSION}-${K6_ARCH}/k6" /usr/local/bin/k6
      k6 version
  script:
    - k6 run scripts/load-test/load.js
  artifacts:
    when: always
    paths:
      - load-summary.json
    expire_in: 30 days

# deploy:gke was retired with ADR-0025 — Argo CD (ADR-0015) reconciles the
# GKE overlay from main on every commit, and overlays/gke/image-tags-patch.yaml
# pins to :main (pushed by docker-build on every main merge) so a new image
# propagates without a manifest edit. The ~90-line CI job is redundant plumbing.
#
# If you ever need a one-off apply outside Argo CD (e.g. debug a bad sync),
# use bin/cluster/connect-prod.sh + bin/cluster/demo/up.sh or kubectl apply -k from your
# laptop — same code path, no WIF credentials in CI.

# ── AWS EKS — manual ──────────────────────────────────────────────────────────
#
# Elastic Kubernetes Service: managed control plane, self-managed node groups
# or Fargate (serverless nodes). Uses the AWS credentials in the CI variables
# to update the local kubeconfig via `aws eks update-kubeconfig`.
