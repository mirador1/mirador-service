# ── stage: reports ────────────────────────────────────────────────────────────

# Generates the full quality report suite and pushes it to the `reports/` branch.
#
# Why a separate scheduled pipeline?
#   `mvn site` + TypeDoc take ~3-5 minutes; running them on every push would double
#   the pipeline time and block the fast-feedback loop for developers. Instead this
#   job runs once a day (or on demand) so the reports are always fresh without
#   slowing regular code-review pipelines.
#
# How to enable:
#   1. In GitLab → Settings → CI/CD → Project Access Tokens, create a token with:
#        Role: Reporter, Scopes: api + write_repository, Expiry: 90 days
#      Save the token value as CI variable GITLAB_REPORTS_TOKEN (masked, protected).
#   2. In GitLab → CI/CD → Schedules, add a new schedule:
#        Description: "Daily report generation"
#        Cron: 0 2 * * *   (02:00 UTC — low-traffic hour)
#        Branch: main
#        Variable: REPORT_PIPELINE = true
#
# What it generates:
#   - Maven site: Surefire, Failsafe, JaCoCo, SpotBugs, Javadoc (target/site/)
#   - These are pushed to the `reports/` branch as static files browsable via GitLab
#     Pages or served by the optional nginx container in docker-compose.yml.
#
# TypeDoc (Angular/TypeScript docs) is a future addition tracked in TASKS.md —
# the Angular frontend repo needs `typedoc` added to its package.json first.
mutation-test:
  stage: reports
  image: maven:3.9.14-eclipse-temurin-25-noble
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $REPORT_PIPELINE == "true"
      when: on_success
    - when: manual
      allow_failure: true
  needs:
    - job: unit-test
      artifacts: true     # PIT runs under the same JaCoCo classpath
  variables:
    # The PIT ITs need Postgres/Kafka/Redis running for SpringBoot
    # context tests. Drop to skip-tests if the timeout becomes an issue.
    PIT_THREADS: 4
  script:
    # `pitest:mutationCoverage` is a separate goal, NOT part of `verify`.
    # See ADR-0034 — Keycloak ITs are tag-gated and excluded here too.
    # IMPORTANT: keep this on one line. Backslash-newline continuations
    # in GitLab CI YAML script entries are NOT interpreted by the shell —
    # they're passed verbatim, which means Maven sees `\` as a separate
    # arg and the next ` -D…` as an unknown phase. Pipeline #500 died
    # this way before we collapsed the line.
    - mvn $MAVEN_CLI_OPTS test-compile pitest:mutationCoverage -DexcludedGroups=keycloak-heavy -Dpit.threads=$PIT_THREADS
  artifacts:
    when: always
    paths:
      - target/pit-reports/    # HTML mutation report — browse via job's "Browse" button
    expire_in: 30 days

# ── stage: native ─────────────────────────────────────────────────────────────

# Build a GraalVM native image and push it to the GitLab Container Registry.
#
# Why native?
#   Native images start in ~50 ms (vs ~3–5 s for JVM) and use ~50 MB RSS
#   (vs ~250 MB for JVM), making them ideal for serverless, Kubernetes with
#   tight memory limits, or Lambda-style deployments.
#
# Build pipeline (Dockerfile.native):
#   Stage 1 — ghcr.io/graalvm/native-image-community:25
#     1. Spring Boot AOT processing (process-aot): generates reflection hints,
#        proxy classes and resource configuration under target/spring-aot/.
#     2. native:compile: invokes GraalVM native-image on the AOT output,
#        producing a statically-linked binary at target/customerservice.
#   Stage 2 — debian:bookworm-slim (no JDK)
#     Copies only the binary — no JVM, no Maven, no source code.
#
# Tags pushed:
#   native-$CI_COMMIT_SHA      — immutable pointer for deployments
#   native-$CI_COMMIT_REF_SLUG — moving pointer (e.g. "native-main")
#
# Runs only on the default branch and on tags; skipped on every MR because
# the build takes 5–15 minutes and is not needed for code review feedback.
#
# [GraalVM Community 25 / Spring Boot 4 AOT] — -Pnative profile in pom.xml.
