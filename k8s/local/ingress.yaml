# =============================================================================
# Local (kind) Ingress — HTTP only, no TLS, no cert-manager.
#
# Used by `./run.sh k8s-local` in place of k8s/ingress.yaml which is
# designed for production (cert-manager + Let's Encrypt + HTTPS).
#
# K8S_HOST is set to mirador.127.0.0.1.nip.io by the k8s-local script.
# nip.io resolves *.127.0.0.1.nip.io → 127.0.0.1, so the app is
# reachable at http://mirador.127.0.0.1.nip.io:8090 on the host.
#
# Routing (same as production):
#   /api/(.*) → customer-service:8080/$1   (backend, strip /api prefix)
#   /(.*)     → customer-ui:80             (Angular SPA)
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mirador-ingress
  namespace: app
  labels:
    app.kubernetes.io/name: mirador-ingress
    app.kubernetes.io/part-of: mirador
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: "/$2"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "90"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "90"
    # WebSocket support — nginx-ingress natively handles Upgrade headers
    # when proxy-http-version is 1.1. No configuration-snippet needed
    # (disabled by default since nginx-ingress 1.9+).
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
spec:
  ingressClassName: nginx
  rules:
    - host: "${K8S_HOST}"
      http:
        paths:
          # /api/(...) → backend (strip /api prefix via rewrite-target /$2)
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: customer-service
                port:
                  number: 8080
          # All other paths → Angular SPA
          - path: /()(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: customer-ui
                port:
                  number: 80
