# =============================================================================
# GitHub Actions — CI pipeline — two lanes:
#
# REGULAR pipeline (every push + PR) — fast lane:
#   lint          hadolint Dockerfile linting
#   test          unit-test (surefire) + JaCoCo unit exec
#   integration   failsafe (*ITest) + SpotBugs + JaCoCo merged coverage
#   package       build-jar + docker-build (main/tags only)
#
# SCHEDULED pipeline (daily at 03:00 UTC, main branch only) — slow lane:
#   native        build-native — GraalVM AOT native image (5-15 min)
#                 only runs if Dockerfile.native, pom.xml, or src/ changed
#
# Docker availability:
#   GitHub-hosted ubuntu-latest runners include Docker, so Testcontainers
#   works without any DinD service or special setup — unlike GitLab CI which
#   requires `services: docker:28-dind`.
#
# PostgreSQL for tests:
#   Integration tests use the Testcontainers JDBC URL
#   `jdbc:tc:postgresql:17:///demo` (defined in src/test/resources/application.properties).
#   Testcontainers pulls the image and starts the container automatically.
#
# Kafka for tests:
#   AbstractIntegrationTest starts a KafkaContainer (Testcontainers) and registers
#   its bootstrap-servers via @DynamicPropertySource.
# =============================================================================
name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
  # Daily native build — runs at 03:00 UTC to avoid peak-hour billing usage.
  # Gated by paths-filter: skips the GraalVM compile if no relevant files changed.
  schedule:
    - cron: '0 3 * * *'
  # Manual trigger: useful for forcing a native rebuild after a non-source change
  # (e.g. base image upgrade in Dockerfile.native) without waiting for the schedule.
  workflow_dispatch:

# Cancel in-flight runs for the same PR/branch when a new commit is pushed,
# equivalent to GitLab's `interruptible: true`.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Maven cache lives in ~/.m2/repository; actions/setup-java handles it.
env:
  MAVEN_OPTS: "-Dmaven.repo.local=${{ github.workspace }}/.m2/repository"
  MAVEN_ARGS: "--batch-mode --errors --fail-at-end --show-version --no-transfer-progress"

# ── shared setup step (referenced inline in each job) ────────────────────────
# GitHub Actions has no top-level `default:` image like GitLab, so each job
# specifies `runs-on: ubuntu-24.04` and calls the setup steps explicitly.

# =============================================================================
# Stage: lint
# =============================================================================

jobs:

  # ---------------------------------------------------------------------------
  # Lint the Dockerfile with Hadolint.
  # Catches common mistakes: root USER, unpinned base images, apt without
  # --no-install-recommends, etc. Runs in seconds before any compilation.
  # ---------------------------------------------------------------------------
  hadolint:
    name: Lint / Dockerfile
    runs-on: ubuntu-24.04
    # Skip on scheduled and manual runs — those triggers are reserved exclusively
    # for the GraalVM native build (slow lane). The Dockerfile was already linted
    # when the code landed on main via the regular pipeline, so re-linting unchanged
    # code adds no value.
    if: github.event_name != 'schedule' && github.event_name != 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint Dockerfile
        # hadolint/hadolint-action wraps the official Hadolint binary.
        # Uses the same rules as the GitLab job:
        #   DL3002 — last USER must not be root (security)
        #   DL3007 — do not use latest tag for base image (reproducibility)
        #   DL3008 — pin apt package versions (reproducibility)
        #   SC2xxx — ShellCheck rules applied to RUN instructions (shell bugs)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

# =============================================================================
# Stage: test (unit tests — no Docker)
# =============================================================================

  # ---------------------------------------------------------------------------
  # Unit tests only — *ITest classes excluded via the maven-surefire-plugin
  # `excludes` configuration in pom.xml. Runs fast without any containers.
  #
  # Produces two artifacts forwarded to the integration job:
  #   target/jacoco.exec        — unit coverage data for JaCoCo merge
  #   target/surefire-reports/  — JUnit XML for GitHub test annotations
  # ---------------------------------------------------------------------------
  unit-test:
    name: Test / Unit
    runs-on: ubuntu-24.04
    # Skip on scheduled and manual runs — those triggers are reserved exclusively
    # for the GraalVM native build (slow lane). The code was already tested
    # when it landed on main via the regular pipeline, so re-running adds no value.
    if: github.event_name != 'schedule' && github.event_name != 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven    # caches ~/.m2/repository between runs keyed on pom.xml hash

      - name: Run unit tests
        # surefire phase only — failsafe (ITests) skipped, no Docker required
        run: mvn $MAVEN_ARGS test

      - name: Publish unit test report
        # Annotates PRs with per-test pass/fail details directly in the GitHub UI
        uses: dorny/test-reporter@v2
        if: always()    # run even if tests failed so the report is always published
        with:
          name: Unit Test Results
          path: target/surefire-reports/*.xml    # JUnit XML produced by maven-surefire-plugin
          reporter: java-junit                   # parser format matching the surefire XML schema
          fail-on-error: false                   # test failures are already reported by Maven; don't fail the step a second time

      - name: Upload JaCoCo unit exec
        # Forwarded to integration-test job so both exec files can be merged
        uses: actions/upload-artifact@v4    # stores files between jobs (artifacts don't persist in the runner workspace)
        with:
          name: jacoco-unit-exec
          path: |
            target/jacoco.exec       # binary coverage data — merged with IT exec in integration-test job
            target/site/jacoco/      # HTML report for browsing unit coverage in the GitHub UI
          retention-days: 7          # short-lived: only needed until the integration job completes

# =============================================================================
# Stage: integration (needs Docker for Testcontainers)
# =============================================================================

  # ---------------------------------------------------------------------------
  # Integration tests (*ITest) via maven-failsafe.
  # Testcontainers starts real PostgreSQL 17 and Kafka containers using the
  # Docker daemon already present on ubuntu-latest — no DinD service required.
  #
  # At the verify phase Maven also runs:
  #   • SpotBugs:check  — static bytecode analysis (Medium+ → build failure)
  #   • JaCoCo:merge    — merges unit exec (from artifact) + IT exec
  #   • JaCoCo:check    — fails if merged instruction coverage < 60 %
  # ---------------------------------------------------------------------------
  integration-test:
    name: Test / Integration + SpotBugs + Coverage
    runs-on: ubuntu-24.04
    # Skip on scheduled and manual runs — those triggers are reserved exclusively
    # for the GraalVM native build (slow lane). The code was already tested
    # when it landed on main via the regular pipeline, so re-running adds no value.
    if: github.event_name != 'schedule' && github.event_name != 'workflow_dispatch'
    needs: unit-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Download JaCoCo unit exec
        # Pulls the unit coverage data produced by the previous job so that
        # the JaCoCo:merge goal can combine unit + IT coverage into one report.
        uses: actions/download-artifact@v4    # restores files uploaded by a previous job (artifacts don't persist in the runner workspace)
        with:
          name: jacoco-unit-exec
          path: target/

      - name: Run integration tests + SpotBugs + coverage gate
        # -Dsurefire.skip=true: unit tests already passed in the previous job.
        # failsafe, SpotBugs, and JaCoCo still run at the verify phase.
        run: mvn $MAVEN_ARGS verify -Dsurefire.skip=true

      - name: Publish integration test report
        uses: dorny/test-reporter@v2
        if: always()    # run even if tests failed so the report is always published
        with:
          name: Integration Test Results
          path: target/failsafe-reports/*.xml    # JUnit XML produced by maven-failsafe-plugin
          reporter: java-junit                   # parser format matching the failsafe XML schema
          fail-on-error: false                   # test failures are already reported by Maven; don't fail the step a second time

      - name: Upload coverage + SpotBugs reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reports-integration
          path: |
            target/site/jacoco-it/
            target/spotbugsXml.xml
          retention-days: 7

# =============================================================================
# Stage: package
# =============================================================================

  # ---------------------------------------------------------------------------
  # Build the executable Spring Boot fat JAR.
  # Tests are skipped — they already passed in the test + integration stages.
  # ---------------------------------------------------------------------------
  build-jar:
    name: Package / JAR
    runs-on: ubuntu-24.04
    # Skip on scheduled and manual runs — those triggers are reserved exclusively
    # for the GraalVM native build (slow lane). The code was already tested
    # when it landed on main via the regular pipeline, so re-running adds no value.
    if: github.event_name != 'schedule' && github.event_name != 'workflow_dispatch'
    needs: [ unit-test, integration-test ]    # both test gates must pass before producing the artifact
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven    # caches ~/.m2/repository between runs keyed on pom.xml hash

      - name: Build JAR
        run: mvn $MAVEN_ARGS -DskipTests package

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: customer-service-jar
          path: target/*.jar    # Spring Boot fat JAR (includes embedded Tomcat + all dependencies)
          retention-days: 7     # short-lived: for manual download or downstream deploy jobs

  # ---------------------------------------------------------------------------
  # Build the Docker image and push it to GitHub Container Registry (GHCR).
  #
  # Two tags are pushed — same strategy as GitLab CI:
  #   sha-<commit>   — immutable pointer for deployments
  #   main           — moving pointer for convenience
  #
  # OCI standard labels (revision + created) injected at build time.
  #
  # Only runs on the default branch (main) and on tags — skip on every PR to
  # avoid flooding GHCR with images that are never deployed.
  # ---------------------------------------------------------------------------
  docker-build:
    name: Package / Docker → GHCR
    runs-on: ubuntu-24.04
    needs: [ unit-test, integration-test ]    # both test gates must pass before producing the image
    # Only on main branch or version tags, and never on scheduled/manual runs
    if: |
      (github.event_name != 'schedule' && github.event_name != 'workflow_dispatch') &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    permissions:
      contents: read    # needed to checkout the repository
      # Required to push images to ghcr.io/<owner>/<repo>
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io                          # GitHub Container Registry
          username: ${{ github.actor }}              # GitHub user or bot that triggered the workflow
          password: ${{ secrets.GITHUB_TOKEN }}      # auto-provisioned token, no manual secret needed

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          # sha-<short> tag + branch/tag name (mirrors GitLab: $CI_COMMIT_SHA + $CI_COMMIT_REF_SLUG)
          tags: |
            type=sha,prefix=sha-      # immutable pointer — e.g. sha-a1b2c3d — used for deployments
            type=ref,event=branch     # moving pointer — e.g. main — for convenience
            type=ref,event=tag        # version tag — e.g. v1.2.0 — when pushing a git tag

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}      # all tags computed by the metadata step above
          labels: ${{ steps.meta.outputs.labels }}  # OCI standard labels (revision, created, …) injected at build time
          # Layer cache: reuse layers from the last push to the same branch
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache              # pull cached layers before building
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache,mode=max      # push all layers (not just final stage) for maximum cache reuse

# =============================================================================
# Stage: native (scheduled daily + manual trigger only)
# =============================================================================

  # ---------------------------------------------------------------------------
  # Build a GraalVM native image and push it to GHCR.
  #
  # Why run on schedule and not on every main push?
  #   AOT compilation takes 5-15 minutes of CPU. Running it on every commit
  #   wastes CI time and GitHub Actions minutes. The daily schedule on main is
  #   sufficient — native images are deployment artefacts, not code-review gates.
  #
  # Change detection:
  #   dorny/paths-filter compares HEAD to the previous commit on main.
  #   If none of Dockerfile.native / pom.xml / src/** changed, the job is skipped.
  #   This means: on days with no code changes the job exits in ~10 seconds.
  #
  # Tags pushed (same pattern as JVM Docker image):
  #   native-sha-<short>   — immutable pointer for deployments
  #   native-main          — moving pointer for convenience
  #
  # [GraalVM Community 25 / Spring Boot 4 AOT]
  # ---------------------------------------------------------------------------
  build-native:
    name: Native / GraalVM -> GHCR
    runs-on: ubuntu-24.04
    # Runs only on: schedule (daily 03:00 UTC) and workflow_dispatch (manual)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'    # inverse of the regular pipeline condition
    permissions:
      contents: read    # needed to checkout the repository
      packages: write   # needed to push the native image to GHCR
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch last 2 commits so paths-filter can compare HEAD~1..HEAD
          fetch-depth: 2

      # Check if native-relevant files changed since the previous commit.
      # On the daily schedule this covers "any change since yesterday's build".
      # outputs.native == 'true' → at least one watched file changed.
      - name: Check for native-relevant changes
        id: filter        # referenced as steps.filter.outputs.native in subsequent steps
        uses: dorny/paths-filter@v3
        with:
          filters: |
            native:
              - 'Dockerfile.native'    # base image or build instructions changed
              - 'pom.xml'              # dependencies or plugin config changed
              - 'src/**'               # application source code changed

      - name: Log in to GHCR
        # Only authenticate when we're actually going to build — saves a round-trip on skips
        if: steps.filter.outputs.native == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata for native image
        id: meta
        if: steps.filter.outputs.native == 'true'    # skip metadata computation when no build will happen
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          # Prefix all native tags with "native-" to distinguish from JVM images
          tags: |
            type=sha,prefix=native-sha-              # immutable pointer — e.g. native-sha-a1b2c3d — used for deployments
            type=ref,event=branch,prefix=native-     # moving pointer — e.g. native-main — for convenience

      - name: Build and push GraalVM native image
        # Skip entirely when no relevant file changed — saves 5-15 minutes of CPU
        if: steps.filter.outputs.native == 'true'
        uses: docker/build-push-action@v6
        timeout-minutes: 30    # AOT compilation is CPU-intensive; default 6h is far too loose
        with:
          context: .
          file: Dockerfile.native
          push: true
          tags: ${{ steps.meta.outputs.tags }}      # all tags computed by the metadata step above
          labels: ${{ steps.meta.outputs.labels }}  # OCI standard labels (revision, created, …) injected at build time
          # Native image layers are almost entirely unique per build — cache still helps
          # for the Maven download layer (Stage 1) and the base image (Stage 2).
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:native-buildcache              # pull cached layers before building
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}:native-buildcache,mode=max      # push all layers (not just final stage) for maximum cache reuse

      - name: Skip notification
        if: steps.filter.outputs.native == 'false'    # complement of the build condition — one of the two always runs
        run: echo "No native-relevant files changed — skipping GraalVM build."
