# =============================================================================
# GitHub Actions — CI pipeline
#
# Mirrors the GitLab CI pipeline in .gitlab-ci.yml so developers working from
# a GitHub mirror/fork get the same safety net. Deploy jobs (deploy:gke,
# terraform-apply, etc.) are NOT mirrored — production deployment remains
# GitLab-only to avoid drift in the WIF/Cloud-SQL/K8s setup.
#
# REGULAR pipeline (every push + PR) — fast lane, runs by default:
#   lint / quality         hadolint · code-quality (PMD + Checkstyle)
#   test                   unit-test · owasp-dependency-check · semgrep (SAST)
#   integration            failsafe (*ITest) + SpotBugs + JaCoCo merged coverage
#   package                build-jar · docker-build · trivy:scan (CVE)
#   sonar                  sonar-analysis (SonarCloud)
#   compat                 SB4×Java21 · SB4×Java17 · SB3×Java21 · SB3×Java17
#
# SCHEDULED pipeline (daily at 03:00 UTC, main branch only) — slow lane:
#   native                 build-native — GraalVM AOT native image (5-15 min)
#                          only runs if Dockerfile.native, pom.xml, or src/ changed
#
# Docker availability:
#   GitHub-hosted ubuntu-latest runners include Docker, so Testcontainers
#   works without any DinD service or special setup — unlike GitLab CI which
#   requires `services: docker:28-dind`.
#
# Secrets expected:
#   SONAR_TOKEN            — SonarCloud token (matches GitLab's SONAR_TOKEN)
#   GITHUB_TOKEN           — auto-provisioned by GitHub; used for GHCR push
# =============================================================================
name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
  # Daily native build — runs at 03:00 UTC to avoid peak-hour billing usage.
  # Gated by paths-filter: skips the GraalVM compile if no relevant files changed.
  schedule:
    - cron: '0 3 * * *'
  # Manual trigger: useful for forcing a native rebuild after a non-source change
  # (e.g. base image upgrade in Dockerfile.native) without waiting for the schedule.
  workflow_dispatch:

# Cancel in-flight runs for the same PR/branch when a new commit is pushed,
# equivalent to GitLab's `interruptible: true`.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Maven cache lives in ~/.m2/repository; actions/setup-java handles it.
env:
  MAVEN_OPTS: "-Dmaven.repo.local=${{ github.workspace }}/.m2/repository"
  MAVEN_ARGS: "--batch-mode --errors --fail-at-end --show-version --no-transfer-progress"

# ── shared setup step (referenced inline in each job) ────────────────────────
# GitHub Actions has no top-level `default:` image like GitLab, so each job
# specifies `runs-on: ubuntu-24.04` and calls the setup steps explicitly.

# =============================================================================
# Stage: lint
# =============================================================================

jobs:

  # ---------------------------------------------------------------------------
  # Lint the Dockerfile with Hadolint.
  # Catches common mistakes: root USER, unpinned base images, apt without
  # --no-install-recommends, etc. Runs in seconds before any compilation.
  # ---------------------------------------------------------------------------
  hadolint:
    name: Lint / Dockerfile
    runs-on: ubuntu-24.04
    # Skip on scheduled and manual runs — those triggers are reserved exclusively
    # for the GraalVM native build (slow lane). The Dockerfile was already linted
    # when the code landed on main via the regular pipeline, so re-linting unchanged
    # code adds no value.
    if: github.event_name != 'schedule' && github.event_name != 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint Dockerfile
        # hadolint/hadolint-action wraps the official Hadolint binary.
        # Uses the same rules as the GitLab job:
        #   DL3002 — last USER must not be root (security)
        #   DL3007 — do not use latest tag for base image (reproducibility)
        #   DL3008 — pin apt package versions (reproducibility)
        #   SC2xxx — ShellCheck rules applied to RUN instructions (shell bugs)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

# =============================================================================
# Stage: test (unit tests — no Docker)
# =============================================================================

  # ---------------------------------------------------------------------------
  # Unit tests only — *ITest classes excluded via the maven-surefire-plugin
  # `excludes` configuration in pom.xml. Runs fast without any containers.
  #
  # Produces two artifacts forwarded to the integration job:
  #   target/jacoco.exec        — unit coverage data for JaCoCo merge
  #   target/surefire-reports/  — JUnit XML for GitHub test annotations
  # ---------------------------------------------------------------------------
  unit-test:
    name: Test / Unit
    runs-on: ubuntu-24.04
    if: github.event_name != 'schedule' && github.event_name != 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven    # caches ~/.m2/repository between runs keyed on pom.xml hash

      - name: Run unit tests
        # surefire phase only — failsafe (ITests) skipped, no Docker required
        run: mvn $MAVEN_ARGS test

      - name: Publish unit test report
        # Annotates PRs with per-test pass/fail details directly in the GitHub UI
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Unit Test Results
          path: target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload JaCoCo unit exec
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-unit-exec
          path: |
            target/jacoco.exec
            target/site/jacoco/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # OWASP Dependency-Check — scans Maven deps against the NVD for known CVEs.
  #
  # The NVD database is ~240 MB; caching it across runs brings the warm path
  # down from 15 min (cold first download) to ~2 min. The cache key is stable
  # ("owasp-nvd-db-v1") so it's shared across every branch and PR. Bump the
  # suffix to force a full rebuild.
  #
  # allow_failure equivalent: `continue-on-error: true` keeps the pipeline
  # green even when NVD is slow or a new false positive lands — CVE triage
  # happens in the published HTML report, not as a merge-blocker.
  # ---------------------------------------------------------------------------
  owasp-dependency-check:
    name: Test / OWASP Dependency-Check
    runs-on: ubuntu-24.04
    if: github.event_name != 'schedule' && github.event_name != 'workflow_dispatch'
    continue-on-error: true   # GitLab parity: `allow_failure: true`
    timeout-minutes: 120      # NVD full download ~60 min on first run
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Restore NVD cache
        uses: actions/cache@v4
        with:
          path: .owasp-data
          # Stable key shared across all branches — matches the GitLab job's
          # "owasp-nvd-db-v1" cache. Bump the suffix to force a full rebuild.
          key: owasp-nvd-db-v1

      - name: Run OWASP Dependency-Check
        run: mvn $MAVEN_ARGS dependency-check:check

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-dependency-check-report
          path: target/dependency-check-report.html
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Semgrep SAST — static code analysis for security bugs (injection, XSS,
  # hardcoded secrets, crypto misuse).
  #
  # Uses the auto-config ruleset which picks rules based on the languages
  # detected in the repo. Results upload as SARIF → visible under the
  # "Security" tab of the repository.
  # ---------------------------------------------------------------------------
  semgrep:
    name: Test / Semgrep SAST
    runs-on: ubuntu-24.04
    if: github.event_name != 'schedule' && github.event_name != 'workflow_dispatch'
    continue-on-error: true
    permissions:
      security-events: write   # needed to upload SARIF results to the Security tab
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: p/default
          generateSarif: "1"

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

# =============================================================================
# Stage: integration (needs Docker for Testcontainers)
# =============================================================================

  # ---------------------------------------------------------------------------
  # Integration tests (*ITest) via maven-failsafe.
  # Testcontainers starts real PostgreSQL 17 and Kafka containers using the
  # Docker daemon already present on ubuntu-latest — no DinD service required.
  #
  # At the verify phase Maven also runs:
  #   • SpotBugs:check  — static bytecode analysis (Medium+ → build failure)
  #   • JaCoCo:merge    — merges unit exec (from artifact) + IT exec
  #   • JaCoCo:check    — fails if merged instruction coverage < 60 %
  # ---------------------------------------------------------------------------
  integration-test:
    name: Test / Integration + SpotBugs + Coverage
    runs-on: ubuntu-24.04
    if: github.event_name != 'schedule' && github.event_name != 'workflow_dispatch'
    needs: unit-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Download JaCoCo unit exec
        uses: actions/download-artifact@v4
        with:
          name: jacoco-unit-exec
          path: target/

      - name: Run integration tests + SpotBugs + coverage gate
        # -Dsurefire.skip=true: unit tests already passed in the previous job.
        # failsafe, SpotBugs, and JaCoCo still run at the verify phase.
        run: mvn $MAVEN_ARGS verify -Dsurefire.skip=true

      - name: Publish integration test report
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Integration Test Results
          path: target/failsafe-reports/*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload coverage + SpotBugs reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reports-integration
          path: |
            target/site/jacoco-it/
            target/spotbugsXml.xml
          retention-days: 7

# =============================================================================
# Stage: sonar (depends on integration-test for JaCoCo merged coverage)
# =============================================================================

  # ---------------------------------------------------------------------------
  # SonarCloud analysis — static analysis (smells, bugs, vulnerabilities,
  # hotspots) + merged coverage integration so Sonar's "New Code Coverage"
  # gate works correctly.
  #
  # Uses `mvn compile` first because sonar-scanner needs target/classes to
  # exist — running `mvn sonar:sonar` alone does not trigger a compile.
  # ---------------------------------------------------------------------------
  sonar-analysis:
    name: Sonar / SonarCloud
    runs-on: ubuntu-24.04
    if: github.event_name != 'schedule' && github.event_name != 'workflow_dispatch'
    continue-on-error: true   # Sonar outage must not block merges
    needs: integration-test   # pulls JaCoCo XML for coverage merge
    env:
      # Required by Sonar to match the analysis to the project on sonarcloud.io.
      # Configure as a repo secret in Settings → Secrets and variables → Actions.
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history — Sonar needs it for accurate blame

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Download integration artifacts (coverage + SpotBugs)
        uses: actions/download-artifact@v4
        with:
          name: reports-integration
          path: target/

      - name: Skip if SONAR_TOKEN is not set
        id: check-token
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "Skipping SonarCloud analysis — SONAR_TOKEN secret not configured."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compile (Sonar needs target/classes/)
        if: steps.check-token.outputs.skip == 'false'
        run: mvn $MAVEN_ARGS compile -DskipTests -Djacoco.skip=true

      - name: Run SonarCloud analysis
        if: steps.check-token.outputs.skip == 'false'
        run: |
          mvn $MAVEN_ARGS sonar:sonar \
            -Dsonar.token="$SONAR_TOKEN" \
            -Dsonar.host.url="https://sonarcloud.io"

# =============================================================================
# Stage: quality (runs in parallel with integration — informational only)
# =============================================================================

  # ---------------------------------------------------------------------------
  # PMD + Checkstyle — catches style violations, bug patterns, duplicate code.
  # Produces XML reports archived as GitHub artifacts for download. The
  # GitLab equivalent also converts to the GitLab Code Quality JSON widget
  # format; GitHub has no native equivalent, so we keep the raw reports.
  # ---------------------------------------------------------------------------
  code-quality:
    name: Quality / PMD + Checkstyle
    runs-on: ubuntu-24.04
    if: github.event_name != 'schedule' && github.event_name != 'workflow_dispatch'
    continue-on-error: true   # informational, never block merges
    needs: integration-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        # Java 21 for PMD + Checkstyle: their own parsers (not javac) don't fully
        # support Java 25 preview syntax yet. Analysis scope is unchanged.
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run PMD + Checkstyle
        # -Dcompat: activates the Java 21 source overlay (ScopedValue → ThreadLocal shim)
        # -Preport-static: enables maven-pmd-plugin and maven-checkstyle-plugin
        # -DskipTests -DskipITs: tests already ran in unit + integration jobs
        run: |
          mvn $MAVEN_ARGS verify \
            -Dcompat -Preport-static \
            -DskipTests -DskipITs \
            -Djacoco.skip=true

      - name: Upload PMD + Checkstyle XML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: code-quality-reports
          path: |
            target/pmd.xml
            target/checkstyle-result.xml
          retention-days: 7

# =============================================================================
# Stage: compat (runs in parallel — validates SB3/SB4 × Java 17/21)
# =============================================================================

  # ---------------------------------------------------------------------------
  # Compatibility matrix: 4 (Spring Boot × Java version) combinations.
  #
  # Default build (without any of these) is SB4 + Java 25 — covered by the
  # unit-test + integration-test jobs above. These four extra jobs guarantee
  # the codebase still compiles and tests green under the supported downgrade
  # combinations (documented as first-class variants in the README).
  #
  # allow_failure equivalent via continue-on-error — a failed compat target
  # is a known regression to address, not a release blocker.
  # ---------------------------------------------------------------------------
  compat:
    name: Compat / ${{ matrix.name }}
    runs-on: ubuntu-24.04
    if: github.event_name != 'schedule' && github.event_name != 'workflow_dispatch'
    continue-on-error: true
    strategy:
      fail-fast: false        # one failing combo must not cancel the others
      matrix:
        include:
          - name: SB4 · Java 21
            java: '21'
            mvn-flags: '-Dcompat'
          - name: SB4 · Java 17
            java: '17'
            mvn-flags: '-Dcompat -Djava17'
          - name: SB3 · Java 21
            java: '21'
            mvn-flags: '-Dsb3'
          - name: SB3 · Java 17
            java: '17'
            mvn-flags: '-Dsb3 -Djava17'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: mvn verify ${{ matrix.mvn-flags }}
        run: mvn $MAVEN_ARGS verify ${{ matrix.mvn-flags }}

      - name: Publish test report
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: ${{ matrix.name }} tests
          path: |
            target/surefire-reports/*.xml
            target/failsafe-reports/*.xml
          reporter: java-junit
          fail-on-error: false

# =============================================================================
# Stage: package
# =============================================================================

  # ---------------------------------------------------------------------------
  # Build the executable Spring Boot fat JAR.
  # Tests are skipped — they already passed in the test + integration stages.
  # ---------------------------------------------------------------------------
  build-jar:
    name: Package / JAR
    runs-on: ubuntu-24.04
    if: github.event_name != 'schedule' && github.event_name != 'workflow_dispatch'
    needs: [ unit-test, integration-test ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build JAR
        run: mvn $MAVEN_ARGS -DskipTests package

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: customer-service-jar
          path: target/*.jar
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Build the Docker image and push it to GitHub Container Registry (GHCR).
  #
  # Two tags are pushed — same strategy as GitLab CI:
  #   sha-<commit>   — immutable pointer for deployments
  #   main           — moving pointer for convenience
  #
  # OCI standard labels (revision + created) injected at build time.
  #
  # Only runs on the default branch (main) and on tags — skip on every PR to
  # avoid flooding GHCR with images that are never deployed.
  # ---------------------------------------------------------------------------
  docker-build:
    name: Package / Docker → GHCR
    runs-on: ubuntu-24.04
    needs: [ unit-test, integration-test ]
    if: |
      (github.event_name != 'schedule' && github.event_name != 'workflow_dispatch') &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=tag

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache,mode=max

  # ---------------------------------------------------------------------------
  # Trivy — CVE scan of the JVM Docker image we just pushed.
  #
  # Trivy pulls the image straight from the registry — no DinD, no privileged
  # mode needed. SARIF output uploads to the GitHub Security tab so CVEs
  # surface in the same place as Semgrep findings.
  #
  # continue-on-error parity with the GitLab `allow_failure: true` — CVEs
  # are informational, blocking releases on every new advisory creates friction.
  # ---------------------------------------------------------------------------
  trivy-scan:
    name: Package / Trivy CVE scan
    runs-on: ubuntu-24.04
    needs: docker-build
    if: |
      (github.event_name != 'schedule' && github.event_name != 'workflow_dispatch') &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    continue-on-error: true
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - name: Run Trivy on the freshly built image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: '0'   # do not fail on findings; reporting-only

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

# =============================================================================
# Stage: native (scheduled daily + manual trigger only)
# =============================================================================

  # ---------------------------------------------------------------------------
  # Build a GraalVM native image and push it to GHCR.
  #
  # Why run on schedule and not on every main push?
  #   AOT compilation takes 5-15 minutes of CPU. Running it on every commit
  #   wastes CI time and GitHub Actions minutes. The daily schedule on main is
  #   sufficient — native images are deployment artefacts, not code-review gates.
  #
  # Change detection:
  #   dorny/paths-filter compares HEAD to the previous commit on main.
  #   If none of Dockerfile.native / pom.xml / src/** changed, the job is skipped.
  #   This means: on days with no code changes the job exits in ~10 seconds.
  #
  # Tags pushed (same pattern as JVM Docker image):
  #   native-sha-<short>   — immutable pointer for deployments
  #   native-main          — moving pointer for convenience
  # ---------------------------------------------------------------------------
  build-native:
    name: Native / GraalVM → GHCR
    runs-on: ubuntu-24.04
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for native-relevant changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            native:
              - 'Dockerfile.native'
              - 'pom.xml'
              - 'src/**'

      - name: Log in to GHCR
        if: steps.filter.outputs.native == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata for native image
        id: meta
        if: steps.filter.outputs.native == 'true'
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=native-sha-
            type=ref,event=branch,prefix=native-

      - name: Build and push GraalVM native image
        if: steps.filter.outputs.native == 'true'
        uses: docker/build-push-action@v6
        timeout-minutes: 30
        with:
          context: .
          file: Dockerfile.native
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:native-buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}:native-buildcache,mode=max

      - name: Skip notification
        if: steps.filter.outputs.native == 'false'
        run: echo "No native-relevant files changed — skipping GraalVM build."
