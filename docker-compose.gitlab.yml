# =============================================================================
# docker-compose.gitlab.yml — Local GitLab CE instance
#
# Runs a full GitLab CE server on your machine so CI/CD pipelines execute
# locally and consume zero gitlab.com shared runner minutes.
#
# Ports (host → container):
#   9081 → 80   : GitLab web UI  → http://localhost:9081
#   9443 → 443  : GitLab HTTPS   (optional — plain HTTP is enough locally)
#   9022 → 22   : GitLab SSH     (for git push over SSH)
#
# First-run setup:
#   1. docker compose -f docker-compose.gitlab.yml up -d
#   2. Wait ~2 minutes for GitLab to initialize
#   3. Open http://localhost:9081 and set the root password when prompted
#   4. Create a project that mirrors customer-service
#   5. Register the local runner against this instance:
#      docker exec -it gitlab-runner \
#        gitlab-runner register \
#        --url http://host.docker.internal:9080 \
#        --token <project-runner-token>
#
# Resource note:
#   GitLab CE needs ~4 GB RAM and takes ~2-3 min to start.
#   On low-memory machines use: GITLAB_OMNIBUS_CONFIG shmem_size or disable unneeded services.
#
# Tear down (keeps data):
#   docker compose -f docker-compose.gitlab.yml down
#
# Tear down + wipe all data:
#   docker compose -f docker-compose.gitlab.yml down -v
# =============================================================================

services:

  gitlab:
    image: gitlab/gitlab-ce:latest
    container_name: gitlab
    hostname: localhost
    restart: unless-stopped
    ports:
      - "9081:80"    # Web UI  → http://localhost:9081
      - "9443:443"   # HTTPS
      - "9022:22"    # SSH (git push over SSH)
    volumes:
      # GitLab configuration (gitlab.rb, secrets, ...)
      - gitlab-config:/etc/gitlab
      # Application logs
      - gitlab-logs:/var/log/gitlab
      # All application data (repos, uploads, DB, ...)
      - gitlab-data:/var/opt/gitlab
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        # Bind GitLab to port 80 inside the container, exposed on host as 9081
        external_url 'http://localhost:9081'

        # SSH port exposed on the host
        gitlab_rails['gitlab_shell_ssh_port'] = 9022

        # Disable telemetry / usage ping
        gitlab_rails['usage_ping_enabled'] = false
        gitlab_rails['seat_link_enabled'] = false

        # Keep SMTP disabled (no email needed for local dev)
        gitlab_rails['smtp_enable'] = false

        # Reduce memory footprint on dev machines
        puma['worker_processes'] = 2
        sidekiq['concurrency'] = 5
        prometheus_monitoring['enable'] = false

    # GitLab CE takes 2-3 minutes to fully start — this healthcheck
    # waits until the Rails server is responding before marking it healthy.
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/-/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 180s

volumes:
  # Named volumes — data survives container recreation
  gitlab-config:
    name: gitlab-config
  gitlab-logs:
    name: gitlab-logs
  gitlab-data:
    name: gitlab-data
