# =============================================================================
# lefthook.yml — Git hooks configuration
#
# lefthook is a fast Git hooks manager written in Go (no Node.js required).
# Install: brew install lefthook
# Activate: lefthook install   (wires hooks into .git/hooks/)
# Bypass:   LEFTHOOK=0 git commit / push   (skip hooks for emergency pushes)
#
# Hooks defined here:
#   pre-commit — validates staged files without running any build:
#                - .gitlab-ci.yml       → glab ci lint (catch YAML/syntax errors)
#                - Dockerfile*          → hadolint     (linter for common Dockerfile bugs)
#                - deploy/kubernetes/**/*.yaml  → kubectl apply --dry-run=client -f
#                - terraform/**/*.tf    → terraform fmt -check + terraform validate
#                - pom.xml              → xmllint       (XML well-formed)
#                Each check only runs if the relevant file type is staged.
#                Missing tool → check is skipped (warning only, not blocking).
#
#   pre-push  — runs unit tests before every push; blocks if they fail.
#               Integration tests are intentionally excluded (too slow for
#               a pre-push gate; they run in CI after the push).
#
# Why this matters:
#   The previous session wasted 4+ CI iterations on trivial issues (bad YAML,
#   wrong Docker image tag, Terraform syntax error) that a local check would
#   have caught in 5 seconds. These hooks catch those BEFORE the commit lands,
#   saving pipeline quota and time.
# =============================================================================

pre-commit:
  parallel: true
  commands:
    readme-i18n-sync:
      # When README.md or README.fr.md changes, the other one must
      # change too — otherwise the two versions drift silently. Not
      # a strict translation check (can't automate without running an
      # LLM), just a "you edited one, remember the other" reminder.
      # Skippable via LEFTHOOK=0 if the edit is intentionally
      # one-sided (e.g. fixing a typo in only the French version).
      glob: "{README.md,README.fr.md}"
      run: |
        staged_en=$(git diff --cached --name-only | grep -c "^README\.md$" || true)
        staged_fr=$(git diff --cached --name-only | grep -c "^README\.fr\.md$" || true)
        if [[ "$staged_en" -eq 1 && "$staged_fr" -eq 0 ]]; then
          echo "⚠️  README.md changed but README.fr.md wasn't touched. Drift risk."
          echo "    Fix: update README.fr.md too, or skip with LEFTHOOK=0."
          exit 1
        elif [[ "$staged_fr" -eq 1 && "$staged_en" -eq 0 ]]; then
          echo "⚠️  README.fr.md changed but README.md wasn't touched. Drift risk."
          echo "    Fix: update README.md too, or skip with LEFTHOOK=0."
          exit 1
        fi
        echo "OK: README i18n pair in sync."
      fail_text: "README i18n pair drifted."

    gitlab-ci-lint:
      # Validates .gitlab-ci.yml against GitLab's CI lint API before commit.
      # Catches YAML syntax, unknown keywords, invalid rules, wrong stages, etc.
      glob: ".gitlab-ci.yml"
      run: |
        if command -v glab >/dev/null 2>&1; then
          glab ci lint
        else
          echo "⚠️  glab not installed — skipping .gitlab-ci.yml lint. Install: brew install glab"
        fi
      fail_text: ".gitlab-ci.yml has syntax errors. Fix before committing."

    dockerfile-lint:
      # Hadolint catches ~40 common Dockerfile bugs (wrong COPY, missing USER, etc.).
      # --failure-threshold error: warnings don't block (matches CI policy).
      glob: "Dockerfile*"
      run: |
        if command -v hadolint >/dev/null 2>&1; then
          hadolint --failure-threshold error {staged_files}
        else
          echo "⚠️  hadolint not installed — skipping Dockerfile lint. Install: brew install hadolint"
        fi
      fail_text: "Dockerfile failed hadolint. Fix the issues before committing."

    k8s-dry-run:
      # Client-side validation: YAML syntax + basic K8s schema.
      # Does NOT hit the cluster — safe to run even without a connected context.
      #
      # Two-mode strategy:
      #   • kustomization.yaml files → collect the containing directories and
      #     run `kubectl kustomize <dir> | kubectl apply --dry-run=client -f -`
      #     for each (a kustomization.yaml cannot be dry-run'd directly).
      #   • Other .yaml files → run `kubectl apply --dry-run=client -f` per file.
      #
      # Kustomization files are skipped in the per-file loop because:
      #   1. They have `kind: Kustomization` with apiVersion kustomize.config.k8s.io
      #      which is NOT a real K8s resource → `kubectl apply -f` fails with
      #      "no matches for kind Kustomization".
      #   2. The relevant validation for a kustomization.yaml is the full
      #      overlay build + dry-run, which we run once per directory.
      glob: "deploy/kubernetes/**/*.yaml"
      run: |
        if ! command -v kubectl >/dev/null 2>&1; then
          echo "⚠️  kubectl not installed — skipping k8s dry-run"
          exit 0
        fi
        # Collect unique directories containing a staged kustomization.yaml.
        kustomize_dirs=""
        other_files=""
        for f in {staged_files}; do
          if [[ "$(basename "$f")" == "kustomization.yaml" ]]; then
            kustomize_dirs="$kustomize_dirs $(dirname "$f")"
          else
            other_files="$other_files $f"
          fi
        done
        # Offline validation only — no kubectl apply.
        #
        # `kubectl apply --dry-run=client` still performs a GET against the
        # API server to diff against existing objects, so it hangs when the
        # cluster is torn down (ADR-0022 ephemeral pattern). `kubectl kustomize`
        # is a pure render — zero network — and covers the real failure modes
        # we care about in a pre-commit check: malformed YAML, broken refs,
        # missing base, invalid patch targets. CRD kinds (Rollout, Chaos*,
        # ExternalSecret) aren't validated structurally here, but the full
        # `bin/demo-up.sh` validation cycle catches those on a live cluster.
        #
        # Per-file checks for non-kustomization YAML are dropped: every file
        # we author lives under a directory that already has a kustomization.yaml,
        # so the directory-level check covers them all.
        for d in $(printf '%s\n' $kustomize_dirs | sort -u); do
          kubectl kustomize "$d" >/dev/null
        done
      fail_text: "K8s manifest(s) invalid. Run 'kubectl kustomize <dir>' or 'kubectl apply --dry-run=client -f <file>' for details."

    terraform-validate:
      # terraform fmt -check + terraform validate on the gcp/ module.
      # Only runs when a .tf file is staged — no network call.
      glob: "deploy/terraform/**/*.tf"
      run: |
        if command -v terraform >/dev/null 2>&1; then
          terraform -chdir=deploy/terraform/gcp fmt -check -recursive
          terraform -chdir=deploy/terraform/gcp init -backend=false -input=false >/dev/null
          terraform -chdir=deploy/terraform/gcp validate
        else
          echo "⚠️  terraform not installed — skipping Terraform validate. Install: brew install terraform"
        fi
      fail_text: "Terraform files failed validation. Run 'terraform fmt' and fix syntax."

    env-keys-in-sync:
      # .env and .env.example MUST have the same keys (values can differ).
      # A missing key in .env.example leaves new devs without the variable
      # documented; a stale key in .env.example is dead weight.
      # Only fires when one of the two files is staged.
      glob: "{.env,.env.example}"
      run: |
        if [ ! -f .env ] || [ ! -f .env.example ]; then
          echo "⚠️  .env or .env.example missing — skipping key-parity check."
          exit 0
        fi
        diff=$(diff <(grep -E '^[A-Z_][A-Z0-9_]*=' .env.example | cut -d= -f1 | sort) \
                    <(grep -E '^[A-Z_][A-Z0-9_]*=' .env | cut -d= -f1 | sort) || true)
        if [ -n "$diff" ]; then
          echo "❌  .env and .env.example have different keys:"
          echo "$diff" | sed 's/^/    /'
          exit 1
        fi
      fail_text: "Keys differ between .env and .env.example. Add/remove the missing variable in both files."

    pom-hardcoded-versions:
      # Every plugin/dependency <version> MUST live under <properties> so
      # bumps land in one place and duplicates across profiles can't drift.
      # The ONLY legitimate hardcoded version is <parent><version>…</version>
      # because Maven resolves the parent before evaluating properties.
      glob: "pom.xml"
      run: |
        # Strip comments, then flag any <version>LITERAL</version> that isn't ${…}
        # and isn't inside a <parent> block.
        violations=$(python3 - <<'PY'
        import re, sys
        with open('pom.xml') as f:
            raw = f.read()
        content = re.sub(r'<!--.*?-->', '', raw, flags=re.DOTALL)
        # Remove the single <parent>…</parent> block so its <version> is exempt.
        content = re.sub(r'<parent>.*?</parent>', '', content, flags=re.DOTALL, count=1)
        pattern = re.compile(
            r'<artifactId>([^<]+)</artifactId>\s*'
            r'(?:<groupId>[^<]+</groupId>\s*)?'
            r'<version>([^<]+)</version>',
            re.DOTALL,
        )
        bad = [(m.group(1).strip(), m.group(2).strip())
               for m in pattern.finditer(content)
               if not m.group(2).strip().startswith('${')
               and m.group(1).strip() != 'mirador']
        for a, v in bad:
            print(f"  {a}: {v}")
        sys.exit(1 if bad else 0)
        PY
        )
        if [ $? -ne 0 ]; then
          echo "❌  Hardcoded <version> found in pom.xml outside <parent>:"
          echo "$violations"
          echo "Fix: extract to a property under <properties> and reference as \${name.version}."
          exit 1
        fi
      fail_text: "pom.xml has hardcoded versions. Move them to <properties>."

    pom-xml-wellformed:
      # Cheap sanity check that pom.xml is well-formed XML.
      # Full model validation happens in mvn; this catches typos before push.
      glob: "pom.xml"
      run: |
        if command -v xmllint >/dev/null 2>&1; then
          xmllint --noout pom.xml
        else
          echo "⚠️  xmllint not installed (should ship with macOS)"
        fi
      fail_text: "pom.xml is not well-formed XML."

    gitleaks:
      # Scan staged changes for hardcoded secrets (AWS/GCP keys, JWTs,
      # high-entropy tokens, etc.). Config in .gitleaks.toml defines
      # allowlist for demo credentials and test fixtures.
      # Runs on EVERY commit — not just when specific files change, because
      # a secret can leak into any file type.
      run: |
        if command -v gitleaks >/dev/null 2>&1; then
          gitleaks protect --staged --config .gitleaks.toml --no-banner
        else
          echo "⚠️  gitleaks not installed — skipping secret scan. Install: brew install gitleaks"
        fi
      fail_text: "Secret-looking content detected. Review above; if false positive, add to .gitleaks.toml allowlist."

commit-msg:
  commands:
    conventional-commits:
      # Enforce Conventional Commits on every commit message.
      # Enables release-please CHANGELOG + automatic semver bumping on main.
      #
      # Implemented in pure bash (no Node.js / commitlint install) — this is a
      # Java project; adding a node_modules/ for a commit-msg check is absurd.
      # The regex mirrors @commitlint/config-conventional defaults:
      #   type(scope)!: subject
      #   types: feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert
      #   scope: optional, alphanum + dash/slash/dot
      #   !: optional breaking-change marker
      #   subject: required, no trailing period
      #
      # Allow merge commits (Git uses the default "Merge branch 'foo'" which
      # doesn't fit the pattern, but there's no way to rewrite a merge commit
      # message during the conflict resolution flow).
      # Allow revert commits generated by `git revert` ("Revert \"...\"").
      # Allow GitLab auto-generated "Merge remote-tracking branch" messages.
      #
      # The {1} placeholder is the commit message file path.
      run: |
        msg_file="{1}"
        first_line=$(head -n1 "$msg_file" | tr -d '\r')
        # Skip allowed non-conventional commit types.
        case "$first_line" in
          "Merge "*|"Revert "*|"fixup! "*|"squash! "*|"amend! "*)
            exit 0 ;;
        esac
        # Accept only:
        #   type: subject
        #   type(scope): subject
        #   type!: subject
        #   type(scope)!: subject
        # with types from the allowed list.
        if ! printf '%s' "$first_line" | grep -Eq '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-zA-Z0-9/_.-]+\))?!?: .+'; then
          echo "Commit message doesn't follow Conventional Commits."
          echo "  First line was: $first_line"
          echo ""
          echo "Expected: <type>(<optional scope>)!?: <subject>"
          echo "Types: feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert"
          echo "Examples:"
          echo "  feat(customer): add idempotency key support"
          echo "  fix: handle null email in CustomerController"
          echo "  docs(adr): record Kustomize decision"
          echo "  chore(deps): bump jjwt 0.12.6 -> 0.13.0"
          echo "  refactor!: rename package com.example.app -> com.mirador"
          echo ""
          echo "Doc: commitlint.config.mjs describes the rules."
          exit 1
        fi
        # Enforce max header length (72 chars).
        len=${#first_line}
        if [ "$len" -gt 72 ]; then
          echo "Commit subject is $len chars — must be ≤72."
          echo "  $first_line"
          exit 1
        fi
      fail_text: "Fix the commit message and retry."

pre-push:
  commands:
    unit-tests:
      # Mirrors 'make check' / 'make test': Maven Surefire, *ITest excluded, no Docker.
      # Runs in a few seconds — fast enough to be a pre-push gate.
      run: ./run.sh check
      fail_text: |
        Unit tests failed. Fix the failures before pushing.
        To skip this hook in an emergency: LEFTHOOK=0 git push
