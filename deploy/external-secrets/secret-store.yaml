# =============================================================================
# SecretStore — tells External Secrets Operator how to fetch secrets from
# Google Secret Manager for the `app` namespace.
#
# Authentication: Workload Identity — ESO's ServiceAccount impersonates a
# GCP service account that has `roles/secretmanager.secretAccessor` on the
# target secrets. No key files, no long-lived credentials.
#
# The GCP-side setup is documented in the README in this directory.
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: gcp-secret-manager
  namespace: app
spec:
  provider:
    gcpsm:
      # Project where the Secret Manager secrets live. Overridden per
      # overlay if a staging/prod split is ever introduced — today the
      # GKE overlay substitutes ${GCP_PROJECT} via envsubst in CI.
      projectID: ${GCP_PROJECT}
      auth:
        workloadIdentity:
          clusterLocation: ${GKE_REGION}
          clusterName: ${GKE_CLUSTER}
          serviceAccountRef:
            # The backend's KSA — must be annotated with the GCP SA
            # it impersonates (the deployment's serviceAccountName).
            name: mirador
            namespace: app
