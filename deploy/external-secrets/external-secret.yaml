# =============================================================================
# ExternalSecret — materialises the `mirador-secrets` K8s Secret from
# Google Secret Manager values. ESO reconciles every `refreshInterval`
# so value rotation on the GCP side propagates automatically.
#
# This replaces the `kubectl create secret generic mirador-secrets …`
# step in `.gitlab-ci.yml`'s `.kubectl-apply` block. Enable by moving
# both this file and `secret-store.yaml` under
# deploy/kubernetes/base/external-secrets/ and adding them to the base
# `kustomization.yaml` (see README for the exact cutover order).
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mirador-secrets
  namespace: app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: SecretStore

  target:
    # Must match the Secret name referenced by the backend Deployment's
    # envFrom.secretRef.name (see deploy/kubernetes/base/backend/deployment.yaml).
    name: mirador-secrets
    creationPolicy: Owner   # ESO owns the lifecycle; deleting the
                            # ExternalSecret deletes the generated Secret.
    deletionPolicy: Retain  # Keep the K8s Secret if this ExternalSecret
                            # is removed — protects against accidental
                            # delete during a GitOps rollback.

  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: mirador-db_password
    - secretKey: JWT_SECRET
      remoteRef:
        key: mirador-jwt_secret
    - secretKey: API_KEY
      remoteRef:
        key: mirador-api_key
    - secretKey: OTEL_EXPORTER_OTLP_AUTH
      remoteRef:
        key: mirador-otel_auth
    - secretKey: GITLAB_API_TOKEN
      remoteRef:
        key: mirador-gitlab_token
