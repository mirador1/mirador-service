# =============================================================================
# Ingress — exposes the Argo CD UI at argocd.mirador1.duckdns.org.
#
# Avoids repeated `kubectl port-forward -n argocd svc/argocd-server 8080:443`
# every time the demo is shown. The UI is behind the same nginx-ingress +
# cert-manager (Let's Encrypt prod) chain as the app.
#
# Admin credentials:
#   user: admin
#   pass: kubectl -n argocd get secret argocd-initial-admin-secret \
#           -o jsonpath='{.data.password}' | base64 -d
#
# Apply:
#   kubectl apply -f deploy/argocd/ingress.yaml
# (or, once the overlay is wired up, Argo CD reconciles it from git.)
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server
  namespace: argocd
  annotations:
    # argocd-server serves HTTPS on 443 by default. The upstream is self-signed,
    # so we tell nginx to trust it (nginx verifies only the hostname in the
    # Argo CD cert chain) and to rewrite the request scheme as HTTPS upstream.
    nginx.ingress.kubernetes.io/backend-protocol: HTTPS
    nginx.ingress.kubernetes.io/ssl-passthrough: "false"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Let's Encrypt cert issued by the same ClusterIssuer as the app cert.
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - argocd.mirador1.duckdns.org
      secretName: argocd-tls
  rules:
    - host: argocd.mirador1.duckdns.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 443
