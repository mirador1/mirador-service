# =============================================================================
# Nginx Ingress — single entry point for frontend + backend
#
# Why a single Ingress on one hostname?
# ─────────────────────────────────────
# Angular (frontend) and Spring Boot (backend) are served from the SAME hostname.
# The browser calls `/api/customers` — Nginx strips `/api` and proxies to the
# backend. This eliminates CORS entirely: the browser never makes a cross-origin
# request because it always talks to the same origin (e.g. https://app.example.com).
#
# Routing rules:
#   /api/(.*) → customer-service:8080/$1    (backend — strip /api prefix)
#   /(.*)     → customer-ui:80              (frontend — Angular SPA)
#
# K8S_HOST = mirador1.duckdns.org  (DuckDNS free domain — A record → 34.52.233.183)
# Set as GitLab CI group variable. TLS certificate issued automatically by cert-manager (Let's Encrypt).
#
# Prerequisites:
#   kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/cloud/deploy.yaml
#   kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: customer-service-ingress
  namespace: app
  labels:
    app.kubernetes.io/name: customer-service-ingress
  annotations:
    # ── Nginx Ingress Controller ────────────────────────────────────────────
    nginx.ingress.kubernetes.io/use-regex: "true"
    # Rewrite /api/customers → /customers (strip the /api prefix before proxying)
    nginx.ingress.kubernetes.io/rewrite-target: "/$2"
    # Increase timeouts for Kafka request-reply (default 60s may be too short)
    nginx.ingress.kubernetes.io/proxy-read-timeout: "90"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "90"
    # Enable WebSocket upgrade — use server-snippet-free annotations.
    # configuration-snippet is disabled by default since nginx-ingress 1.9+
    # (snippet directives blocked by the Ingress administrator on GKE).
    # The nginx-ingress controller natively handles WebSocket when the client
    # sends Upgrade headers, so explicit proxy_set_header is not needed.
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    # ── TLS — cert-manager Let's Encrypt ────────────────────────────────────
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - "${K8S_HOST}"
      secretName: customer-service-tls
  rules:
    - host: "${K8S_HOST}"
      http:
        paths:
          # /api/(...) → backend (strip /api prefix via rewrite-target /$2)
          # The regex captures everything after /api/ in group $2
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: customer-service
                port:
                  number: 8080
          # All other paths → Angular frontend
          - path: /()(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: customer-ui
                port:
                  number: 80
