# =============================================================================
# Deployment — Angular frontend served by Nginx
#
# The Docker image is built from customer-observability-ui/Dockerfile.
# Nginx serves the static Angular SPA; Angular routing is handled by
# the `try_files $uri /index.html` fallback in nginx.conf.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-ui
  namespace: app
  labels:
    app.kubernetes.io/name: customer-ui
    app.kubernetes.io/component: frontend
    app.kubernetes.io/version: "${UI_IMAGE_TAG}"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: customer-ui
      app.kubernetes.io/component: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: customer-ui
        app.kubernetes.io/component: frontend
    spec:
      terminationGracePeriodSeconds: 10   # Nginx drains quickly, no long-lived connections
      containers:
        - name: customer-ui
          image: "${IMAGE_REGISTRY}/frontend:${UI_IMAGE_TAG}"
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          resources:
            # Nginx serving static files: low CPU, minimal memory
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
