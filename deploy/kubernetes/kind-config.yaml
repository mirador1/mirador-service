# =============================================================================
# kind Cluster configuration for local Kubernetes testing
#
# Ports 8090 (HTTP) and 8443 (HTTPS) are mapped to the host to avoid
# conflicts with existing Docker services (postgres 5432, kafka 9092, etc.).
#
# After cluster creation, the nginx-ingress controller is installed and
# the app is reachable at:
#   http://mirador.127.0.0.1.nip.io:8090
#
# nip.io resolves *.127.0.0.1.nip.io → 127.0.0.1 automatically —
# no /etc/hosts changes needed.
#
# Usage:
#   kind create cluster --name mirador --config deploy/kubernetes/kind-config.yaml
# Or via the helper script:
#   ./run.sh k8s-local
# =============================================================================
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    # Mark this node as ingress-ready so the nginx-ingress DaemonSet
    # schedules here and picks up the extraPortMappings below.
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # 8090 → nginx HTTP (avoids conflict with local Docker services)
      - containerPort: 80
        hostPort: 8090
        protocol: TCP
      # 8443 → nginx HTTPS (optional for local — TLS not configured by default)
      - containerPort: 443
        hostPort: 8443
        protocol: TCP
