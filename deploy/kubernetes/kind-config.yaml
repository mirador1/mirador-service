# =============================================================================
# kind Cluster configuration for local Kubernetes testing.
#
# Per ADR-0025 there is no nginx-ingress / no public surface — access to
# services in the kind cluster goes through `kubectl port-forward` (or
# `bin/cluster/port-forward/prod.sh` reusing the same tunnel map). The control-plane port
# mappings from the pre-ADR-0025 era are removed.
#
# The cluster is a single-node in-Docker Kubernetes — plenty for the demo
# (Argo CD, ESO + friends all fit on one ~2 GB node).
#
# Usage:
#   kind create cluster --name mirador-local --config deploy/kubernetes/kind-config.yaml
# Or via the helper script:
#   ./run.sh k8s-local
# =============================================================================
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
