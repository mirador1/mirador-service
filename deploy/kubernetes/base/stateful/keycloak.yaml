# =============================================================================
# Keycloak — Identity & Access Management (OAuth2/OIDC provider)
#
# Runs as a single pod in the infra namespace.
# In production consider externalizing the DB to Cloud SQL (PostgreSQL)
# by setting DB_VENDOR=postgres and pointing to the Cloud SQL proxy sidecar.
#
# Admin credentials are loaded from the keycloak-secrets Secret.
# Create it once: kubectl create secret generic keycloak-secrets -n infra
#   --from-literal=KEYCLOAK_ADMIN=admin
#   --from-literal=KEYCLOAK_ADMIN_PASSWORD=<password>
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: infra
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: keycloak
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.2
          args: ["start-dev"]   # start-dev for non-TLS in-cluster; use start in prod with TLS termination at ingress
          env:
            # KEYCLOAK_ADMIN is not a secret (username "admin"); the password
            # IS (projected by ESO from GSM into the keycloak-secrets Secret).
            - name: KEYCLOAK_ADMIN
              value: "admin"
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secrets
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: KC_PROXY
              value: "edge"   # trust X-Forwarded-* headers from nginx ingress
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_HTTP_ENABLED
              value: "true"
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /realms/master
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /realms/master
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: infra
spec:
  selector:
    app.kubernetes.io/name: keycloak
  ports:
    - name: http
      port: 80
      targetPort: 8080
