# =============================================================================
# PostgreSQL — StatefulSet with persistent volume
#
# For production, prefer Cloud SQL (GKE) / Amazon RDS / Azure Database — they
# handle backups, patching, and HA automatically. This manifest is for:
#   - Hetzner/OVH/k3s deployments without managed Postgres
#   - Local development clusters (kind, minikube)
#
# Data is persisted in a PVC named postgres-data (10 Gi by default).
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: infra
data:
  POSTGRES_DB: "customer-service"
  POSTGRES_USER: "demo"
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: infra
  labels:
    app.kubernetes.io/name: postgresql
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: postgresql
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql
  namespace: infra
  labels:
    app.kubernetes.io/name: postgresql
spec:
  serviceName: postgresql
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgresql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgresql
    spec:
      containers:
        - name: postgresql
          image: postgres:17-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - configMapRef:
                name: postgres-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mirador-secrets
                  key: DB_PASSWORD
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "demo", "-d", "customer-service"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "demo", "-d", "customer-service"]
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi   # adjust based on expected data volume
