# =============================================================================
# base/observability-prom/ — Prometheus alert + recording rules for Mirador.
#
# Referenced only by overlays that deploy kube-prometheus-stack (and thus
# register the PrometheusRule CRD): local-prom, gke-prom. The plain `local/`
# overlay (lgtm-only, ADR-0038 single-pod OTel story) must NOT include this
# kustomization — applying PrometheusRule without the operator's CRD errors
# out with "no matches for kind PrometheusRule".
#
# Add new rule files here (one per rule family if they grow): HTTP RED,
# JVM, Kafka, security are the likely splits.
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - mirador-alerts.yaml
