# =============================================================================
# ExternalSecret — keycloak-secrets (infra)
#
# Keycloak needs two values at startup:
#   KEYCLOAK_ADMIN_PASSWORD — admin password
#   KC_DB_PASSWORD          — same value as mirador-db-password (shared
#                             Postgres credential)
#
# KEYCLOAK_ADMIN (the username) is not a secret — it's hardcoded to "admin"
# in the Keycloak Deployment env directly, so it's not in GSM.
# =============================================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-secrets
  namespace: infra
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: SecretStore
  target:
    name: keycloak-secrets
    creationPolicy: Owner
  data:
    - secretKey: KEYCLOAK_ADMIN_PASSWORD
      remoteRef:
        key: mirador-keycloak-admin-password
    - secretKey: KC_DB_PASSWORD
      # Intentional reuse of the Postgres password — same DB, same owner.
      remoteRef:
        key: mirador-db-password
