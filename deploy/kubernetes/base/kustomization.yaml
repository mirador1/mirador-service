# =============================================================================
# Base kustomization — cluster-internal services only, no public surface.
#
# Per ADR-0025 the cluster exposes nothing to the public internet. The
# Angular UI runs only on the developer's laptop (docker-compose for dev,
# `bin/cluster/port-forward/prod.sh` tunnels for prod access). No Ingress, no TLS, no
# frontend Deployment — removed from the base entirely.
#
# This base is never applied directly — pick an overlay under ../overlays/:
#   • local/ — in-cluster Postgres (for kind clusters)
#   • gke/   — GKE Autopilot specifics (configmap patch, image pins)
#   • eks/   — in-cluster Postgres (AWS-specific cluster auth in CI)
#
# Apply via:  kubectl apply -k deploy/kubernetes/overlays/<target>
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - networkpolicies.yaml
  - backend/configmap.yaml
  - backend/deployment.yaml
  - backend/service.yaml
  - backend/hpa.yaml
  - backend/poddisruptionbudget.yaml
  # RBAC for the backend ServiceAccount — grants just chaos-mesh.org/*
  # create/delete in the app namespace so ChaosController can trigger
  # PodChaos / NetworkChaos / StressChaos CRs on demand.
  # Narrow by design: no cross-namespace, no pods/exec, no secrets.
  - backend/rbac.yaml
  - stateful/kafka.yaml
  - stateful/redis.yaml
  - stateful/keycloak.yaml
  # External Secrets Operator projects secrets from Google Secret Manager
  # into K8s Secrets. ADR-0016 + external-secrets/README.md explain the
  # pre-flight + rollback paths. Wired in 2026-04-18.
  - external-secrets
  # LGTM all-in-one (Grafana + Loki + Tempo + Mimir + OTel Collector).
  # Provides the OTLP backend for the app's OpenTelemetry export, plus
  # live traces / logs / metrics visualisation at http://<service>:3000.
  - observability
  # Chaos Mesh experiments (CRs only — the operator is installed by
  # demo-up.sh full mode). Experiments replay on cron while their CR
  # exists; delete the CR to stop.
  - chaos
  # Unleash feature-flag service — Postgres + API + seed SQL. Holds
  # kill-switches like mirador.bio.enabled (hide the Bio tab when Ollama
  # is down). ADR referenced in the unleash/unleash.yaml header.
  - unleash

# NOTE: Postgres is NOT in the base. It lives in `base/postgres/` as a
# standalone mini-base and is pulled in only by overlays that need an
# in-cluster DB (local, eks, aks). GKE uses Cloud SQL instead, wired in
# by the `overlays/gke/` overlay.
