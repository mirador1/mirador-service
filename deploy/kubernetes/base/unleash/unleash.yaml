# =============================================================================
# Unleash — open-source feature-flag service for the demo.
#
# Why feature flags at all in a portfolio? Three reasons:
#   1. Decouple deploy from release — push code to prod dark, flip the flag
#      when ready. Pairs naturally with the Argo Rollouts canary.
#   2. Kill-switch for buggy code — flip the flag off in seconds instead of
#      redeploying (which takes 3-5 min even with canary).
#   3. "Operator vs customer" UI split (see below) — one Unleash flag
#      `mirador.ui.ops-mode` gates all the operator pages (Chaos, Database,
#      Pipelines). Off by default → customer view. Flip on → full dashboard.
#
# Architecture:
#   mirador-ui → Unleash Proxy SDK (browser) → Unleash backend → Postgres
#
# The browser *never* talks to the Unleash admin API directly — it uses the
# front-end SDK which authenticates with a client-token (read-only). Admins
# use the web UI at unleash.mirador1.duckdns.org/.
#
# Seed data (default admin user + the ops-mode flag) lives in
# `seed.sql` (separate ConfigMap), executed on first Postgres boot.
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: unleash
  namespace: infra
  labels:
    app.kubernetes.io/name: unleash
spec:
  selector:
    app.kubernetes.io/name: unleash
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 4242
      targetPort: 4242
---
apiVersion: v1
kind: Service
metadata:
  name: unleash-db
  namespace: infra
  labels:
    app.kubernetes.io/name: unleash
    app.kubernetes.io/component: db
spec:
  selector:
    app.kubernetes.io/name: unleash
    app.kubernetes.io/component: db
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
# ── Postgres backing Unleash (separate from the app Postgres) ───────────
# Using a dedicated DB keeps Unleash's schema isolated from the mirador
# app — easier to nuke-and-restore independently, avoids version-lock
# between Unleash's Flyway migrations and our own.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: unleash-db
  namespace: infra
  labels:
    app.kubernetes.io/name: unleash
    app.kubernetes.io/component: db
spec:
  serviceName: unleash-db
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: unleash
      app.kubernetes.io/component: db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: unleash
        app.kubernetes.io/component: db
    spec:
      containers:
        - name: postgres
          image: postgres:16.6-alpine
          env:
            - name: POSTGRES_DB
              value: unleash
            - name: POSTGRES_USER
              value: unleash
            - name: POSTGRES_PASSWORD
              # Not a secret worth rotating — it's a local-only DB for a
              # demo tool. If you care, move to ESO / GSM like mirador-db.
              value: unleash
            - name: PGDATA
              # Same gotcha as the app Postgres (ADR-0022 note): GKE PVCs
              # include lost+found; Postgres refuses to init into a non-empty
              # root. Using a subdir sidesteps it.
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
              name: postgres
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "unleash"]
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
# ── Unleash API + UI ────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unleash
  namespace: infra
  labels:
    app.kubernetes.io/name: unleash
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: unleash
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: unleash
        app.kubernetes.io/component: api
    spec:
      # Wait for Postgres ready — Unleash's migrations crash on boot
      # otherwise. initContainer pattern instead of a loop-sleep script.
      initContainers:
        - name: wait-for-db
          image: postgres:16.6-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h unleash-db -U unleash; do
                echo "waiting for unleash-db…"; sleep 2
              done
      # No seed volume — IMPORT_FILE removed (see note in the env block).
      containers:
        - name: unleash
          image: unleashorg/unleash-server:7.6.3
          ports:
            - name: http
              containerPort: 4242
          env:
            - name: DATABASE_URL
              value: postgres://unleash:unleash@unleash-db:5432/unleash
            - name: DATABASE_SSL
              value: "false"
            # IMPORT_FILE was removed in Unleash 7.x in favour of a JSON
            # state export format that requires live flag state first.
            # For the demo we boot clean and let the Admin UI create the
            # two flags on first login (mirador.ui.ops-mode / bio.enabled).
            # The seed.yaml ConfigMap kept in git for reference when moving
            # to an OSS admin-migrator script later.
            - name: AUTH_TYPE
              value: demo
            # Bootstrap tokens — created on first boot. Format:
            # <project>:<environment>.<secret>. "default" is the built-in
            # project, "development" the built-in environment.
            #   * CLIENT token: what unleash-proxy presents to Unleash's
            #     /api/client/features endpoint.
            #   * FRONTEND token: what the browser (via unleash-proxy) uses.
            #     Not strictly needed here (the proxy handles the frontend
            #     side) but Unleash refuses to boot without it in 7.x if
            #     INIT_CLIENT_API_TOKENS is set. Harmless.
            # These placeholder tokens are fine for a demo cluster; in a
            # real deployment they'd come from ESO → GSM with a real secret.
            - name: INIT_CLIENT_API_TOKENS
              value: "default:development.mirador-unleash-client-token"
            - name: INIT_FRONTEND_API_TOKENS
              value: "default:development.mirador-unleash-frontend-token"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 4242
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4242
            initialDelaySeconds: 60
            periodSeconds: 30

---
# ── Unleash front-end proxy — ADR-0026 ──────────────────────────────────
# The browser never calls the Unleash admin API directly. This sidecar
# (official `unleashorg/unleash-proxy` image) exposes a narrow read-only
# API (/proxy) that the browser reaches with a front-end client token.
# The proxy itself talks to Unleash via a server-side admin token.
#
# Tokens are hardcoded demo values ("default:development:…") consistent
# with the AUTH_TYPE=demo setting of the parent Unleash server. In a real
# prod deployment the tokens would come from ESO/GSM.
apiVersion: v1
kind: Service
metadata:
  name: unleash-proxy
  namespace: infra
  labels:
    app.kubernetes.io/name: unleash
    app.kubernetes.io/component: proxy
spec:
  selector:
    app.kubernetes.io/name: unleash
    app.kubernetes.io/component: proxy
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unleash-proxy
  namespace: infra
  labels:
    app.kubernetes.io/name: unleash
    app.kubernetes.io/component: proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: unleash
      app.kubernetes.io/component: proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: unleash
        app.kubernetes.io/component: proxy
    spec:
      initContainers:
        # Wait for Unleash server to be ready before starting the proxy.
        - name: wait-for-unleash
          image: curlimages/curl:8.11.1
          command:
            - sh
            - -c
            - |
              until curl -sf http://unleash:4242/health; do
                echo "waiting for unleash server…"; sleep 2
              done
      containers:
        - name: unleash-proxy
          image: unleashorg/unleash-proxy:1.4.17
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: UNLEASH_URL
              value: http://unleash:4242/api/
            # Server-side API token used by the proxy to poll Unleash. The
            # secret matches INIT_CLIENT_API_TOKENS on the unleash server
            # (same file). Token format: <project>:<environment>.<secret>.
            - name: UNLEASH_API_TOKEN
              value: "default:development.mirador-unleash-client-token"
            # Front-end tokens — what the browser sends in X-API-Token.
            # Multiple allowed, comma-separated. One is enough for this demo.
            - name: UNLEASH_PROXY_SECRETS
              value: "mirador-ui-proxy-secret"
            - name: UNLEASH_PROXY_PORT
              value: "3000"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /proxy/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /proxy/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
