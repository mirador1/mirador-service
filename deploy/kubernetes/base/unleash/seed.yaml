# =============================================================================
# Unleash seed — historical SQL-based bootstrap.
#
# NOT wired in Unleash 7.x (IMPORT_FILE was removed in favour of JSON state
# exports). Kept in git as a reference for the shape of the flag creation +
# admin-user rows in case we ever migrate to a Node.js migrator script.
#
# What would have been seeded (now created manually via Admin UI, or via
# INIT_*_API_TOKENS env vars for tokens):
#   1. Admin user (admin / unleash4all) — for the demo only, change in prod.
#   2. Feature flag `mirador.bio.enabled` default ON — kill-switch for the
#      Ollama-backed /bio endpoint in case the LLM pod has issues.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: unleash-seed
  namespace: infra
  labels:
    app.kubernetes.io/name: unleash
    app.kubernetes.io/component: seed
data:
  init.sql: |
    -- Idempotent: ON CONFLICT DO NOTHING means re-running the seed is safe.

    -- Default admin (bcrypt hash of "unleash4all" — for demo only).
    INSERT INTO users (username, email, name, password_hash, created_at)
    VALUES (
      'admin',
      'admin@mirador.local',
      'Mirador Admin',
      '$2a$10$Eyky9IIMkRzR2j30IAFPre5rfgyhBl7bD3.VjdMdJf6K0PtY7mSXa',
      now()
    )
    ON CONFLICT (username) DO NOTHING;

    -- Feature flag: bio-endpoint — kill-switch for the LLM-backed /bio call.
    INSERT INTO features (name, description, type, enabled, project, created_at)
    VALUES (
      'mirador.bio.enabled',
      'Enable the Ollama-backed customer bio generation. Disable if the LLM pod is flaky.',
      'kill-switch',
      true,
      'default',
      now()
    )
    ON CONFLICT (name) DO NOTHING;
