# =============================================================================
# Deployment — Spring Boot backend (mirador)
#
# Key design decisions:
#   - 2 replicas by default (HPA will scale 1→5 based on CPU)
#   - Resources sized for GKE Autopilot (request = limit for predictable billing)
#   - Liveness probe: /actuator/health/liveness (lightweight, no DB check)
#   - Readiness probe: /actuator/health/readiness (DB + Kafka + Redis)
#   - Graceful termination: 30s for in-flight requests to complete
#   - Non-root user (UID 1000) from the Dockerfile
#   - topologySpreadConstraints: spread replicas across ≥2 zones (HA)
#   - restricted PodSecurity profile: drop ALL capabilities, runAsNonRoot
#
# The image tag ${IMAGE_TAG} is substituted by envsubst in the CI deploy job.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mirador
  namespace: app
  labels:
    app.kubernetes.io/name: mirador
    app.kubernetes.io/component: backend
    app.kubernetes.io/version: "${IMAGE_TAG}"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: mirador
      app.kubernetes.io/component: backend
  strategy:
    # RollingUpdate: Kubernetes replaces pods one at a time. With readinessProbe,
    # old pods keep serving traffic until the new pod is ready → zero downtime.
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0   # never remove a pod before a new one is ready
      maxSurge: 1         # allow 1 extra pod during the rollout
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mirador
        app.kubernetes.io/component: backend
        app.kubernetes.io/version: "${IMAGE_TAG}"
      annotations:
        # Prometheus scrape annotations — kube-prometheus-stack picks these up automatically
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      # 30s grace period allows in-flight requests and Kafka consumers to finish
      terminationGracePeriodSeconds: 30
      # ── Pod-level security context ─────────────────────────────────────
      # Enforces the "restricted" PodSecurity standard even if the namespace
      # PodSecurity admission label isn't present (defense in depth).
      # Required by GKE Autopilot in strict mode anyway.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      # ── Zone-level HA — spread replicas across availability zones ─────
      # maxSkew: 1 means no two zones can have more than a 1-pod difference.
      # whenUnsatisfiable: ScheduleAnyway — if only one zone has capacity
      # at rollout time, still schedule. DoNotSchedule would block rollouts
      # on single-zone kind / eks-single-az clusters.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: mirador
              app.kubernetes.io/component: backend
      containers:
        - name: mirador
          image: "${IMAGE_REGISTRY}/backend:${IMAGE_TAG}"
          imagePullPolicy: Always
          # Container-level security context. Every field here is a CKS
          # audit checkpoint: no privileged, no root, no caps, no writable FS.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          # Read-only root FS needs writable mounts for JVM tempfiles + logs.
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: logs
              mountPath: /var/log/app
          # Non-sensitive config from ConfigMap
          envFrom:
            - configMapRef:
                name: mirador-config
          # Sensitive secrets (DB_PASSWORD, JWT_SECRET, API_KEY) from Kubernetes Secret
          # Created by the CI pipeline: kubectl create secret generic mirador-secrets ...
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mirador-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mirador-secrets
                  key: JWT_SECRET
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: mirador-secrets
                  key: API_KEY
            - name: OTEL_EXPORTER_OTLP_AUTH
              valueFrom:
                secretKeyRef:
                  name: mirador-secrets
                  key: OTEL_EXPORTER_OTLP_AUTH
            # Spring Boot relaxed-binding: maps this env var to
            # management.tracing.export.otlp.headers.Authorization
            # Uses K8s $(VAR) interpolation to prepend "Basic " to the base64 token.
            # Only injected in K8s — no Authorization header is sent in local dev.
            - name: MANAGEMENT_TRACING_EXPORT_OTLP_HEADERS_AUTHORIZATION
              value: "Basic $(OTEL_EXPORTER_OTLP_AUTH)"
            - name: MANAGEMENT_LOGGING_EXPORT_OTLP_HEADERS_AUTHORIZATION
              value: "Basic $(OTEL_EXPORTER_OTLP_AUTH)"
            # GitLab API token (read_api scope) for /actuator/quality pipeline history section.
            - name: GITLAB_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mirador-secrets
                  key: GITLAB_API_TOKEN
          resources:
            # GKE Autopilot: request = limit for deterministic pod sizing and billing.
            # Autopilot rounds up to the nearest resource class; 512Mi/500m is efficient.
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"     # allow burst during startup (JVM warm-up, Flyway)
              cpu: "1000m"
          # ── Health probes ────────────────────────────────────────────────
          # Liveness: is the process alive? Lightweight — no external deps.
          # If this fails 3 times, k8s restarts the pod.
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30   # give Flyway + JVM time to start
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          # Readiness: is the pod ready to serve traffic? Checks DB, Kafka, Redis.
          # If this fails, the pod is removed from the Service load balancer.
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 5
          # Startup probe: extra time for the first boot on cold nodes.
          # GKE Autopilot first pull + Spring Boot 4 + Flyway can exceed 2 min.
          # Once this passes, liveness/readiness take over.
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 60    # up to 5 min for first boot (60 × 5s)
      volumes:
        # emptyDir-backed tmpfs for JVM tempfiles. Node-local, cleared on pod exit.
        - name: tmp
          emptyDir:
            sizeLimit: 128Mi
        # Logs can also go to stdout; this volume is for tools that can only
        # write to a file (e.g., some JFR dumps).
        - name: logs
          emptyDir:
            sizeLimit: 256Mi
