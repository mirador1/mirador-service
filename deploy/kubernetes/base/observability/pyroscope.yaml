# =============================================================================
# Pyroscope — continuous profiling (flame graphs for CPU + memory per pod).
#
# The Java agent is already embedded in the backend image (pyroscope-java.jar
# in the Dockerfile). This manifest just runs the Pyroscope server that the
# agents push samples to, and exposes its UI on port 4040.
#
# The Grafana dashboard (from the LGTM install) auto-discovers Pyroscope at
# http://pyroscope.infra:4040 when both run in the same cluster.
#
# Data is held in an emptyDir: profiles are lost on pod restart, which is
# fine for ephemeral demos (ADR-0022).
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: pyroscope
  namespace: infra
  labels:
    app.kubernetes.io/name: pyroscope
spec:
  selector:
    app.kubernetes.io/name: pyroscope
  ports:
    - name: http
      port: 4040
      targetPort: 4040
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pyroscope
  namespace: infra
  labels:
    app.kubernetes.io/name: pyroscope
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pyroscope
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pyroscope
    spec:
      containers:
        - name: pyroscope
          image: grafana/pyroscope:1.14.0
          args: ["server"]
          ports:
            - name: http
              containerPort: 4040
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /ready
              port: 4040
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/pyroscope
      volumes:
        - name: data
          emptyDir: {}
