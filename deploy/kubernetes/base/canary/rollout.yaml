# =============================================================================
# Argo Rollout — canary deployment strategy for the mirador backend.
#
# Replaces the plain Deployment (`backend/deployment.yaml`) when Argo Rollouts
# is installed (full mode only). The pod template is identical — only the
# rollout strategy differs.
#
# Canary steps:
#   1. 10 %  traffic → wait 60 s → run analysis (error-rate check)
#   2. 50 %  traffic → wait 2 min → run analysis again
#   3. 100 % (promoted automatically if analysis succeeded)
#
# If the AnalysisTemplate (`analysis-template.yaml`) reports a Prometheus
# http error rate > 5 % during either pause, the rollout aborts and the
# previous stable ReplicaSet keeps all traffic. No human in the loop needed
# for the happy path; kubectl argo rollouts promote / abort for the edge.
#
# workloadRef is NOT used — Rollout owns the ReplicaSet directly. The base
# Deployment must be deleted before applying this (see canary/README.md
# and bin/demo-up.sh where the swap is scripted).
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: mirador
  namespace: app
  labels:
    app.kubernetes.io/name: mirador
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  # Use the same selector as the deleted Deployment — the existing Service
  # keeps routing to the pods Argo Rollouts creates.
  selector:
    matchLabels:
      app.kubernetes.io/name: mirador
      app.kubernetes.io/component: backend

  # ── Strategy: canary with analysis gating ─────────────────────────────
  strategy:
    canary:
      # Canary ReplicaSet gets labelled so a separate Service could route
      # to it for shadow testing. We don't split traffic by Service here
      # (only by replica count) — good enough for the demo, simpler than
      # wiring in a service mesh or Argo Rollouts TrafficRouter.
      canaryMetadata:
        labels:
          rollout-role: canary
      stableMetadata:
        labels:
          rollout-role: stable

      steps:
        # Step 1 — 10 % of pods get the new image (1 of 2 replicas rounded down
        # to 0, so bump temporarily to 4 replicas during rollout via maxSurge).
        - setWeight: 10
        - pause:
            duration: 60s
        - analysis:
            templates:
              - templateName: mirador-error-rate
            args:
              - name: service-name
                value: mirador.app.svc.cluster.local

        # Step 2 — half the fleet
        - setWeight: 50
        - pause:
            duration: 2m
        - analysis:
            templates:
              - templateName: mirador-error-rate
            args:
              - name: service-name
                value: mirador.app.svc.cluster.local

        # Step 3 — full promotion happens automatically when the above
        # analysis succeeds. No explicit `setWeight: 100` needed.

      # Temporarily allow one extra pod during rollout so we can have both
      # stable and canary running side-by-side with only 2 replicas total.
      maxSurge: 1
      maxUnavailable: 0

      # If an analysis step fails, abort the rollout and scale the canary
      # ReplicaSet back to 0. The stable version keeps serving all traffic.
      abortScaleDownDelaySeconds: 30

  # ── Pod template — identical to backend/deployment.yaml ───────────────
  # Kept in sync by hand. If this drifts, `bin/demo-up.sh --full` will
  # replay the diff and the canary step's analysis will catch real drift.
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mirador
        app.kubernetes.io/component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: mirador
              app.kubernetes.io/component: backend
      containers:
        - name: mirador
          # Image pinned by overlays/gke/image-tags-patch.yaml (ADR-0015).
          image: "registry.gitlab.com/mirador1/mirador-service/backend:1538631a2fe883d409804d380138a035a617b61c"
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: logs
              mountPath: /var/log/app
          envFrom:
            - configMapRef:
                name: mirador-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mirador-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mirador-secrets
                  key: JWT_SECRET
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: mirador-secrets
                  key: API_KEY
            - name: OTEL_EXPORTER_OTLP_AUTH
              valueFrom:
                secretKeyRef:
                  name: mirador-secrets
                  key: OTEL_EXPORTER_OTLP_AUTH
            - name: MANAGEMENT_TRACING_EXPORT_OTLP_HEADERS_AUTHORIZATION
              value: "Basic $(OTEL_EXPORTER_OTLP_AUTH)"
            - name: MANAGEMENT_LOGGING_EXPORT_OTLP_HEADERS_AUTHORIZATION
              value: "Basic $(OTEL_EXPORTER_OTLP_AUTH)"
            - name: GITLAB_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mirador-secrets
                  key: GITLAB_API_TOKEN
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 5
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 60
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 128Mi
        - name: logs
          emptyDir:
            sizeLimit: 256Mi
