# =============================================================================
# Nginx Ingress — HTTP-only base. Overlays add TLS via a strategic merge patch.
#
# Why a single Ingress on one hostname?
#   Angular (frontend) and Spring Boot (backend) are served from the SAME
#   hostname. The browser calls `/api/customers` — Nginx strips `/api` and
#   proxies to the backend. This eliminates CORS entirely: the browser never
#   makes a cross-origin request because it always talks to the same origin.
#
# Routing rules:
#   /api/(.*) → mirador:8080/$1        (backend — strip /api prefix)
#   /(.*)     → customer-ui:80         (frontend — Angular SPA)
#
# TLS: NOT configured in this base — overlays for production clusters
# (gke, eks, aks) add cert-manager annotations + a tls: block via patch.
# The local overlay (kind) inherits HTTP-only as-is.
#
# `${K8S_HOST}` is substituted by envsubst in the CI deploy loop (it is
# NOT a kustomize variable).
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mirador-ingress
  namespace: app
  labels:
    app.kubernetes.io/name: mirador-ingress
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    # Rewrite /api/customers → /customers (strip the /api prefix before proxying)
    nginx.ingress.kubernetes.io/rewrite-target: "/$2"
    # Increase timeouts for Kafka request-reply (default 60s may be too short)
    nginx.ingress.kubernetes.io/proxy-read-timeout: "90"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "90"
    # WebSocket support — nginx-ingress natively handles Upgrade headers
    # when proxy-http-version is 1.1. No configuration-snippet needed
    # (disabled by default since nginx-ingress 1.9+).
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
spec:
  ingressClassName: nginx
  rules:
    - host: "${K8S_HOST}"
      http:
        paths:
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: mirador
                port:
                  number: 8080
          - path: /()(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: customer-ui
                port:
                  number: 80
