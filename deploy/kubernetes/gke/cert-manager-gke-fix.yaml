# =============================================================================
# cert-manager GKE Autopilot compatibility fixes
#
# WHY THIS FILE EXISTS:
# GKE Autopilot ("kube-system is managed") denies cert-manager from creating
# its leader-election Lease locks in kube-system. Both the main controller
# and the cainjector fail with:
#   "GKE Warden authz [denied by managed-namespaces-limitation]: the namespace
#    'kube-system' is managed and the request's verb 'create' is denied"
#
# FIX: redirect leader election to the cert-manager namespace itself, then
# grant each ServiceAccount the RBAC rights to manage Lease objects there.
#
# USAGE:
#   kubectl apply -f k8s/gke/cert-manager-gke-fix.yaml
#   kubectl patch deployment cert-manager -n cert-manager --type='json' \
#     -p='[{"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--leader-election-namespace=cert-manager"}]'
#   kubectl patch deployment cert-manager-cainjector -n cert-manager --type='json' \
#     -p='[{"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--leader-election-namespace=cert-manager"}]'
#
# These patches are idempotent — applying them twice is safe.
# =============================================================================

# ── cert-manager controller ────────────────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cert-manager-controller-leaderelection
  namespace: cert-manager
rules:
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cert-manager-controller-leaderelection
  namespace: cert-manager
subjects:
- kind: ServiceAccount
  name: cert-manager
  namespace: cert-manager
roleRef:
  kind: Role
  name: cert-manager-controller-leaderelection
  apiGroup: rbac.authorization.k8s.io
---
# ── cert-manager cainjector ────────────────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cert-manager-cainjector-leaderelection
  namespace: cert-manager
rules:
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cert-manager-cainjector-leaderelection
  namespace: cert-manager
subjects:
- kind: ServiceAccount
  name: cert-manager-cainjector
  namespace: cert-manager
roleRef:
  kind: Role
  name: cert-manager-cainjector-leaderelection
  apiGroup: rbac.authorization.k8s.io
