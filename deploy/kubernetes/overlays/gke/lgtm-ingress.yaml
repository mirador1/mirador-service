# =============================================================================
# Ingress — expose the LGTM Grafana UI at grafana.mirador1.duckdns.org.
# TLS via cert-manager + Let's Encrypt (same ClusterIssuer as the app).
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lgtm-grafana
  namespace: infra
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - grafana.mirador1.duckdns.org
      secretName: lgtm-tls
  rules:
    - host: grafana.mirador1.duckdns.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lgtm
                port:
                  number: 3000
