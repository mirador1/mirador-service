# =============================================================================
# gke/ overlay — GKE Autopilot + in-cluster Postgres + cert-manager TLS
#
# Target: `mirador` GKE Autopilot cluster, Postgres as a StatefulSet
# (Cloud SQL is available as a future upgrade — files archived under
# docs/archive/gke-cloud-sql/).
#
# What this overlay does:
#   • Inherits base (namespace, ingress, backend, frontend, kafka, redis,
#     keycloak, postgres).
#   • Adds cert-manager-gke-fix.yaml — RBAC fix for Autopilot so cert-manager
#     can take leader-election leases outside kube-system.
#   • Patches the Ingress to add cert-manager + TLS block (Let's Encrypt).
#
# Apply:
#   kubectl apply -k deploy/kubernetes/overlays/gke
#
# CI (.gitlab-ci.yml → deploy:gke) substitutes ${K8S_HOST} via envsubst
# before feeding into kustomize.
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - ../../base/postgres
  - cert-manager-gke-fix.yaml

# Strategic merge patches — overlay fragments that merge with the base
# resources by matching kind+name. The patched field is replaced; the
# rest of the resource is left untouched.
patches:
  - path: ingress-tls-patch.yaml
    target:
      kind: Ingress
      name: mirador-ingress
  - path: configmap-gke-patch.yaml
    target:
      kind: ConfigMap
      name: mirador-config
