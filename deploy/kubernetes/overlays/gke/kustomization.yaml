# =============================================================================
# gke/ overlay — GKE Autopilot, in-cluster Postgres, no public surface.
#
# Per ADR-0025 the cluster exposes nothing to the public internet. Dropped
# with that ADR:
#   • cert-manager-gke-fix.yaml  (no cert-manager, no TLS)
#   • ingress-tls-patch.yaml     (no Ingress)
#   • lgtm-ingress.yaml          (no public Grafana)
#
# What this overlay still does:
#   • Inherits base + in-cluster Postgres (base/postgres).
#   • Patches the backend ConfigMap with GKE-specific values.
#   • Pins the backend image tag (Argo CD doesn't do envsubst).
#
# Apply:   kubectl apply -k deploy/kubernetes/overlays/gke
# Access:  kubectl port-forward (see bin/pf-prod.sh).
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - ../../base/postgres

patches:
  - path: configmap-gke-patch.yaml
    target:
      kind: ConfigMap
      name: mirador-config
  # Concrete image ref (Argo CD does not substitute env vars — see ADR-0015).
  - path: image-tags-patch.yaml
