# =============================================================================
# ConfigMap patch — GKE overlay values
#
# The base configmap uses `${PLACEHOLDER}` tokens that were historically
# substituted by `envsubst` in the `deploy:gke` CI job. Now that Argo CD
# is the deploy path (ADR-0015), those tokens are never substituted —
# Kustomize doesn't do envsubst. This patch hard-codes the 3 affected
# values for the current GKE cluster.
#
# To change them: edit this file, commit, let Argo CD reconcile.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: mirador-config
  namespace: app
data:
  # OTLP export goes to the in-cluster LGTM stack (grafana/otel-lgtm,
  # deployed from base/observability). Grafana UI at lgtm.infra:3000.
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://lgtm.infra.svc.cluster.local:4318"
  MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED: "true"
  MANAGEMENT_OTLP_TRACING_EXPORT_ENABLED: "true"

  # Auth0 issuer — empty so the fallback `${KEYCLOAK_URL:}/realms/...`
  # branch in application.yml is taken. The in-cluster Keycloak at
  # keycloak.infra.svc.cluster.local provides the OIDC path.
  AUTH0_ISSUER_URI: ""
  KEYCLOAK_URL: "http://keycloak.infra.svc.cluster.local:8080"

  # CORS allowlist. Since ADR-0025 the UI runs only on the developer
  # laptop (compose port 4200 or the built dist served via `ng serve` /
  # http-server). Requests to the cluster go through kubectl port-forward
  # which presents the backend at http://localhost:18080 — same-origin
  # relative to the UI, so CORS is only needed as a safety net for
  # Swagger UI + Postman + ad-hoc testing from the laptop.
  CORS_ALLOWED_ORIGINS: "http://localhost:4200,http://localhost:4300"
