# =============================================================================
# Strategic-merge patch — concrete image reference.
#
# Since commit 7049b3e the docker-build CI job pushes three tags on every
# main merge: :<sha>, :main (via CI_COMMIT_REF_SLUG) and :latest. We pin to
# :main here because:
#   • :latest drifts too fast if CI ever pushes from a non-main branch
#     (feature flag, hotfix) — :main only changes on merge.
#   • :<sha> would require re-editing this file for each deploy — back to
#     the old envsubst friction.
# Argo CD's imagePullPolicy: Always (the base default on non-kind overlays)
# ensures new :main digests are pulled without a manifest change.
#
# customer-ui image patch removed with ADR-0025 — the UI is no longer
# deployed in Kubernetes. It runs on the developer laptop only and
# reaches the cluster through bin/pf-prod.sh tunnels.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mirador
  namespace: app
spec:
  template:
    spec:
      containers:
        - name: mirador
          image: "registry.gitlab.com/mirador1/mirador-service/backend:main"
