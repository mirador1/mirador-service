# =============================================================================
# Strategic-merge patches — concrete image references.
#
# The base manifests use ${IMAGE_REGISTRY} / ${IMAGE_TAG} / ${UI_IMAGE_TAG}
# placeholders that the legacy `deploy:gke` CI job substituted via envsubst.
# Argo CD (ADR-0015) doesn't do envsubst, so Kubernetes rejects the invalid
# label/image strings.
#
# Short-term fix: pin to a known-working SHA tag from the GitLab registry.
# Long-term: refactor the CI to push `:main` alongside `:$SHA` and flip
# this patch to `newTag: main` so Argo CD auto-picks the latest.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mirador
  namespace: app
  labels:
    app.kubernetes.io/version: "1538631"
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/version: "1538631"
    spec:
      containers:
        - name: mirador
          image: "registry.gitlab.com/mirador1/mirador-service/backend:1538631a2fe883d409804d380138a035a617b61c"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-ui
  namespace: app
  labels:
    app.kubernetes.io/version: "1538631"
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/version: "1538631"
    spec:
      containers:
        - name: customer-ui
          # UI image lives in the mirador-ui project registry. Tag pinned to
          # the same SHA era as the backend for consistency.
          image: "registry.gitlab.com/mirador1/mirador-ui/frontend:latest"
