# =============================================================================
# kube-prom-stack-rendered.yaml — Prometheus + node-exporter + kube-state-metrics + Operator
#
# Rendered from kube-prometheus-stack chart 83.6.0 via `helm template` with
# the values in values-kube-prom-stack.yaml. DO NOT EDIT BY HAND — regenerate
# via the recipe at the top of values-kube-prom-stack.yaml when bumping the
# chart version or changing values.
#
# What this file deploys (into namespace `monitoring`):
#   - 1 Prometheus CR (Operator reconciles into a StatefulSet)
#   - 1 node-exporter DaemonSet (1 pod per node — kind has 1 node)
#   - 1 kube-state-metrics Deployment
#   - 1 Prometheus Operator Deployment
#   - 5 Services + 7 ServiceMonitors for in-cluster scrape targets
#   - Webhook + Job for admission webhook caBundle injection
#
# CRDs live in the sibling file kube-prom-stack-crds.yaml — applied first
# by kustomize because resources: ordering is preserved.
#
# Why namespace `monitoring` (not `observability`)?
# node-exporter requires hostNetwork+hostPID+hostPath, which Pod Security
# Standards `baseline` (the policy on the existing `observability`
# namespace) forbids. The `monitoring` namespace this overlay creates is
# labelled PSS=privileged and is reserved for the kube-prom-stack pods
# only — kept separate so a stricter policy on observability still holds.
# =============================================================================
