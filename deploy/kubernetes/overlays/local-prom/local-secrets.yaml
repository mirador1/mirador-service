# =============================================================================
# Local / kind — plain Secret stand-ins for ExternalSecrets
#
# The base pulls in ExternalSecret + SecretStore resources that project
# GCP Secret Manager entries into in-cluster Secrets. In kind there is no
# Workload Identity binding to GSM, so ESO never syncs — and pods that
# `envFrom: secretRef` block forever on secret-not-found.
#
# For local / CI validation we provide the same Secret names directly,
# with throwaway values. The kustomization patches out the ExternalSecret
# + SecretStore CRs via `$patch: delete` so ESO doesn't fight us over
# ownership.
#
# These values are NOT secrets in any meaningful sense — they are demo
# passwords used only on kind clusters that never touch real data. Do
# NOT copy them into real environments.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: mirador-secrets
  namespace: app
type: Opaque
stringData:
  DB_PASSWORD: demo
  JWT_SECRET: change-me-kind-only-not-a-real-secret-0000000000000000
  API_KEY: kind-demo-key
  GITLAB_API_TOKEN: kind-demo-token
---
apiVersion: v1
kind: Secret
metadata:
  name: mirador-secrets
  namespace: infra
type: Opaque
stringData:
  DB_PASSWORD: demo
  JWT_SECRET: change-me-kind-only-not-a-real-secret-0000000000000000
  API_KEY: kind-demo-key
  GITLAB_API_TOKEN: kind-demo-token
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-secrets
  namespace: infra
type: Opaque
stringData:
  KEYCLOAK_ADMIN_PASSWORD: admin
  KC_DB_PASSWORD: demo
