# =============================================================================
# aks/ overlay — Azure AKS cluster with in-cluster Postgres.
#
# Identical shape to overlays/eks. Azure-specific bits (managed identities,
# managed-premium storage class, app-routing add-on vs nginx-ingress) are
# handled by deploy/terraform/azure/ when that stack lands.
#
# Apply:
#   kubectl apply -k deploy/kubernetes/overlays/aks
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - ../../base/postgres
