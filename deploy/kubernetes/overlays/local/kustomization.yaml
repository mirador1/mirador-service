# =============================================================================
# local/ overlay — kind cluster, in-cluster Postgres, no public surface.
#
# Target: `kind` running locally (scripts/deploy-local.sh creates the cluster).
#
# What this overlay adds to the base:
#   • postgres StatefulSet  — base does not ship Postgres so GKE can swap
#     it for Cloud SQL. Local / eks / aks keep the in-cluster one.
#   • imagePullPolicy: Never on the backend — kind loads images via
#     `kind load docker-image`, so a remote pull would 404.
#
# Access from the laptop is via `kubectl port-forward` the same way as
# prod (see bin/pf-prod.sh). No Ingress anywhere — per ADR-0025.
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - ../../base/postgres

patches:
  - path: images-pullpolicy-patch.yaml

# No common labels / namespace mutation here — base resources already have
# the correct namespace (app / infra / observability) baked in.
