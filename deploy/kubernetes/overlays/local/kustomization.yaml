# =============================================================================
# local/ overlay — kind cluster, in-cluster Postgres, no public surface.
#
# Target: `kind` running locally (scripts/deploy-local.sh creates the cluster).
#
# What this overlay adds to the base:
#   • postgres StatefulSet  — base does not ship Postgres so GKE can swap
#     it for Cloud SQL. Local / eks / aks keep the in-cluster one.
#   • imagePullPolicy: Never on the backend — kind loads images via
#     `kind load docker-image`, so a remote pull would 404.
#
# Access from the laptop is via `kubectl port-forward` the same way as
# prod (see bin/pf-prod.sh). No Ingress anywhere — per ADR-0025.
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - ../../base/postgres
  # Plain Secrets that replace the GSM-backed ExternalSecrets on kind,
  # where ESO has no path to GCP Secret Manager. See local-secrets.yaml
  # for the security rationale (demo-only values).
  - local-secrets.yaml

patches:
  - path: images-pullpolicy-patch.yaml
  # ESO never syncs on kind (no Workload Identity Federation path to
  # GCP Secret Manager). Delete the ExternalSecret + SecretStore CRs
  # so they don't hang in Error state, so ESO doesn't fight us over
  # Secret ownership, and so pods that `envFrom: secretRef: mirador-
  # secrets` find the plain Secret we provide in local-secrets.yaml.
  - patch: |-
      $patch: delete
      apiVersion: external-secrets.io/v1
      kind: ExternalSecret
      metadata:
        name: mirador-secrets
        namespace: app
  - patch: |-
      $patch: delete
      apiVersion: external-secrets.io/v1
      kind: ExternalSecret
      metadata:
        name: mirador-secrets
        namespace: infra
  - patch: |-
      $patch: delete
      apiVersion: external-secrets.io/v1
      kind: ExternalSecret
      metadata:
        name: keycloak-secrets
        namespace: infra
  - patch: |-
      $patch: delete
      apiVersion: external-secrets.io/v1
      kind: SecretStore
      metadata:
        name: gcp-secret-manager
        namespace: app
  - patch: |-
      $patch: delete
      apiVersion: external-secrets.io/v1
      kind: SecretStore
      metadata:
        name: gcp-secret-manager
        namespace: infra

# No common labels / namespace mutation here — base resources already have
# the correct namespace (app / infra / observability) baked in.
