# =============================================================================
# ovh-prom/ overlay — OVH Managed Kubernetes + kube-prometheus-stack + lgtm
#
# Target: OVH Managed K8s cluster `mirador-prod` in GRA9 (HDS-eligible
# region). Per ADR-0053, OVH joins GCP at the canonical-tier delivery
# target list.
#
# Mirrors `gke-prom/` (the GCP equivalent) with three OVH-specific deltas:
#   1. **StorageClass** — OVH default is `csi-cinder-high-speed` (managed
#      by the openstack-cinder-csi driver), NOT GKE's `standard-rwo`.
#      The chart's `prometheus.storageSpec.volumeClaimTemplate` does
#      `storageClassName: ""` (= cluster default) so this works
#      automatically — just calling it out for the reader.
#   2. **LoadBalancer cost trap** — OVH Managed LBs default to the
#      `Premium` tier (~€100/month) without the
#      `service.beta.kubernetes.io/ovh-loadbalancer-type: classic`
#      annotation (~€20/month). See `lgtm-loadbalancer-ovh-patch.yaml`
#      for the override (commented out by default; demos use
#      `kubectl port-forward`).
#   3. **Ingress controller** — OVH does NOT pre-install one. The
#      lgtm/grafana ingress will fail until ingress-nginx is deployed
#      separately. For the demo we use `kubectl port-forward` instead.
#
# **Why files are duplicated rather than shared via relative paths**:
# Kustomize's security model rejects `resources: ["../sibling/file.yaml"]`
# without a non-default `--load-restrictor` flag. Copying the auto-
# generated CRDs + rendered chart keeps the overlay self-contained AND
# kustomize-CLI-friendly for `kubectl apply -k`. Maintenance burden is
# low : the duplicated files are auto-generated by `helm template`
# (run from `gke-prom/values-kube-prom-stack.yaml`'s instructions) so
# updates are a 30-second copy after re-rendering.
#
# Cost on OVH (rough):
#   - 1× B2-7 node always-on: €25.20/month (per ADR-0053)
#   - 6 extra kube-prom pods fit comfortably (~0.4 vCPU / 700 MiB
#     requested) — no extra node needed at min scale
#   - 10Gi persistent volume on csi-cinder: ~€0.04/GiB/month = €0.40/month
#   - 1× LoadBalancer (if ingress added later): +€20/month
#   Total at min, no LB: ~€26/month. Above ADR-0022's €10/month cap, but
#   ADR-0053 explicitly accepts this overhead for the canonical 2nd target.
#
# Apply (server-side required because chart CRDs exceed the 262 KiB
# annotation limit):
#   kubectl apply --server-side --force-conflicts \
#     -k deploy/kubernetes/overlays/ovh-prom
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - ../../base/postgres
  # `monitoring` namespace must exist before chart pods are created.
  # PSS=privileged for node-exporter (host paths + hostNetwork).
  - namespace.yaml
  # Prometheus Operator CRDs first, then CRs.
  - kube-prom-stack-crds.yaml
  - kube-prom-stack-rendered.yaml
  # ServiceMonitor for the Mirador app's /actuator/prometheus.
  - mirador-servicemonitor.yaml
  # Mirador alert + recording rules (Phase 3 O2) — shared with all overlays.
  - ../../base/observability-prom
  # Adds the kube-prom Prometheus as a 5th Grafana datasource in lgtm.
  - grafana-datasource-patch.yaml
  # NetworkPolicy extras — deny-by-default + allow narrow scrapes.
  - networkpolicy-extras.yaml

patches:
  # lgtm-mount patch — adds the new datasource ConfigMap as a volume in
  # the lgtm pod so Grafana picks it up at startup.
  - path: lgtm-mount-patch.yaml
    target:
      kind: Deployment
      name: lgtm
      namespace: observability
  # OVH-specific Mirador app config (OTLP endpoint + Auth0 + CORS — same
  # as GCP since the lgtm pod is also in-cluster on OVH).
  - path: configmap-ovh-patch.yaml
    target:
      kind: ConfigMap
      name: customer-service-config
      namespace: customer-service
  # OVH-specific patch — set the LoadBalancer tier annotation on the
  # lgtm Grafana service IF you want to expose it via OVH LB. Default
  # is `port-forward`-only (no LB). Uncomment to expose.
  # - path: lgtm-loadbalancer-ovh-patch.yaml
  #   target:
  #     kind: Service
  #     name: lgtm
  #     namespace: observability

# Label all OVH-overlay-applied resources for blast-radius queries:
# `kubectl get all -A -l mirador.target=ovh`.
labels:
  - pairs:
      mirador.target: ovh
    includeSelectors: false
