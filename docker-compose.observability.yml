services:
  lgtm:
    image: grafana/otel-lgtm:latest
    container_name: springapi-lgtm
    ports:
      - "3001:3000"
      - "4317:4317"
      - "4318:4318"
    environment:
      ENABLE_LOGS_ALL: "true"

  prometheus:
    image: prom/prometheus:latest
    container_name: springapi-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./ops/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:latest
    container_name: springapi-grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    volumes:
      - ./ops/observability/grafana/provisioning:/etc/grafana/provisioning
      - ./ops/observability/grafana/dashboards:/var/lib/grafana/dashboards
