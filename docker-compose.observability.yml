# =============================================================================
# docker-compose.observability.yml — Observability stack
#
# Run with: docker compose -f docker-compose.observability.yml up -d
#
# Two parallel observability paths are provided:
#
# Path 1 — LGTM all-in-one (Grafana + Loki + Tempo + Mimir)    [port 3001]
#   grafana/otel-lgtm bundles all LGTM components in a single container.
#   The Spring Boot app sends traces and logs via OpenTelemetry OTLP (port 4318).
#   Grafana is pre-configured with Loki (logs) and Tempo (traces) datasources.
#   Access: http://localhost:3001
#
# Path 2 — Standalone Prometheus + Grafana                      [port 3000 + 9090]
#
# Path 3 — Zipkin (standalone distributed tracing)              [port 9411]
#   Lightweight alternative to Tempo. Receives spans via OTLP or Zipkin protocol.
#   Access: http://localhost:9411
#
# Path 4 — Pyroscope (continuous profiling)                     [port 4040]
#   CPU/memory flamegraphs. The Spring Boot app pushes profiles via the Pyroscope
#   Java agent or HTTP SDK. Integrates with Grafana as a datasource.
#   Access: http://localhost:4040
#   Prometheus scrapes /actuator/prometheus every 15s.
#   Grafana is provisioned with dashboards from infra/observability/grafana/.
#   Access Grafana: http://localhost:3000
#   Access Prometheus: http://localhost:9090
#
# The two paths can run concurrently. LGTM is the recommended path for full
# distributed tracing (Tempo) and structured log correlation (Loki + traceID).
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # LGTM — Loki + Grafana + Tempo + Mimir (Prometheus-compatible)
  #
  # This all-in-one container from Grafana Labs packages the entire
  # observability backend for development/demo use.
  #
  # Ports:
  #   3001 (host) → 3000 (container): Grafana UI
  #   4317: OTLP gRPC endpoint for traces and logs
  #   4318: OTLP HTTP endpoint for traces and logs (used by Spring Boot)
  #
  # The app sends data via: management.opentelemetry.*.export.otlp.endpoint
  # (set to http://localhost:4318 by default in application.yml)
  # ---------------------------------------------------------------------------
  lgtm:
    image: grafana/otel-lgtm:0.22.1
    container_name: customerservice-lgtm
    ports:
      - "3001:3000"    # Grafana UI (separate port from standalone Grafana on 3000)
      # Loki API (3100) is NOT exposed directly — routed through the CORS proxy instead.
      # The cors-proxy service listens on host port 3100 and forwards to lgtm:3100
      # with Access-Control-Allow-Origin headers for the Angular UI.
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP — Spring Boot sends traces and logs here
      - "9096:9096"    # Tempo gRPC — used by Jaeger Query to read traces
    depends_on:
      - prometheus
    volumes:
      # Pre-provision a Grafana dashboard into the LGTM Grafana instance
      - ./infra/observability/grafana/dashboards-lgtm/dashboard-demo-lgtm.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/dashboard-demo-lgtm.yaml
      - ./infra/observability/grafana/dashboards-lgtm/demo.json:/otel-lgtm/demo.json
      # Override OTEL collector config to also forward traces to Jaeger
      - ./infra/observability/otelcol-override.yaml:/otel-lgtm/otelcol-config.yaml:ro
    environment:
      # Forward all application logs received via OTLP to Loki
      ENABLE_LOGS_ALL: "true"

  # ---------------------------------------------------------------------------
  # Prometheus — time-series metrics store
  #
  # Scrapes /actuator/prometheus on the Spring Boot application every 15s.
  # Configured by infra/observability/prometheus.yml.
  #
  # extra_hosts: host.docker.internal → host-gateway
  #   Allows Prometheus (running in Docker) to reach the Spring Boot application
  #   running on the host machine (not in Docker) via a stable hostname.
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.3.1
    container_name: customerservice-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "9091:9090"    # Prometheus UI and API — http://localhost:9091 (9090 used by Keycloak)
    extra_hosts:
      # Make host machine accessible as "host.docker.internal" from within the container
      - "host.docker.internal:host-gateway"
    volumes:
      # Mount the scrape config as read-only — Prometheus does not need to write it
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  # ---------------------------------------------------------------------------
  # Grafana — visualization layer for Prometheus metrics
  #
  # Dashboards and datasources are provisioned at startup from the infra/ directory,
  # so no manual setup is needed after first launch.
  #   - Datasources: infra/observability/grafana/provisioning/datasources/
  #   - Dashboards:  infra/observability/grafana/dashboards/
  # Access: http://localhost:3000 (no login required — anonymous auth for dev)
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.6.0
    container_name: customerservice-grafana
    ports:
      - "3000:3000"    # Grafana UI — http://localhost:3000
    depends_on:
      - prometheus
    environment:
      # Disable login for dev — anonymous access with Admin role
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      # Default dashboard: Customer Service Overview
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/demo.json
    volumes:
      # Auto-provision datasources (Prometheus) and dashboards at startup
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/observability/grafana/dashboards:/var/lib/grafana/dashboards

  # ---------------------------------------------------------------------------
  # Jaeger — distributed tracing with advanced analysis
  #
  # Receives traces via the Zipkin protocol (port 9412) from the Spring Boot
  # app alongside Zipkin. Both Zipkin and Jaeger see the same traces.
  # The Zipkin receiver is built into Jaeger all-in-one.
  #
  # Features over Zipkin: trace comparison, dependency graph, flamegraph,
  # critical path analysis, deep dependency analysis.
  # Access: http://localhost:16686
  # ---------------------------------------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:1.64.0
    container_name: customerservice-jaeger
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: ":9412"
    ports:
      - "16686:16686"    # Jaeger UI
      - "14268:14268"    # Jaeger collector HTTP (accepts Zipkin spans)
    restart: unless-stopped
  #      - "4318:4318"    # OTLP HTTP (conflicts with LGTM if both run simultaneously)

  # ---------------------------------------------------------------------------
  # Zipkin — lightweight distributed tracing UI
  #
  # Standalone alternative to Tempo/Jaeger with a simple, focused UI.
  # Receives spans via its native Zipkin protocol (POST /api/v2/spans)
  # or via OTLP when placed behind an OpenTelemetry Collector.
  #
  # Spring Boot integration: set management.zipkin.tracing.endpoint
  # to http://localhost:9411/api/v2/spans in application.yml.
  # Access: http://localhost:9411
  # ---------------------------------------------------------------------------
  zipkin:
    image: openzipkin/zipkin:3.5
    container_name: customerservice-zipkin
    ports:
      - "9411:9411"
    environment:
      # Armeria (Zipkin's HTTP server) supports CORS via ZIPKIN_HTTP_ALLOWED_ORIGINS
      # This lets the Angular UI on localhost:4200 call Zipkin directly without a proxy
      ZIPKIN_HTTP_ALLOWED_ORIGINS: "http://localhost:4200"
      JAVA_OPTS: "-Xms64m -Xmx256m"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Nginx CORS proxy for Loki
  #
  # The Angular UI on localhost:4200 needs to call Loki (3100) directly.
  # Loki does not support CORS natively, so this Nginx sidecar adds the
  # required Access-Control-Allow-Origin headers.
  #
  # The proxy listens on port 3100 (same as Loki's native port) so the
  # frontend can call http://localhost:3100/loki/api/v1/query_range without
  # any port mapping changes. The LGTM container does NOT expose port 3100
  # to the host — only this proxy does.
  #
  # Zipkin has native CORS support via ZIPKIN_HTTP_ALLOWED_ORIGINS, so it
  # does not need the proxy (direct access on port 9411).
  # ---------------------------------------------------------------------------
  cors-proxy:
    image: nginx:1.27-alpine
    container_name: customerservice-cors-proxy
    ports:
      - "3100:3100"    # Loki CORS proxy
      - "2375:2375"    # Docker API CORS proxy
    volumes:
      - ./infra/observability/cors-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - lgtm
      - docker-proxy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Docker Socket Proxy — secure, filtered Docker API for the Angular UI
  #
  # Exposes a read-only subset of the Docker Engine API over TCP (port 2376).
  # Only container operations are allowed — no image pull, no exec, no volumes.
  # The Angular UI calls this via the CORS Nginx proxy at http://localhost:2375.
  #
  # This keeps the backend agnostic — no Docker code in Spring Boot.
  # ---------------------------------------------------------------------------
  docker-proxy:
    image: tecnativa/docker-socket-proxy:0.4.2
    container_name: customerservice-docker-proxy
    environment:
      CONTAINERS: 1      # allow /containers/* (list, inspect, start, stop, restart)
      POST: 1            # allow POST (start/stop/restart are POST)
      IMAGES: 0
      VOLUMES: 0
      NETWORKS: 0
      EXEC: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Pyroscope — continuous profiling (CPU, memory, allocations)
  #
  # Provides flamegraph visualizations for identifying performance bottlenecks.
  # The Spring Boot app pushes profiles via the Pyroscope Java agent
  # (add -javaagent:pyroscope.jar to JVM args) or HTTP SDK.
  #
  # Also integrates as a Grafana datasource for unified observability.
  # Access: http://localhost:4040
  # ---------------------------------------------------------------------------
  pyroscope:
    image: grafana/pyroscope:1.20.3
    container_name: customerservice-pyroscope
    ports:
      - "4040:4040"
    restart: unless-stopped
