<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280">
  <defs>
    <!-- Background gradient: deep navy to dark blue-green -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#0d1f38"/>
      <stop offset="100%" stop-color="#071a2e"/>
    </linearGradient>
    <!-- Glow for tower / icons -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Subtle glow for title -->
    <filter id="textGlow" x="-5%" y="-20%" width="110%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Grid pattern for background texture -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e3a5f" stroke-width="0.3" opacity="0.4"/>
    </pattern>
    <!-- Clip for rounded corners -->
    <clipPath id="clip">
      <rect width="1200" height="280" rx="16"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="280" rx="16" fill="url(#bg)"/>
  <rect width="1200" height="280" rx="16" fill="url(#grid)"/>

  <!-- Decorative left panel (dark) -->
  <rect x="0" y="0" width="340" height="280" rx="16" fill="#0a1628" opacity="0.6" clip-path="url(#clip)"/>
  <rect x="320" y="0" width="1" height="280" fill="#1e3a5f" opacity="0.5"/>

  <!-- Left panel: Mirador tower icon -->
  <!-- Outer ring -->
  <circle cx="170" cy="140" r="95" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.25"/>
  <circle cx="170" cy="140" r="80" fill="none" stroke="#3b82f6" stroke-width="0.8" opacity="0.15"/>

  <!-- Tower body (centered at 170,140, scale ~4x from 32px icon) -->
  <g transform="translate(60 28) scale(1.75)">
    <!-- Tower body -->
    <rect x="50" y="65" width="20" height="38" rx="2" fill="#3b82f6" opacity="0.85"/>
    <!-- Tower platform -->
    <rect x="44" y="58" width="32" height="7" rx="2" fill="#3b82f6"/>
    <!-- Battlements -->
    <rect x="44" y="53" width="6" height="5" rx="1" fill="#3b82f6"/>
    <rect x="53" y="53" width="6" height="5" rx="1" fill="#3b82f6"/>
    <rect x="62" y="53" width="6" height="5" rx="1" fill="#3b82f6"/>
    <rect x="71" y="53" width="5" height="5" rx="1" fill="#3b82f6"/>
    <!-- Window (eye) -->
    <ellipse cx="60" cy="75" rx="5" ry="4" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
    <circle cx="60" cy="75" r="2" fill="#60a5fa" opacity="0.85"/>
    <!-- Binoculars -->
    <circle cx="55" cy="61" r="2.5" fill="none" stroke="#93c5fd" stroke-width="1.2"/>
    <circle cx="65" cy="61" r="2.5" fill="none" stroke="#93c5fd" stroke-width="1.2"/>
    <rect x="57" y="60.5" width="6" height="1" fill="#93c5fd"/>
    <!-- Radar arcs -->
    <path d="M 82 45 A 12 12 0 0 1 94 57" stroke="#34d399" stroke-width="1.5" fill="none" opacity="0.8" filter="url(#glow)"/>
    <path d="M 82 38 A 19 19 0 0 1 101 57" stroke="#34d399" stroke-width="1.2" fill="none" opacity="0.55"/>
    <path d="M 82 31 A 26 26 0 0 1 108 57" stroke="#34d399" stroke-width="0.8" fill="none" opacity="0.3"/>
    <!-- Signal dot -->
    <circle cx="86" cy="48" r="2.5" fill="#34d399" opacity="0.9" filter="url(#glow)"/>
    <!-- Stars -->
    <circle cx="25" cy="30" r="1" fill="#60a5fa" opacity="0.7"/>
    <circle cx="35" cy="22" r="1.5" fill="#60a5fa" opacity="0.5"/>
    <circle cx="15" cy="45" r="1" fill="#34d399" opacity="0.6"/>
    <circle cx="95" cy="25" r="1" fill="#60a5fa" opacity="0.5"/>
    <!-- Ground -->
    <rect x="30" y="103" width="60" height="3" rx="1.5" fill="#3b82f6" opacity="0.3"/>
    <rect x="40" y="106" width="40" height="2" rx="1" fill="#3b82f6" opacity="0.15"/>
  </g>

  <!-- Project title -->
  <text x="370" y="90" font-family="system-ui,-apple-system,sans-serif" font-size="52" font-weight="800"
        fill="#f8fafc" filter="url(#textGlow)" letter-spacing="-1">
    Mirador Service
  </text>

  <!-- Subtitle -->
  <text x="372" y="128" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="400"
        fill="#94a3b8" letter-spacing="0.3">
    Observable REST API — Spring Boot 4 · Java 25 · PostgreSQL · Kafka · Redis
  </text>

  <!-- Divider -->
  <line x1="372" y1="148" x2="820" y2="148" stroke="#1e3a5f" stroke-width="1"/>

  <!-- Tech badges row -->
  <rect x="372" y="162" width="116" height="30" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="429" y="182" font-family="system-ui,sans-serif" font-size="12" font-weight="600"
        fill="#4ade80" text-anchor="middle">🍃  Spring Boot 4</text>

  <rect x="498" y="162" width="88" height="30" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="541" y="182" font-family="system-ui,sans-serif" font-size="12" font-weight="600"
        fill="#fb923c" text-anchor="middle">☕  Java 25</text>

  <rect x="596" y="162" width="104" height="30" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="647" y="182" font-family="system-ui,sans-serif" font-size="12" font-weight="600"
        fill="#60a5fa" text-anchor="middle">🐘  PostgreSQL 17</text>

  <rect x="710" y="162" width="80" height="30" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="749" y="182" font-family="system-ui,sans-serif" font-size="12" font-weight="600"
        fill="#f59e0b" text-anchor="middle">⚡  Kafka</text>

  <rect x="800" y="162" width="76" height="30" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="837" y="182" font-family="system-ui,sans-serif" font-size="12" font-weight="600"
        fill="#f87171" text-anchor="middle">🗄  Redis</text>

  <rect x="886" y="162" width="96" height="30" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="933" y="182" font-family="system-ui,sans-serif" font-size="12" font-weight="600"
        fill="#818cf8" text-anchor="middle">☸️  Kubernetes</text>

  <!-- Features row -->
  <text x="372" y="224" font-family="system-ui,sans-serif" font-size="13" fill="#64748b">
    📡 OTLP · 📊 Mimir · 🔍 Tempo · 📋 Loki · 🔥 Pyroscope · 🔐 Auth0 · 🛡 Resilience4j · 🤖 Ollama
  </text>

  <!-- GitLab badge (top-right) -->
  <rect x="1040" y="20" width="140" height="28" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="1110" y="38" font-family="system-ui,sans-serif" font-size="11" font-weight="500"
        fill="#a78bfa" text-anchor="middle">🦊  gitlab.com/mirador1</text>

  <!-- Decorative right-side waveform -->
  <g opacity="0.08">
    <polyline points="960,60 980,60 990,30 1000,90 1010,15 1020,105 1030,45 1040,60 1080,60"
      fill="none" stroke="#34d399" stroke-width="2" stroke-linecap="round"/>
    <polyline points="960,80 980,80 990,50 1000,110 1010,35 1020,125 1030,65 1040,80 1080,80"
      fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Bottom accent -->
  <rect x="16" y="270" width="1168" height="3" rx="1.5" fill="url(#bg)" opacity="0.3"/>
  <rect x="370" y="269" width="180" height="3" rx="1.5" fill="#3b82f6" opacity="0.6"/>
</svg>
