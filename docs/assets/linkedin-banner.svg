<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396" role="img" aria-label="Iris — observability-first showcase across 7 facets">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="50%" stop-color="#0f1a30"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff3b30"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#af52de"/>
    </linearGradient>
    <linearGradient id="rim-light" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cbd5e1" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#1e293b" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#cbd5e1" stop-opacity="0.5"/>
    </linearGradient>
    <radialGradient id="sensor-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#7ddffe" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7ddffe" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass-refract-progressive" x1="0" y1="0.5" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="22%" stop-color="#ffffff" stop-opacity="0.32"/>
      <stop offset="48%" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="75%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1584" height="396" fill="url(#bg)"/>

  <!-- Iris diaphragm icon — centered vertically, left-anchored at 230,198 with radius 130 -->
  <g transform="translate(230 198) scale(1.45)">
    <circle r="100" fill="none" stroke="#34d4d4" stroke-width="0.6" opacity="0.4"/>
    <circle r="95" fill="none" stroke="url(#rim-light)" stroke-width="2"/>
    <circle r="91" fill="#0a0a14" stroke="#1e293b" stroke-width="1"/>
    <circle r="88" fill="none" stroke="#475569" stroke-width="0.5" opacity="0.6"/>

    <g stroke="#7ddffe" stroke-width="0.7" opacity="0.5">
      <g><line x1="0" y1="-100" x2="0" y2="-94"/></g>
      <g transform="rotate(45)"><line x1="0" y1="-100" x2="0" y2="-94"/></g>
      <g transform="rotate(90)"><line x1="0" y1="-100" x2="0" y2="-94"/></g>
      <g transform="rotate(135)"><line x1="0" y1="-100" x2="0" y2="-94"/></g>
      <g transform="rotate(180)"><line x1="0" y1="-100" x2="0" y2="-94"/></g>
      <g transform="rotate(225)"><line x1="0" y1="-100" x2="0" y2="-94"/></g>
      <g transform="rotate(270)"><line x1="0" y1="-100" x2="0" y2="-94"/></g>
      <g transform="rotate(315)"><line x1="0" y1="-100" x2="0" y2="-94"/></g>
    </g>

    <g stroke="#000000" stroke-width="0.4">
      <g transform="rotate(-90)">
        <path d="M 85 0 A 85 85 0 0 1 35.93 77.03 Q 5 30 5.92 12.69 Q 40 5 85 0 Z" fill="#ff2d20" opacity="0.55"/>
        <path d="M 85 0 A 85 85 0 0 1 35.93 77.03 Q 5 30 5.92 12.69 Q 40 5 85 0 Z" fill="url(#glass-refract-progressive)"/>
      </g>
      <g transform="rotate(-38.57)">
        <path d="M 85 0 A 85 85 0 0 1 35.93 77.03 Q 5 30 5.92 12.69 Q 40 5 85 0 Z" fill="#ff9500" opacity="0.55"/>
        <path d="M 85 0 A 85 85 0 0 1 35.93 77.03 Q 5 30 5.92 12.69 Q 40 5 85 0 Z" fill="url(#glass-refract-progressive)"/>
      </g>
      <g transform="rotate(12.86)">
        <path d="M 85 0 A 85 85 0 0 1 35.93 77.03 Q 5 30 5.92 12.69 Q 40 5 85 0 Z" fill="#ffcc00" opacity="0.55"/>
        <path d="M 85 0 A 85 85 0 0 1 35.93 77.03 Q 5 30 5.92 12.69 Q 40 5 85 0 Z" fill="url(#glass-refract-progressive)"/>
      </g>
      <g transform="rotate(64.29)">
        <path d="M 85 0 A 85 85 0 0 1 35.93 77.03 Q 5 30 5.92 12.69 Q 40 5 85 0 Z" fill="#34c759" opacity="0.55"/>
        <path d="M 85 0 A 85 85 0 0 1 35.93 77.03 Q 5 30 5.92 12.69 Q 40 5 85 0 Z" fill="url(#glass-refract-progressive)"/>
      </g>
      <g transform="rotate(115.72)">
        <path d="M 85 0 A 85 85 0 0 1 35.93 77.03 Q 5 30 5.92 12.69 Q 40 5 85 0 Z" fill="#30c9d4" opacity="0.55"/>
        <path d="M 85 0 A 85 85 0 0 1 35.93 77.03 Q 5 30 5.92 12.69 Q 40 5 85 0 Z" fill="url(#glass-refract-progressive)"/>
      </g>
      <g transform="rotate(167.15)">
        <path d="M 85 0 A 85 85 0 0 1 35.93 77.03 Q 5 30 5.92 12.69 Q 40 5 85 0 Z" fill="#007aff" opacity="0.55"/>
        <path d="M 85 0 A 85 85 0 0 1 35.93 77.03 Q 5 30 5.92 12.69 Q 40 5 85 0 Z" fill="url(#glass-refract-progressive)"/>
      </g>
      <g transform="rotate(218.58)">
        <path d="M 85 0 A 85 85 0 0 1 35.93 77.03 Q 5 30 5.92 12.69 Q 40 5 85 0 Z" fill="#af52de" opacity="0.55"/>
        <path d="M 85 0 A 85 85 0 0 1 35.93 77.03 Q 5 30 5.92 12.69 Q 40 5 85 0 Z" fill="url(#glass-refract-progressive)"/>
      </g>
    </g>

    <g stroke="#7ddffe" stroke-width="0.5" opacity="0.5">
      <line x1="-90" y1="0" x2="-22" y2="0"/>
      <line x1="22" y1="0" x2="90" y2="0"/>
      <line x1="0" y1="-90" x2="0" y2="-22"/>
      <line x1="0" y1="22" x2="0" y2="90"/>
    </g>

    <polygon points="0,-12 10.78,-5.16 10.78,5.16 0,12 -10.78,5.16 -10.78,-5.16 -5.39,-10.71" fill="#000000"/>
    <circle r="9" fill="url(#sensor-glow)"/>
    <circle r="2.5" fill="#ffffff"/>
    <circle r="1" fill="#7ddffe"/>
  </g>

  <!-- Right side : title + subtitle + URL -->
  <g font-family="'Inter','Segoe UI',system-ui,sans-serif">
    <!-- Big IRIS title -->
    <text x="500" y="170" font-size="140" font-weight="800" letter-spacing="10" fill="url(#title-grad)">IRIS</text>

    <!-- Tagline -->
    <text x="503" y="218" font-size="22" font-weight="500" fill="#94a3b8" letter-spacing="5">
      OBSERVABILITY-FIRST SHOWCASE · 7 FACETS
    </text>

    <!-- One-line value prop -->
    <text x="503" y="258" font-size="16" font-weight="400" fill="#cbd5e1" letter-spacing="0.5">
      Java + Spring Boot 4  ·  Python + FastAPI  ·  Angular 21 zoneless  ·  GKE + Terraform + Argo CD  ·  Spring AI + ONNX
    </text>

    <!-- Spectrum accent strip (7 colors = 7 facets) -->
    <g>
      <rect x="503" y="280" width="120" height="4" rx="2" fill="#ff2d20"/>
      <rect x="628" y="280" width="120" height="4" rx="2" fill="#ff9500"/>
      <rect x="753" y="280" width="120" height="4" rx="2" fill="#ffcc00"/>
      <rect x="878" y="280" width="120" height="4" rx="2" fill="#34c759"/>
      <rect x="1003" y="280" width="120" height="4" rx="2" fill="#30c9d4"/>
      <rect x="1128" y="280" width="120" height="4" rx="2" fill="#007aff"/>
      <rect x="1253" y="280" width="120" height="4" rx="2" fill="#af52de"/>
    </g>

    <!-- Facet labels under the spectrum strip -->
    <g font-size="11" font-weight="700" letter-spacing="1.5" fill="#cbd5e1">
      <text x="503" y="304">OBSERVE</text>
      <text x="628" y="304">INFRA · CLOUD</text>
      <text x="753" y="304">SECURITY</text>
      <text x="878" y="304">CI · CD</text>
      <text x="1003" y="304">ARCHITECTURE</text>
      <text x="1128" y="304">AI · ML</text>
      <text x="1253" y="304">QUALITY</text>
    </g>

    <!-- GitHub URL prominently displayed -->
    <g transform="translate(503 348)">
      <!-- GitHub mark icon (simple silhouette) -->
      <circle cx="14" cy="0" r="14" fill="#ffffff"/>
      <path d="M 14 -10 a 10 10 0 0 0 -3.16 19.49 c 0.5 0.09 0.68 -0.22 0.68 -0.48 v -1.71 c -2.78 0.6 -3.37 -1.34 -3.37 -1.34 c -0.45 -1.16 -1.11 -1.46 -1.11 -1.46 c -0.91 -0.62 0.07 -0.61 0.07 -0.61 c 1 0.07 1.53 1.03 1.53 1.03 c 0.89 1.53 2.34 1.09 2.91 0.83 c 0.09 -0.65 0.35 -1.09 0.63 -1.34 c -2.22 -0.25 -4.55 -1.11 -4.55 -4.94 c 0 -1.09 0.39 -1.99 1.03 -2.69 c -0.1 -0.25 -0.45 -1.27 0.1 -2.65 c 0 0 0.84 -0.27 2.75 1.02 c 0.8 -0.22 1.65 -0.33 2.5 -0.33 c 0.85 0 1.7 0.11 2.5 0.33 c 1.91 -1.29 2.75 -1.02 2.75 -1.02 c 0.55 1.38 0.2 2.4 0.1 2.65 c 0.64 0.7 1.03 1.6 1.03 2.69 c 0 3.84 -2.34 4.69 -4.57 4.94 c 0.36 0.31 0.68 0.92 0.68 1.85 v 2.74 c 0 0.27 0.18 0.58 0.69 0.48 a 10 10 0 0 0 -3.18 -19.49 z" fill="#0a0a14" transform="translate(0 14)"/>

      <text x="42" y="6" font-size="22" font-weight="600" fill="#ffffff" letter-spacing="0.5" font-family="'JetBrains Mono','Fira Code',ui-monospace,monospace">github.com/iris7-app</text>
    </g>

    <!-- Subtle author / signature line -->
    <text x="1577" y="378" font-size="11" font-weight="500" fill="#475569" letter-spacing="1" text-anchor="end" font-family="'JetBrains Mono','Fira Code',ui-monospace,monospace">
      benoit.besson  ·  Senior Backend / Platform / Observability Engineer
    </text>
  </g>
</svg>
