<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- mirador-service (Java/Spring Boot 4) — GREEN variant per Spring Boot brand
       (#6DB33F).  Watchtower silhouette mirrors the mirador-ui logo for
       visual sibling identity ; only the colour scheme differs to flag
       repo at-a-glance in the GitLab group sidebar. -->
  <rect width="32" height="32" rx="7" fill="#6DB33F"/>
  <rect x="2" y="2" width="28" height="28" rx="5.5" fill="#ffffff"/>
  <!-- Tower body -->
  <rect x="13" y="17" width="6" height="11" rx="0.5" fill="#6DB33F" opacity="0.9"/>
  <!-- Tower platform -->
  <rect x="11" y="15" width="10" height="2" rx="0.5" fill="#6DB33F"/>
  <!-- Battlements (3 merlons) -->
  <rect x="11" y="13" width="2" height="2" rx="0.3" fill="#6DB33F"/>
  <rect x="14.5" y="13" width="2" height="2" rx="0.3" fill="#6DB33F"/>
  <rect x="18" y="13" width="2" height="2" rx="0.3" fill="#6DB33F"/>
  <!-- Window -->
  <ellipse cx="16" cy="20" rx="1.5" ry="1.2" fill="#ffffff" stroke="#6DB33F" stroke-width="0.5"/>
  <circle cx="16" cy="20" r="0.5" fill="#5BA32E" opacity="0.9"/>
  <!-- Binoculars -->
  <circle cx="14" cy="16" r="0.8" fill="none" stroke="#4F8B26" stroke-width="0.5"/>
  <circle cx="18" cy="16" r="0.8" fill="none" stroke="#4F8B26" stroke-width="0.5"/>
  <!-- Radar arcs (Java orange tint for accent — OpenJDK #6DB33F) -->
  <path d="M 22 12 A 3.5 3.5 0 0 1 25.5 15.5" stroke="#6DB33F" stroke-width="0.7" fill="none" opacity="0.9"/>
  <path d="M 22 10 A 5.5 5.5 0 0 1 27.5 15.5" stroke="#6DB33F" stroke-width="0.55" fill="none" opacity="0.6"/>
  <!-- Signal dot -->
  <circle cx="23.5" cy="12.5" r="0.7" fill="#6DB33F" opacity="0.95"/>
</svg>
