<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Iris-7 landing page — 7 facets diaphragm">
  <defs>
    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cbd5e1" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#1e293b" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#cbd5e1" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="refract" x1="0" y1="0.5" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="22%" stop-color="#ffffff" stop-opacity="0.32"/>
      <stop offset="48%" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="75%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="seven-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff3b30"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#af52de"/>
    </linearGradient>
  </defs>
  <!-- Transparent bg -->
  <g transform="translate(256 256) scale(2.45)">
    <!-- Outer scope ring -->
    <circle r="100" fill="none" stroke="#34d4d4" stroke-width="0.6" opacity="0.5"/>
    <!-- Lens barrel rings -->
    <circle r="95" fill="none" stroke="url(#rim)" stroke-width="2"/>
    <circle r="91" fill="#0a0a14" stroke="#1e293b" stroke-width="1"/>
    <circle r="88" fill="none" stroke="#475569" stroke-width="0.5" opacity="0.6"/>

    <!-- 16 tick marks -->
    <g stroke="#7ddffe" stroke-width="0.7" opacity="0.6">
      <g><line x1="0" y1="-100" x2="0" y2="-94"/></g>
      <g transform="rotate(22.5)"><line x1="0" y1="-100" x2="0" y2="-94"/></g>
      <g transform="rotate(45)"><line x1="0" y1="-100" x2="0" y2="-94"/></g>
      <g transform="rotate(67.5)"><line x1="0" y1="-100" x2="0" y2="-94"/></g>
      <g transform="rotate(90)"><line x1="0" y1="-100" x2="0" y2="-94"/></g>
      <g transform="rotate(112.5)"><line x1="0" y1="-100" x2="0" y2="-94"/></g>
      <g transform="rotate(135)"><line x1="0" y1="-100" x2="0" y2="-94"/></g>
      <g transform="rotate(157.5)"><line x1="0" y1="-100" x2="0" y2="-94"/></g>
      <g transform="rotate(180)"><line x1="0" y1="-100" x2="0" y2="-94"/></g>
      <g transform="rotate(202.5)"><line x1="0" y1="-100" x2="0" y2="-94"/></g>
      <g transform="rotate(225)"><line x1="0" y1="-100" x2="0" y2="-94"/></g>
      <g transform="rotate(247.5)"><line x1="0" y1="-100" x2="0" y2="-94"/></g>
      <g transform="rotate(270)"><line x1="0" y1="-100" x2="0" y2="-94"/></g>
      <g transform="rotate(292.5)"><line x1="0" y1="-100" x2="0" y2="-94"/></g>
      <g transform="rotate(315)"><line x1="0" y1="-100" x2="0" y2="-94"/></g>
      <g transform="rotate(337.5)"><line x1="0" y1="-100" x2="0" y2="-94"/></g>
    </g>

    <!-- 7 wedges in 7 facet colors -->
    <g>
      <g transform="rotate(-90)"><path d="M 85 0 A 85 85 0 0 1 35.93 77.03 Q 5 30 5.92 12.69 Q 40 5 85 0 Z" fill="#ff2d20" opacity="0.55"/><path d="M 85 0 A 85 85 0 0 1 35.93 77.03 Q 5 30 5.92 12.69 Q 40 5 85 0 Z" fill="url(#refract)"/></g>
      <g transform="rotate(-38.57)"><path d="M 85 0 A 85 85 0 0 1 35.93 77.03 Q 5 30 5.92 12.69 Q 40 5 85 0 Z" fill="#ff9500" opacity="0.55"/><path d="M 85 0 A 85 85 0 0 1 35.93 77.03 Q 5 30 5.92 12.69 Q 40 5 85 0 Z" fill="url(#refract)"/></g>
      <g transform="rotate(12.86)"><path d="M 85 0 A 85 85 0 0 1 35.93 77.03 Q 5 30 5.92 12.69 Q 40 5 85 0 Z" fill="#ffcc00" opacity="0.55"/><path d="M 85 0 A 85 85 0 0 1 35.93 77.03 Q 5 30 5.92 12.69 Q 40 5 85 0 Z" fill="url(#refract)"/></g>
      <g transform="rotate(64.29)"><path d="M 85 0 A 85 85 0 0 1 35.93 77.03 Q 5 30 5.92 12.69 Q 40 5 85 0 Z" fill="#34c759" opacity="0.55"/><path d="M 85 0 A 85 85 0 0 1 35.93 77.03 Q 5 30 5.92 12.69 Q 40 5 85 0 Z" fill="url(#refract)"/></g>
      <g transform="rotate(115.72)"><path d="M 85 0 A 85 85 0 0 1 35.93 77.03 Q 5 30 5.92 12.69 Q 40 5 85 0 Z" fill="#30c9d4" opacity="0.55"/><path d="M 85 0 A 85 85 0 0 1 35.93 77.03 Q 5 30 5.92 12.69 Q 40 5 85 0 Z" fill="url(#refract)"/></g>
      <g transform="rotate(167.15)"><path d="M 85 0 A 85 85 0 0 1 35.93 77.03 Q 5 30 5.92 12.69 Q 40 5 85 0 Z" fill="#007aff" opacity="0.55"/><path d="M 85 0 A 85 85 0 0 1 35.93 77.03 Q 5 30 5.92 12.69 Q 40 5 85 0 Z" fill="url(#refract)"/></g>
      <g transform="rotate(218.58)"><path d="M 85 0 A 85 85 0 0 1 35.93 77.03 Q 5 30 5.92 12.69 Q 40 5 85 0 Z" fill="#af52de" opacity="0.55"/><path d="M 85 0 A 85 85 0 0 1 35.93 77.03 Q 5 30 5.92 12.69 Q 40 5 85 0 Z" fill="url(#refract)"/></g>
    </g>

    <!-- Center dark circle to host the "7" -->
    <circle r="22" fill="#0a0a14"/>
    <circle r="22" fill="none" stroke="#1e293b" stroke-width="1"/>

    <!-- BIG "7" — the landing identifier -->
    <text x="0" y="11" font-size="32" font-weight="800" font-family="'Inter','Segoe UI',system-ui,sans-serif" fill="url(#seven-grad)" text-anchor="middle" letter-spacing="-1">7</text>
  </g>
</svg>
