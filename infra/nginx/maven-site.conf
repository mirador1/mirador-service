# Nginx configuration for the Maven quality reports site.
#
# Serves the static HTML generated by `mvn site` (Surefire, Failsafe, JaCoCo,
# SpotBugs, Javadoc). The site is completely static — no backend calls needed.
#
# Why a standalone nginx and not Spring Boot's /maven-site/ endpoint?
#   - The report data is frozen at the last CI generation (no live updates).
#   - The site stays available when the backend is restarting or under load.
#   - nginx serves static files 10–100× faster than a Java servlet container.
#   - The report lifecycle (daily schedule) is independent of the app lifecycle.
#
# Access: http://localhost:8083

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Charset for HTML reports generated by Maven plugins
    charset utf-8;

    location / {
        try_files $uri $uri/ $uri.html =404;

        # Reports are regenerated daily — allow browsers to cache for 1 hour,
        # CDN/proxy for 4 hours. Short enough to pick up the daily refresh.
        add_header Cache-Control "public, max-age=3600, s-maxage=14400";
    }

    # JaCoCo report resources (CSS, PNG coverage icons) are immutable within a build
    location ~* \.(css|png|gif|jpg|ico|js)$ {
        expires 1h;
        add_header Cache-Control "public";
    }

    # Prevent directory listing — reports have a known index.html
    autoindex off;

    # Compact error pages
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}
