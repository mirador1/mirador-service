# OTEL Collector config — mounted over the default config in the LGTM container.
# Traces go to Tempo (via the local otlphttp/traces exporter).
# Jaeger and Zipkin have been removed — Tempo is the single tracing backend.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - http://*
  prometheus/collector:
    config:
      scrape_configs:
        - job_name: "opentelemetry-collector"
          scrape_interval: 1s
          static_configs:
            - targets: ["127.0.0.1:8888"]
        # Scrape the Spring Boot app — replaces the standalone Prometheus container.
        # host.docker.internal resolves to the Docker host (host-gateway alias set in compose).
        - job_name: "spring-boot"
          scrape_interval: 15s
          metrics_path: /actuator/prometheus
          static_configs:
            - targets: ["host.docker.internal:8080"]

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
    path: "/ready"

processors:
  batch:

exporters:
  otlphttp/metrics:
    endpoint: http://127.0.0.1:9090/api/v1/otlp
    tls:
      insecure: true
  otlphttp/traces:
    endpoint: http://127.0.0.1:4418
    tls:
      insecure: true
  otlphttp/logs:
    endpoint: http://127.0.0.1:3100/otlp
    tls:
      insecure: true
  otlp/profiles:
    endpoint: http://127.0.0.1:4040
    tls:
      insecure: true

  # ── 2e OTLP sink — GitLab Observability (ADR-0054) ────────────────────────
  # Dual-export to the GitLab group's Observability endpoint so traces/metrics/
  # logs are visible directly in GitLab's UI (no Grafana/Tempo needed locally).
  #
  # REQUIRES user action BEFORE activating the pipelines below :
  #   1. Enable the feature on the group at
  #      https://gitlab.com/groups/mirador1/-/observability/setup
  #      (free for all tiers — no Premium/Ultimate needed per 2025 GitLab pricing)
  #   2. The UI provides the exact endpoint URL — the shape below is a
  #      placeholder ; the real endpoint will be something like
  #      https://observability.gitlab.com/v3/<group-id>/otlp/v1/{traces,metrics,logs}
  #   3. Generate a group access token with scope `read_observability` +
  #      `write_observability` at
  #      https://gitlab.com/groups/mirador1/-/settings/access_tokens
  #   4. Export as env var before starting the LGTM container :
  #        export GITLAB_OBSERVABILITY_ENDPOINT="https://..."
  #        export GITLAB_OBSERVABILITY_TOKEN="glat-..."
  #   5. Uncomment the `gitlab` entries in `service.pipelines.*` below
  #
  # Once activated, every trace/metric/log Mirador emits lands in BOTH
  # local LGTM (for offline review) AND GitLab's UI (for portfolio reviewers
  # who don't want to boot a local cluster just to see the traces).
  # otlphttp/traces-gitlab:
  #   endpoint: ${env:GITLAB_OBSERVABILITY_ENDPOINT}/traces
  #   headers:
  #     Authorization: Bearer ${env:GITLAB_OBSERVABILITY_TOKEN}
  # otlphttp/metrics-gitlab:
  #   endpoint: ${env:GITLAB_OBSERVABILITY_ENDPOINT}/metrics
  #   headers:
  #     Authorization: Bearer ${env:GITLAB_OBSERVABILITY_TOKEN}
  # otlphttp/logs-gitlab:
  #   endpoint: ${env:GITLAB_OBSERVABILITY_ENDPOINT}/logs
  #   headers:
  #     Authorization: Bearer ${env:GITLAB_OBSERVABILITY_TOKEN}

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      # Activate GitLab dual-export by adding `otlphttp/traces-gitlab`
      # (requires the user setup above). Commented out by default so the
      # collector doesn't crash on missing env vars for users who haven't
      # enabled GitLab Observability yet.
      exporters: [otlphttp/traces]  # + otlphttp/traces-gitlab when enabled
    metrics:
      receivers: [otlp, prometheus/collector]
      processors: [batch]
      exporters: [otlphttp/metrics]  # + otlphttp/metrics-gitlab when enabled
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/logs]  # + otlphttp/logs-gitlab when enabled
    profiles:
      receivers: [otlp]
      exporters: [otlp/profiles]
