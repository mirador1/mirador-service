# OTEL Collector config — mounted over the default config in the LGTM container.
# Traces go to Tempo (via the local otlphttp/traces exporter).
# Jaeger and Zipkin have been removed — Tempo is the single tracing backend.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - http://*
  prometheus/collector:
    config:
      scrape_configs:
        - job_name: "opentelemetry-collector"
          scrape_interval: 1s
          static_configs:
            - targets: ["127.0.0.1:8888"]
        # Scrape the Spring Boot app — replaces the standalone Prometheus container.
        # host.docker.internal resolves to the Docker host (host-gateway alias set in compose).
        - job_name: "spring-boot"
          scrape_interval: 15s
          metrics_path: /actuator/prometheus
          static_configs:
            - targets: ["host.docker.internal:8080"]

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
    path: "/ready"

processors:
  batch:

exporters:
  otlphttp/metrics:
    endpoint: http://127.0.0.1:9090/api/v1/otlp
    tls:
      insecure: true
  otlphttp/traces:
    endpoint: http://127.0.0.1:4418
    tls:
      insecure: true
  otlphttp/logs:
    endpoint: http://127.0.0.1:3100/otlp
    tls:
      insecure: true
  otlp/profiles:
    endpoint: http://127.0.0.1:4040
    tls:
      insecure: true

  # ── 2e OTLP sink — GitLab Observability (ADR-0054) ────────────────────────
  # Dual-export to the GitLab group's Observability endpoint so traces/metrics/
  # logs are visible directly in GitLab's UI (no Grafana/Tempo needed locally).
  #
  # Enabled 2026-04-23 on mirador1 group (group-id 130289716). Beta /
  # experimental / free during beta period per GitLab's own UI. Endpoint
  # uses TLS HTTPS on port 14318 (OTLP over HTTP).
  #
  # The group-id 130289716 is visible in the GitLab UI to any group member
  # and in the repo via this config ; not treated as secret. Forks should
  # either override via $GITLAB_OBSERVABILITY_ENDPOINT or remove the
  # `otlphttp/*-gitlab` entries from `service.pipelines.*.exporters` below.
  #
  # No auth token needed in beta : the group-id embedded in the subdomain
  # is the identifier. If/when GA adds token auth, add a `headers:
  # Authorization: Bearer ${env:GITLAB_OBSERVABILITY_TOKEN}` block.
  #
  # The otlphttp exporter auto-appends `/v1/{traces,metrics,logs}` to the
  # endpoint based on pipeline signal — don't include it in the URL.
  otlphttp/traces-gitlab:
    endpoint: ${env:GITLAB_OBSERVABILITY_ENDPOINT:-https://130289716.otel.gitlab-o11y.com:14318}
    tls:
      insecure: false
  otlphttp/metrics-gitlab:
    endpoint: ${env:GITLAB_OBSERVABILITY_ENDPOINT:-https://130289716.otel.gitlab-o11y.com:14318}
    tls:
      insecure: false
  otlphttp/logs-gitlab:
    endpoint: ${env:GITLAB_OBSERVABILITY_ENDPOINT:-https://130289716.otel.gitlab-o11y.com:14318}
    tls:
      insecure: false

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      # Dual-export : local LGTM (primary) + GitLab Observability (shared).
      # If GITLAB_OBSERVABILITY_ENDPOINT is unset, the collector crashes on
      # startup with "required env var missing". Users who haven't enabled
      # GitLab Observability should either export the var OR remove the
      # `otlphttp/traces-gitlab` entry from this list.
      exporters: [otlphttp/traces, otlphttp/traces-gitlab]
    metrics:
      receivers: [otlp, prometheus/collector]
      processors: [batch]
      exporters: [otlphttp/metrics, otlphttp/metrics-gitlab]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/logs, otlphttp/logs-gitlab]
    profiles:
      receivers: [otlp]
      exporters: [otlp/profiles]
