# CORS reverse proxy for Loki and Docker API
#
# The Angular UI on localhost:4200 needs to query Loki and the Docker API
# directly from the browser. Neither supports CORS natively.

# --- Loki CORS proxy (port 3100) ---
server {
    listen 3100;
    server_name localhost;

    location / {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'http://localhost:4200' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
            add_header 'Access-Control-Max-Age' 3600;
            add_header 'Content-Length' 0;
            return 204;
        }

        proxy_pass http://customerservice-lgtm:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        add_header 'Access-Control-Allow-Origin' 'http://localhost:4200' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
    }
}

# --- OTLP HTTP CORS proxy (port 4319 → 4318) ---
#
# Browser telemetry (ADR-0009 Phase B) — the LGTM bundle exposes the OTLP
# HTTP receiver on :4318 but the OpenTelemetry collector does not emit
# Access-Control-Allow-* headers, so Chrome drops the preflight. Same
# pattern as the Loki proxy above: we preserve the upstream on :4318 for
# the Spring Boot backend (OTel Java agent is a server-side client, no
# CORS needed) and route browser OTLP through :4319.
server {
    listen 4319;
    server_name localhost;

    # OTLP uses Content-Type: application/x-protobuf for the binary wire
    # format and application/json for the JSON fallback. Both must pass.
    location / {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'http://localhost:4200' always;
            add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, traceparent, tracestate' always;
            add_header 'Access-Control-Max-Age' 3600;
            add_header 'Content-Length' 0;
            return 204;
        }

        proxy_pass http://customerservice-lgtm:4318;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # OTLP POST bodies can exceed the default 1 MB client limit when a
        # browser batches spans; bump to 8 MB to match @opentelemetry/sdk
        # default of 512 spans × 4 KB/span.
        client_max_body_size 8m;

        add_header 'Access-Control-Allow-Origin' 'http://localhost:4200' always;
        add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, traceparent, tracestate' always;
    }
}

# --- Docker API CORS proxy (port 2375) ---
# Forwards to the docker-socket-proxy container (tecnativa/docker-socket-proxy)
# which filters allowed Docker API operations (containers only, no exec/volumes).
server {
    listen 2375;
    server_name localhost;

    location / {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'http://localhost:4200' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type' always;
            add_header 'Access-Control-Max-Age' 3600;
            add_header 'Content-Length' 0;
            return 204;
        }

        proxy_pass http://customerservice-docker-proxy:2375;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        add_header 'Access-Control-Allow-Origin' 'http://localhost:4200' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;
    }
}
