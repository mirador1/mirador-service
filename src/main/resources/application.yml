# =============================================================================
# Spring Boot 4 — Observable Service — Main Configuration
#
# All sensitive values are read from environment variables with safe dev defaults.
# In production, set: DB_URL, DB_USERNAME, DB_PASSWORD, KAFKA_BOOTSTRAP_SERVERS,
# JWT_SECRET, OTEL_EXPORTER_OTLP_ENDPOINT, OLLAMA_BASE_URL, OLLAMA_MODEL.
# =============================================================================

spring:
  application:
    # Service name propagated to OpenTelemetry traces and Grafana dashboards
    name: mirador

  autoconfigure:
    # spring-data-rest-hal-explorer is on the classpath for the HAL browser UI,
    # but we don't use the full Spring Data REST layer — exclude SpringDoc's
    # Data REST auto-config to avoid a missing RepositoryRestConfiguration bean.
    #
    # resilience4j-spring-boot3 2.4.0 ships a SpringBoot3Verifier that throws
    # IncompatibleSpringBootVersionException at context refresh on SB4. The
    # library itself is SB-version-agnostic at runtime — the verifier is a
    # defensive check we intentionally opt out of because SB4 + Java 25 is
    # our declared default profile (pom.xml). resilience4j has no -spring-boot4
    # artifact yet; re-evaluate when upstream ships one.
    exclude: >-
      org.springdoc.core.configuration.SpringDocDataRestConfiguration,
      io.github.resilience4j.springboot3.verifier.autoconfigure.SpringBoot3VerifierAutoConfiguration

  # ---------------------------------------------------------------------------
  # Database — PostgreSQL via Spring Data JPA + Flyway
  # ---------------------------------------------------------------------------
  datasource:
    # Env-var override allows Docker Compose / Kubernetes to inject the real URL
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:customer-service}}
    username: ${DB_USER:demo}
    password: ${DB_PASSWORD:demo}
    hikari:
      # 20 connections handles ~200 concurrent VTs (10x oversubscription rule for short OLTP queries)
      maximum-pool-size: 20
      minimum-idle: 5              # keep 5 connections warm during idle periods
      connection-timeout: 20000    # 20s: max wait for a connection from the pool
      idle-timeout: 600000         # 10min: close connections idle more than 10 minutes
      max-lifetime: 1800000        # 30min: rotate connections to prevent stale/broken ones

  jpa:
    hibernate:
      # "validate" — Hibernate checks that the DB schema matches entity mappings
      # but does NOT modify it. Schema is managed exclusively by Flyway migrations.
      # Never use "create-drop" in production: it destroys data on restart.
      ddl-auto: validate
    # Avoid the N+1 query log noise in development
    show-sql: false
    # [Spring Boot] open-in-view=false prevents the anti-pattern of holding a DB
    # connection open throughout the entire HTTP request (including view rendering).
    # Keeping it open risks connection pool exhaustion under load.
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  # ---------------------------------------------------------------------------
  # Flyway — database schema migration
  # Runs on startup; applies pending V__*.sql scripts in src/main/resources/db/migration/
  # ---------------------------------------------------------------------------
  flyway:
    enabled: true

  # ---------------------------------------------------------------------------
  # Kafka — messaging backbone
  # Used for two patterns:
  #   - Pattern 1: fire-and-forget async events (customer.created)
  #   - Pattern 2: synchronous request-reply (customer.request → customer.reply)
  # ---------------------------------------------------------------------------
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    # Enable Micrometer observation for Kafka producers and consumers.
    # This propagates trace context (traceID/spanID) through Kafka message headers,
    # creating end-to-end distributed traces: HTTP → Kafka producer → consumer → reply.
    listener:
      observation-enabled: true
    template:
      observation-enabled: true

  # ---------------------------------------------------------------------------
  # Redis — distributed cache for RecentCustomerBuffer
  # LPUSH + LTRIM keeps a capped ring of the last 10 customers (stateless / multi-pod safe).
  # ---------------------------------------------------------------------------
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # ---------------------------------------------------------------------------
  # Caffeine — application-level entity cache (L1, in-process)
  # Caches individual customer lookups (findById) for 5 minutes / 1000 entries max.
  # No overlap with Redis: Redis handles the recent-customers ring buffer (10 items),
  # while Caffeine caches arbitrary entity fetches transparently via @Cacheable.
  # ---------------------------------------------------------------------------
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=5m,recordStats  # recordStats: expose hit/miss ratio to Micrometer
    cache-names: customer-by-id
    # mcp-metrics: separately registered as a CaffeineCache bean in
    # com.mirador.mcp.McpConfig with a tighter 5-second TTL — the global
    # 5-minute spec above is too long for live MeterRegistry samples but
    # right for entity reads. ADR-0062 § Caching for the design rationale.

  # ---------------------------------------------------------------------------
  # Spring AI — Ollama (local LLM)                              [Spring AI 1.0]
  # Ollama must be running locally (or via Docker) before calling /customers/{id}/bio.
  # Model is downloaded automatically by the docker-compose entrypoint.
  # ---------------------------------------------------------------------------
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        model: ${OLLAMA_MODEL:llama3.2:1b}
        options:
          # Higher temperature = more creative/varied responses (0.0 = deterministic)
          temperature: 0.7
    chat:
      # Observations ON by default (Micrometer auto-wires this when Observation
      # Registry is on the classpath). Emits spring.ai.chat.client.* spans with
      # GenAI semantic conventions (gen_ai.system, gen_ai.request.model,
      # gen_ai.request.temperature, gen_ai.response.usage.input_tokens,
      # gen_ai.response.usage.output_tokens, …). Visible in Tempo + GitLab
      # Observability + (opt-in) Grafana Cloud AI Observability.
      client:
        observations:
          # Content logging (full prompt + completion text) OFF by default
          # for privacy — the GenAI conventions without content are enough
          # for the AI Observability dashboards to work. Enable by setting
          # MIRADOR_AI_LOG_CONTENT=true env var (local / demo only — do NOT
          # enable in prod unless data-governance has approved sending
          # user prompts to the observability backend). Per ADR-0059 POC.
          log-prompt: ${MIRADOR_AI_LOG_CONTENT:false}
          log-completion: ${MIRADOR_AI_LOG_CONTENT:false}

  # ---------------------------------------------------------------------------
  # Virtual Threads (Project Loom)                                  [Java 21+]
  # Replaces platform threads for Tomcat request processing, @Async, and Kafka
  # listeners. Each request runs on a cheap virtual thread (backed by a small
  # pool of carrier threads), dramatically improving concurrency under I/O load.
  # [Spring Boot 3.2+]
  # ---------------------------------------------------------------------------
  threads:
    virtual:
      enabled: true

  mvc:
    # -------------------------------------------------------------------------
    # RFC 9457 Problem Details                                  [Spring Boot 3+]
    # Enables the standard error format for all Spring MVC exceptions:
    #   { "type": "...", "title": "...", "status": 400, "detail": "..." }
    # Custom exception mapping is in ApiExceptionHandler.
    # -------------------------------------------------------------------------
    problemdetails:
      enabled: true

    # -------------------------------------------------------------------------
    # API Versioning                                      [Spring Boot 4 / Spring 7]
    #
    # Spring Boot 4 exposes spring.mvc.apiversion.* properties that replace the
    # WebMvcConfigurer#configureApiVersioning() Java config bean.
    #
    # Strategy: version resolved from the X-API-Version request header.
    # Default: requests without the header are treated as version 1.0.
    #
    #   GET /customers                         → v1 (CustomerDto: id, name, email)
    #   GET /customers + X-API-Version: 2.0   → v2 (CustomerDtoV2: + createdAt)
    #
    # Other available strategies (mutually exclusive — pick one):
    #   use.query-parameter: v          → GET /customers?v=2.0
    #   use.path-segment: 0             → GET /2.0/customers
    #   use.media-type-parameter:       → Accept: application/json;version=2.0
    #
    # Other options:
    #   required: true   — reject requests without a version header (HTTP 400)
    #   supported:       — explicit allowlist; unknown versions get HTTP 400
    #   detect-supported — auto-populate the allowlist from @RequestMapping(version=)
    # -------------------------------------------------------------------------
    apiversion:
      use:
        header: X-API-Version
      default: "1.0"

# =============================================================================
# Embedded Server
# =============================================================================
server:
  port: ${SERVER_PORT:8080}
  error:
    # Never send the stack trace to the client — it reveals internal structure
    # and is a security risk (OWASP A05: Security Misconfiguration)
    include-stacktrace: never
  tomcat:
    # Limit request body to 1 MB — prevents payload-based DoS attacks
    max-http-form-post-size: 1MB
    max-swallow-size: 1MB
  # Limit multipart uploads and overall request size
  servlet:
    session:
      timeout: 30m


# =============================================================================
# Actuator — operational endpoints
# =============================================================================
management:
  endpoints:
    web:
      exposure:
        # Expose only operational endpoints that are safe without auth.
        # env and configprops are excluded — they leak DB credentials, JWT secrets,
        # and full application configuration. Enable them only behind authentication.
        # Do NOT expose: shutdown, threaddump, heapdump in production without auth.
        include: health,info,prometheus,metrics,beans,loggers,maintenance,quality

  info:
    env:
      enabled: true
    build:
      enabled: true
    # Expose `git.*` keys (commit SHA, tag, branch, build time) at
    # /actuator/info — populated by git-commit-id-maven-plugin in pom.xml.
    # `mode: full` includes the full commit message + author; switch to
    # `simple` if you want only sha + branch in production.
    git:
      enabled: true
      mode: full

  endpoint:
    health:
      # show-details: when_authorized — health details (DB host, error messages)
      # are only visible to authenticated users. Unauthenticated callers see
      # {"status":"UP"} without component details, preventing info disclosure.
      show-details: when_authorized
      probes:
        # Activates /actuator/health/liveness and /actuator/health/readiness
        # Used as Kubernetes liveness/readiness probe endpoints
        enabled: true
      group:
        # readiness = application is ready to serve traffic
        # Includes: DB, Kafka, Redis — if any are DOWN, the pod is removed from load-balancer
        readiness:
          include: readinessState,db,dbReachability,kafka,redis
        # liveness = is the process alive and not stuck?
        # Lightweight checks only — no external dependencies (avoid cascading restarts)
        liveness:
          include: livenessState,diskSpace

  # ---------------------------------------------------------------------------
  # OpenTelemetry — distributed tracing + log export
  #
  # Local dev:  OTEL_EXPORTER_OTLP_ENDPOINT defaults to the LGTM container at :4318.
  #             No auth header needed — local LGTM accepts anonymous traffic.
  #
  # Production (GKE): OTEL_EXPORTER_OTLP_ENDPOINT points to the in-cluster OTel
  #             Collector DaemonSet (opentelemetry-kube-stack Helm chart, namespace
  #             opentelemetry-operator-system). The collector holds the Grafana Cloud
  #             credentials (grafana-cloud-auth K8s Secret) and forwards all signals
  #             to Grafana Cloud. No auth header needed in this application.
  # ---------------------------------------------------------------------------
  tracing:
    # 100% sampling locally. Production uses OTEL_TRACES_SAMPLER_ARG=0.1 (10%) via env var.
    sampling:
      probability: 1.0

  opentelemetry:
    resource:
      attributes:
        # Identifies this service in Tempo/Grafana dashboards
        service.name: ${spring.application.name}
    tracing:
      export:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces
          transport: http
          # Authorization header is NOT set here to avoid sending "Basic " (empty credentials)
          # to the local LGTM container. In production, the K8s Deployment injects:
          #   MANAGEMENT_TRACING_EXPORT_OTLP_HEADERS_AUTHORIZATION = "Basic <base64-token>"
          # which Spring Boot's relaxed binding maps to this headers map automatically.
    logging:
      export:
        otlp:
          # Exports structured logs to Grafana Cloud Loki (prod) or local LGTM Loki (dev).
          enabled: true
          endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/logs
          transport: http
          # Same pattern as tracing above — Authorization injected via K8s env var in prod only.

  # Exemplars: links Prometheus metric data points to specific Tempo trace IDs.
  # In Grafana, clicking a metric spike jumps straight to the matching trace.
  # Requires Prometheus to be started with --enable-feature=exemplar-storage
  # (see deploy/compose/observability.yml prometheus command override).
  # Micrometer auto-configures exemplar sampling when micrometer-tracing is on
  # the classpath and tracing.sampling.probability > 0 — no extra bean needed.
  metrics:
    distribution:
      percentiles-histogram:
        # Enable histogram buckets for HTTP server requests — required for exemplars
        # to be attached to histogram data points by the Micrometer/OTel bridge.
        http.server.requests: true

# =============================================================================
# SpringDoc / OpenAPI / Swagger UI
# API documentation available at: http://localhost:8080/swagger-ui.html
# OpenAPI spec at: http://localhost:8080/v3/api-docs
# =============================================================================
springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true
  # Disable Spring Data REST integration — we use spring-data-rest-hal-explorer
  # for the HAL browser UI only, without the full Spring Data REST layer.

# =============================================================================
# Logging
# =============================================================================
logging:
  level:
    root: INFO
    org.springframework.web: INFO
    # Hibernate SQL logging is noisy — keep at WARN unless debugging queries
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
    # Kafka NetworkClient logs UNKNOWN_TOPIC_OR_PARTITION during startup while
    # KafkaAdmin is creating topics — suppress to avoid misleading ERROR lines
    org.apache.kafka.clients.NetworkClient: ERROR
  structured:
    format:
      # Uncomment to emit logs as ECS JSON (Elastic Common Schema) — ideal for Loki/Kibana
      # console: ecs

# =============================================================================
# Application info — exposed via /actuator/info
# =============================================================================
info:
  app:
    name: ${spring.application.name}
    description: "Customer management REST API with full observability, resilience patterns, and AI integration"
    version: "1.0.0"
  stack:
    java: ${java.version}
    spring-boot: "4.0.x"
    database: "PostgreSQL 17"
    messaging: "Apache Kafka (KRaft)"
    cache: "Redis 7"
    ai: "Ollama (llama3.2) via Spring AI"
    auth: "JWT + Keycloak OAuth2"
  features:
    - "CRUD with pagination, search, sort, versioned API (v1/v2)"
    - "Idempotency keys (LRU cache)"
    - "Rate limiting (Bucket4j — 100 req/min)"
    - "Circuit breaker + retry (Resilience4j)"
    - "Kafka async events + request-reply enrich"
    - "Redis ring buffer (recent customers)"
    - "AI bio generation (Ollama / Spring AI)"
    - "Distributed tracing (OpenTelemetry → Tempo via LGTM)"
    - "Structured logging (OTLP → Loki)"
    - "Prometheus metrics + Grafana dashboards"

# =============================================================================
# Resilience4j — circuit breaker + retry for external HTTP calls
# Applied to TodoService which calls JSONPlaceholder API.
# Metrics are automatically exported to Micrometer.
# =============================================================================
resilience4j:
  circuitbreaker:
    instances:
      jsonplaceholder:
        # Open circuit after 50% failure rate on a sliding window of 10 calls
        failure-rate-threshold: 50
        minimum-number-of-calls: 10
        # Stay OPEN for 10s, then transition to HALF_OPEN to test recovery
        wait-duration-in-open-state: 10s
        # Allow 3 test calls in HALF_OPEN state before deciding to close or re-open
        permitted-number-of-calls-in-half-open-state: 3
        sliding-window-size: 10
      # Circuit breaker for the Ollama LLM endpoint (BioService).
      # Ollama can be slow or unavailable (e.g., model not loaded, GPU busy).
      # The circuit opens after 50% failures on a 5-call window and stays open for 30s.
      # Calls during the open state receive a graceful "Bio temporarily unavailable." response.
      ollama:
        failure-rate-threshold: 50
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 2
        sliding-window-size: 5
  # ---------------------------------------------------------------------------
  # Bulkhead — semaphore-based concurrency cap on slow/expensive operations
  # Prevents thread exhaustion when the Ollama LLM is slow under load.
  # max-concurrent-calls: only N calls allowed in parallel; extras wait up to max-wait-duration.
  # max-wait-duration: 0 = fail immediately if no slot is available (avoids queue buildup).
  # [Resilience4j semaphore bulkhead]
  # ---------------------------------------------------------------------------
  bulkhead:
    instances:
      ollama:
        max-concurrent-calls: 5     # cap LLM concurrency — prevents thread exhaustion
        max-wait-duration: 0ms      # fail fast if no slot; avoids piling up slow threads

  retry:
    instances:
      jsonplaceholder:
        # Retry up to 3 times with 200ms between attempts
        max-attempts: 3
        wait-duration: 200ms
        # Only retry on connection errors — not on 4xx responses (those are client errors)
        retry-exceptions:
          - org.springframework.web.client.ResourceAccessException
      # ---------------------------------------------------------------------------
      # Retry for Kafka publish — exponential backoff with jitter
      # When the broker is temporarily overloaded, retrying immediately just makes it worse.
      # Exponential backoff: 200ms → 400ms → 800ms. Jitter spreads retries across pods.
      # [Resilience4j retry + exponential backoff]
      # ---------------------------------------------------------------------------
      kafkaPublish:
        max-attempts: 4
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2.0    # 200ms → 400ms → 800ms → ~1600ms
        randomized-wait-factor: 0.5            # ±50% jitter to spread concurrent retries
        retry-exceptions:
          - java.lang.IllegalStateException    # thrown by KafkaCustomerEventPublisher on timeout/error

# =============================================================================
# JWT Authentication
# Secret must be at least 32 characters for HMAC-SHA256.
# In production, always set JWT_SECRET from a secrets manager (Vault, AWS SM, etc.)
# The dev default is deliberately weak and should NEVER be used in production.
# =============================================================================
jwt:
  secret: ${JWT_SECRET:dev-secret-key-minimum-32-characters}

# =============================================================================
# JWT issuer — OAuth2 resource server (optional)
#
# Supports two providers (mutually exclusive, AUTH0_DOMAIN takes priority):
#
#   Auth0 (production):
#     Set AUTH0_DOMAIN=dev-ksxj46zlkhk2gcvo.us.auth0.com
#     Issuer URI → https://<AUTH0_DOMAIN>/  (trailing slash required by Auth0)
#     JWKS URI   → https://<AUTH0_DOMAIN>/.well-known/jwks.json
#
#   Keycloak (local dev):
#     Set KEYCLOAK_URL=http://keycloak:8080
#     Issuer URI → <KEYCLOAK_URL>/realms/customer-service
#     JWKS URI   → <KEYCLOAK_URL>/realms/customer-service/protocol/openid-connect/certs
#
#   Neither set → app runs in local JWT-only mode (POST /auth/login issues its own tokens).
# =============================================================================
keycloak:
  issuer-uri: ${AUTH0_ISSUER_URI:${KEYCLOAK_URL:}/realms/customer-service}

# Auth0 API identifier — must match the audience registered in Auth0 Dashboard → APIs.
# When set, JWTs are validated for this audience claim (prevents accepting tokens
# issued for a different API in the same Auth0 tenant).
# Leave blank for Keycloak or built-in JWT mode (audience validation skipped).
auth0:
  audience: ${AUTH0_AUDIENCE:}

# =============================================================================
# Application-specific configuration
# =============================================================================
app:
  # ---------------------------------------------------------------------------
  # Rate limiting — Bucket4j token-bucket algorithm, per client IP
  # Each IP gets its own bucket. When empty, requests receive HTTP 429 + Retry-After.
  # ---------------------------------------------------------------------------
  # ---------------------------------------------------------------------------
  # API key — alternative M2M authentication via X-API-Key header
  # Set via environment variable in production (secrets manager recommended).
  # Leave empty to disable API key authentication.
  # ---------------------------------------------------------------------------
  api-key: ${API_KEY:demo-api-key-2026}

  rate-limit:
    capacity: 100         # max tokens in the bucket (burst size)
    refill-tokens: 100    # tokens added per refill cycle
    refill-seconds: 60    # refill cycle duration → 100 req/min per IP

  observability:
    # Controls the Gauge metric for the RecentCustomerBuffer size (ObservabilityConfig)
    recent-buffer-gauge-enabled: true
    # Loki / Tempo / Unleash proxy config removed with ADR-0026: Spring Boot
    # is not aware of third-party tools. The UI talks to Grafana's datasource
    # proxy (for Loki/Tempo) and to unleash-proxy (for feature flags) directly.

  # ---------------------------------------------------------------------------
  # Kafka topic names and consumer groups
  # Centralised here so all topic references go through @Value injection — no
  # hardcoded strings scattered across producers and consumers.
  # ---------------------------------------------------------------------------
  kafka:
    topics:
      customer-created: customer.created  # Pattern 1: async event
      customer-request: customer.request  # Pattern 2: sync request
      customer-reply: customer.reply      # Pattern 2: sync reply
    consumer-group-id: customer-service-group
    reply-group-id: customer-service-reply-group
    enrich-timeout-seconds: 5  # seconds to wait for Kafka reply before HTTP 504
