spring:
  application:
    name: spring-4-demo
  datasource:
    #demo by default
    url: ${DB_URL:jdbc:postgresql://localhost:5432/demo}
    username: ${DB_USERNAME:demo}
    password: ${DB_PASSWORD:demo}
  jpa:
    hibernate:
      #validate on startup
      ddl-auto: validate
    #avoid showing SQL (verbose)
    show-sql: false
    # disable open-in-view (anti-pattern: keeps DB session open during view rendering)
    open-in-view: false
    properties:
      hibernate:
        #when activated, format
        format_sql: false
  flyway:
    #load flyway data on startup (create tables and data)
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        model: ${OLLAMA_MODEL:llama3.2}
        options:
          temperature: 0.7

server:
  port: ${SERVER_PORT:8080}
  error:
    # do not send stack trace to client (security)
    include-stacktrace: never

# Virtual Threads (Project Loom) — use one carrier thread per request instead of pool threads
# Enabled globally: Tomcat request threads, @Async, Spring Kafka listeners all run on virtual threads
spring.threads.virtual.enabled: true

# RFC 9457 Problem Details — standard error response format (type, title, status, detail, instance)
spring.mvc.problemdetails.enabled: true

management:
  endpoints:
    web:
      exposure:
        # exposes some management endpoints (basic)
        include: health,info,prometheus,metrics,env,configprops
  endpoint:
    health:
      # include details to health such as database
      show-details: always
      probes:
        # activate liveness and readiness proves (used by kubernetes)
        enabled: true
      group:
        # ready if app and db connexion is ok and also custom DatabaseReachabilityHealthIndicator
        readiness:
          include: readinessState,db,dbReachability
  tracing:
    sampling:
      probability: 1.0
  opentelemetry:
    resource:
      attributes:
        service.name: ${spring.application.name}
    tracing:
      export:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces
          transport: http
    logging:
      export:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/logs
          transport: http

springdoc:
  # explicit config silences the "enabled by default" startup warnings
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    # reduce verbosity
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
    # suppress transient UNKNOWN_TOPIC_OR_PARTITION during startup (topics created by KafkaAdmin concurrently)
    org.apache.kafka.clients.NetworkClient: ERROR
  structured:
    format:
      # json format
      # console: ecs
resilience4j:
  circuitbreaker:
    instances:
      jsonplaceholder:
        # open after 50% failures on 10 calls
        failure-rate-threshold: 50
        minimum-number-of-calls: 10
        # stay open for 10s then try again
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        sliding-window-size: 10
  retry:
    instances:
      jsonplaceholder:
        max-attempts: 3
        wait-duration: 200ms
        retry-exceptions:
          - org.springframework.web.client.ResourceAccessException

jwt:
  secret: ${JWT_SECRET:dev-secret-key-minimum-32-characters}

app:
  rate-limit:
    # Token-bucket rate limiter (Bucket4j) — per IP
    # 100 requests per 60-second window by default
    capacity: 100
    refill-tokens: 100
    refill-seconds: 60
  observability:
    # Custom for ObservabilityConfig
    recent-buffer-gauge-enabled: true
  kafka:
    topics:
      customer-created: customer.created
      customer-request: customer.request
      customer-reply: customer.reply
    consumer-group-id: spring-api-group
    reply-group-id: spring-api-reply-group
    enrich-timeout-seconds: 5
