spring:
  application:
    name: spring-4-demo
  datasource:
    #demo by default
    url: ${DB_URL:jdbc:postgresql://localhost:5432/demo}
    username: ${DB_USERNAME:demo}
    password: ${DB_PASSWORD:demo}
  jpa:
    hibernate:
      #validate on startup
      ddl-auto: validate
    #avoid showing SQL (verbose)
    show-sql: false
    properties:
      hibernate:
        #when activated, format
        format_sql: false
  flyway:
    #load flyway data on startup (create tables and data)
    enabled: true

server:
  port: ${SERVER_PORT:8080}
  error:
    # do not send stack trace to client (security)
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        # exposes some management endpoints (basic)
        include: health,info,prometheus,metrics,env,configprops
  endpoint:
    health:
      # include details to health such as database
      show-details: always
      probes:
        # activate liveness and readiness proves (used by kubernetes)
        enabled: true
      group:
        # ready if app and db connexion is ok and also custom DatabaseReachabilityHealthIndicator
        readiness:
          include: readinessState,db,dbReachability
  tracing:
    sampling:
      probability: 1.0
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/traces
          transport: http

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    # reduce verbosity
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
  structured:
    format:
      # json format
      # console: ecs
app:
  observability:
    # Custom for ObservabilityConfig
    recent-buffer-gauge-enabled: true
