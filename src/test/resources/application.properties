spring.datasource.url=jdbc:tc:postgresql:17:///demo
spring.datasource.username=test
spring.datasource.password=test

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

spring.flyway.locations=classpath:db/migration

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.flywaydb=DEBUG

# overridden by @DynamicPropertySource in AbstractIntegrationTest
spring.kafka.bootstrap-servers=localhost:9092

# Spring AI — exclude Ollama auto-config (Spring AI M6 not compatible with Spring Boot 4 autoconfigure)
spring.autoconfigure.exclude=org.springframework.ai.autoconfigure.ollama.OllamaAutoConfiguration

# longer timeout in tests: Kafka consumer group rebalance takes a few seconds on cold start
app.kafka.enrich-timeout-seconds=30